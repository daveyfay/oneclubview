# NOTE: Currently deploying the monolith from public/
# When react-migration is ready, switch to:
#   command = "npm run build"
#   publish = "dist"
[build]
  publish = "public"

[[headers]]
  for = "/*"
  [headers.values]
    Permissions-Policy = "geolocation=(self)"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200


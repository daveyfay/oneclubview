<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a2a3a"/>
      <stop offset="100%" style="stop-color:#2d4a5f"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Logo circle -->
  <circle cx="100" cy="315" r="40" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="4"/>
  <circle cx="100" cy="315" r="15" fill="rgba(255,255,255,0.3)"/>
  <!-- Text -->
  <text x="170" y="280" font-family="Georgia, serif" font-size="56" font-weight="bold" fill="white">OneClubView</text>
  <text x="170" y="340" font-family="-apple-system, sans-serif" font-size="28" fill="#e85d4a" font-weight="bold">All your clubs. One calm view.</text>
  <text x="170" y="390" font-family="-apple-system, sans-serif" font-size="20" fill="rgba(255,255,255,0.5)">Schedule • Fees • Camps • Both parents</text>
  <!-- Feature pills -->
  <rect x="170" y="430" width="100" height="32" rx="16" fill="rgba(255,255,255,0.1)"/>
  <text x="195" y="451" font-family="-apple-system, sans-serif" font-size="14" fill="rgba(255,255,255,0.7)">📅 Schedule</text>
  <rect x="290" y="430" width="80" height="32" rx="16" fill="rgba(255,255,255,0.1)"/>
  <text x="307" y="451" font-family="-apple-system, sans-serif" font-size="14" fill="rgba(255,255,255,0.7)">💳 Fees</text>
  <rect x="390" y="430" width="90" height="32" rx="16" fill="rgba(255,255,255,0.1)"/>
  <text x="410" y="451" font-family="-apple-system, sans-serif" font-size="14" fill="rgba(255,255,255,0.7)">🏕️ Camps</text>
  <!-- Price -->
  <text x="170" y="520" font-family="Georgia, serif" font-size="24" fill="white" font-weight="bold">From €7.99/month</text>
  <text x="170" y="550" font-family="-apple-system, sans-serif" font-size="16" fill="rgba(255,255,255,0.4)">14-day free trial • Cancel anytime</text>
</svg>

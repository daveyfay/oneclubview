function Onboard({userId,onDone}){

  const W=({children})=><div className="fi" style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",padding:20,background:"var(--warm)"}}><div style={{width:"100%",maxWidth:420,textAlign:"center"}}>{children}</div></div>;
  if(step===1)return<W><div style={{fontSize:48,marginBottom:12}}>👋</div><h2 style={{fontFamily:"var(--sr)",fontSize:24,fontWeight:800,color:"var(--g)"}}>Who's in your family?</h2><p style={{fontSize:14,color:"var(--mt)",marginTop:6}}>Just first names</p>{kids.length>0&&<div style={{margin:"20px 0",display:"flex",flexWrap:"wrap",gap:8,justifyContent:"center"}}>{kids.map((k,i)=><span key={i} style={{padding:"6px 16px",borderRadius:100,background:"var(--gxl)",border:"1px solid #c8e6c9",fontSize:14,fontWeight:600,color:"var(--g)"}}>✓ {k}</span>)}</div>}<div style={{display:"flex",gap:8,marginTop:20}}><input type="text" value={kn} onChange={e=>setKn(e.target.value)} placeholder="Child's first name" onKeyDown={e=>e.key==="Enter"&&addKid()} style={{flex:1}}/><button onClick={addKid} disabled={sv||!kn.trim()} style={{padding:"0 24px",borderRadius:100,border:"none",background:"var(--g)",color:"#fff",fontSize:13,fontWeight:700,cursor:"pointer",opacity:(!kn.trim()||sv)?.4:1}}>Add</button></div><button onClick={()=>setStep(2)} style={{marginTop:28,width:"100%",padding:14,borderRadius:100,border:"none",fontSize:14,fontWeight:700,cursor:"pointer",fontFamily:"var(--sn)",color:kids.length?"#fff":"var(--mt)",background:kids.length?"var(--g)":"#e8e4df"}}>{kids.length?"Next →":"Skip — just me"}</button></W>;
  return<W><div style={{fontSize:48,marginBottom:12}}>🏠</div><h2 style={{fontFamily:"var(--sr)",fontSize:24,fontWeight:800,color:"var(--g)"}}>What clubs are you in?</h2><p style={{fontSize:14,color:"var(--mt)",marginTop:6}}>Swimming, GAA, tennis, scouts — any club</p>{clubs.length>0&&<div style={{margin:"20px 0",display:"flex",flexDirection:"column",gap:8}}>{clubs.map((c,i)=><div key={c.id} style={{display:"flex",alignItems:"center",gap:10,background:"var(--gxl)",borderRadius:14,padding:"10px 16px",border:"1px solid #c8e6c9"}}><div style={{width:30,height:30,borderRadius:8,background:cols[i%6],display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontSize:10,fontWeight:800}}>{c.name.split(" ").map(w=>w[0]).join("").substring(0,2)}</div><span style={{fontSize:14,fontWeight:600,color:"var(--g)"}}>{c.name}</span><span style={{marginLeft:"auto",color:"var(--gl)"}}>✓</span></div>)}</div>}<div style={{display:"flex",gap:8,marginTop:20}}><input type="text" value={cn} onChange={e=>setCn(e.target.value)} placeholder="Club name" onKeyDown={e=>e.key==="Enter"&&addClub()} style={{flex:1}}/><button onClick={addClub} disabled={sv||!cn.trim()} style={{padding:"0 24px",borderRadius:100,border:"none",background:"var(--g)",color:"#fff",fontSize:13,fontWeight:700,cursor:"pointer",opacity:(!cn.trim()||sv)?.4:1}}>Add</button></div><button onClick={finish} style={{marginTop:28,width:"100%",padding:14,borderRadius:100,border:"none",fontSize:14,fontWeight:700,cursor:"pointer",fontFamily:"var(--sn)",color:"#fff",background:"var(--g)"}}>{clubs.length?"Go to my hub →":"Skip"}</button></W>;
}

// =========== ADD EVENT MODAL ===========
function AddEventModal({clubs,userId,onClose,onSaved}){
  const[clubId,setClubId]=useState(clubs[0]?.club_id||"");
  const[title,setTitle]=useState("");const[type,setType]=useState("oneoff");
  const[date,setDate]=useState("");const[time,setTime]=useState("18:00");const[dur,setDur]=useState(60);
  const[loc,setLoc]=useState("");const[freq,setFreq]=useState("weekly");const[dow,setDow]=useState(1);
  const[sv,setSv]=useState(false);

  async function save(){
    if(!title.trim()||!clubId)return;setSv(true);
    if(type==="recurring"){
      await db("recurring_events","POST",{body:{user_id:userId,club_id:clubId,title:title.trim(),location:loc.trim()||null,frequency:freq,day_of_week:parseInt(dow),start_time:time+":00",duration_minutes:parseInt(dur),starts_from:new Date().toISOString().split("T")[0]}});
    }else{
      if(!date)return setSv(false);
      const dt=date+"T"+time+":00";
      const end=new Date(new Date(dt).getTime()+dur*60000).toISOString();
      await db("manual_events","POST",{body:{user_id:userId,club_id:clubId,title:title.trim(),event_date:dt,end_date:end,location:loc.trim()||null}});
    }
    setSv(false);onSaved();
  }

  return<div className="modal-bg" onClick={e=>e.target===e.currentTarget&&onClose()}><div className="modal-box">
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}><h3 style={{fontFamily:"var(--sr)",fontSize:18,fontWeight:700,color:"var(--g)"}}>Add Event</h3><button onClick={onClose} style={{background:"none",border:"none",fontSize:20,cursor:"pointer",color:"var(--mt)"}}>✕</button></div>
    <div style={{display:"flex",flexDirection:"column",gap:12}}>
      <div><label style={{fontSize:11,fontWeight:700,color:"var(--mt)",textTransform:"uppercase",letterSpacing:1}}>Club</label><select value={clubId} onChange={e=>setClubId(e.target.value)} style={{marginTop:4}}>{clubs.map(c=><option key={c.club_id} value={c.club_id}>{c.club_name}</option>)}</select></div>
      <div><label style={{fontSize:11,fontWeight:700,color:"var(--mt)",textTransform:"uppercase",letterSpacing:1}}>What</label><input type="text" value={title} onChange={e=>setTitle(e.target.value)} placeholder="e.g. Training, Match, Meeting" style={{marginTop:4}}/></div>
      <div style={{display:"flex",gap:8,background:"#f5f3ef",borderRadius:12,padding:4}}>
        <button onClick={()=>setType("recurring")} style={{flex:1,padding:8,borderRadius:8,border:"none",fontSize:13,fontWeight:600,cursor:"pointer",fontFamily:"var(--sn)",background:type==="recurring"?"#fff":"transparent",color:type==="recurring"?"var(--g)":"var(--mt)"}}>Every week</button>
        <button onClick={()=>setType("oneoff")} style={{flex:1,padding:8,borderRadius:8,border:"none",fontSize:13,fontWeight:600,cursor:"pointer",fontFamily:"var(--sn)",background:type==="oneoff"?"#fff":"transparent",color:type==="oneoff"?"var(--g)":"var(--mt)"}}>One-off</button>
      </div>
      {type==="recurring"?<div style={{display:"flex",gap:8}}>
        <div style={{flex:1}}><label style={{fontSize:11,fontWeight:700,color:"var(--mt)",textTransform:"uppercase",letterSpacing:1}}>Day</label><select value={dow} onChange={e=>setDow(e.target.value)} style={{marginTop:4}}>{DAYSFULL.map((d,i)=><option key={i} value={i}>{d}</option>)}</select></div>
        <div style={{flex:1}}><label style={{fontSize:11,fontWeight:700,color:"var(--mt)",textTransform:"uppercase",letterSpacing:1}}>Time</label><input type="time" value={time} onChange={e=>setTime(e.target.value)} style={{marginTop:4}}/></div>
      </div>:<div><label style={{fontSize:11,fontWeight:700,color:"var(--mt)",textTransform:"uppercase",letterSpacing:1}}>Date & Time</label><div style={{display:"flex",gap:8,marginTop:4}}><input type="date" value={date} onChange={e=>setDate(e.target.value)} style={{flex:1}}/><input type="time" value={time} onChange={e=>setTime(e.target.value)} style={{flex:1}}/></div></div>}
      <div style={{display:"flex",gap:8}}>
        <div style={{flex:1}}><label style={{fontSize:11,fontWeight:700,color:"var(--mt)",textTransform:"uppercase",letterSpacing:1}}>Duration (mins)</label><input type="number" value={dur} onChange={e=>setDur(e.target.value)} style={{marginTop:4}}/></div>
        <div style={{flex:1}}><label style={{fontSize:11,fontWeight:700,color:"var(--mt)",textTransform:"uppercase",letterSpacing:1}}>Location</label><input type="text" value={loc} onChange={e=>setLoc(e.target.value)} placeholder="Optional" style={{marginTop:4}}/></div>
      </div>
      <button onClick={save} disabled={sv||!title.trim()} style={{width:"100%",padding:14,borderRadius:100,border:"none",fontSize:14,fontWeight:700,cursor:"pointer",color:"#fff",background:"var(--g)",fontFamily:"var(--sn)",opacity:sv?.6:1,marginTop:4}}>{sv?"Saving...":"Save event"}</button>
    </div>
  </div></div>;
}

// =========== ADD PAYMENT MODAL ===========
function AddPaymentModal({clubs,userId,onClose,onSaved}){
  const[clubId,setClubId]=useState(clubs[0]?.club_id||"");const[desc,setDesc]=useState("");const[amt,setAmt]=useState("");const[due,setDue]=useState("");const[sv,setSv]=useState(false);
  async function save(){if(!desc.trim()||!amt||!due||!clubId)return;setSv(true);await db("payment_reminders","POST",{body:{user_id:userId,club_id:clubId,description:desc.trim(),amount:parseFloat(amt),due_date:due}});setSv(false);onSaved()}
  return<div className="modal-bg" onClick={e=>e.target===e.currentTarget&&onClose()}><div className="modal-box">
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}><h3 style={{fontFamily:"var(--sr)",fontSize:18,fontWeight:700,color:"var(--g)"}}>Add Payment Reminder</h3><button onClick={onClose} style={{background:"none",border:"none",fontSize:20,cursor:"pointer",color:"var(--mt)"}}>✕</button></div>
    <div style={{display:"flex",flexDirection:"column",gap:12}}>
      <div><label style={{fontSize:11,fontWeight:700,color:"var(--mt)",textTransform:"uppercase",letterSpacing:1}}>Club</label><select value={clubId} onChange={e=>setClubId(e.target.value)} style={{marginTop:4}}>{clubs.map(c=><option key={c.club_id} value={c.club_id}>{c.club_name}</option>)}</select></div>
      <div><label style={{fontSize:11,fontWeight:700,color:"var(--mt)",textTransform:"uppercase",letterSpacing:1}}>What's it for?</label><input type="text" value={desc} onChange={e=>setDesc(e.target.value)} placeholder="e.g. Annual membership, camp fee" style={{marginTop:4}}/></div>
      <div style={{display:"flex",gap:8}}>
        <div style={{flex:1}}><label style={{fontSize:11,fontWeight:700,color:"var(--mt)",textTransform:"uppercase",letterSpacing:1}}>Amount (€)</label><input type="number" value={amt} onChange={e=>setAmt(e.target.value)} placeholder="0.00" style={{marginTop:4}}/></div>
        <div style={{flex:1}}><label style={{fontSize:11,fontWeight:700,color:"var(--mt)",textTransform:"uppercase",letterSpacing:1}}>Due date</label><input type="date" value={due} onChange={e=>setDue(e.target.value)} style={{marginTop:4}}/></div>
      </div>
      <button onClick={save} disabled={sv||!desc.trim()||!amt||!due} style={{width:"100%",padding:14,borderRadius:100,border:"none",fontSize:14,fontWeight:700,cursor:"pointer",color:"#fff",background:"var(--g)",fontFamily:"var(--sn)",opacity:sv?.6:1,marginTop:4}}>{sv?"Saving...":"Save reminder"}</button>
    </div>
  </div></div>;
}

// =========== HUB ===========
function Hub({user,profile,kids,clubs,payments,recEvents,manEvents,onNav,onRefresh}){
  const[tab,setTab]=useState("week");const[filter,setFilter]=useState("all");
  const[showAddEvent,setShowAddEvent]=useState(false);const[showAddPay,setShowAddPay]=useState(false);
  const members=[{id:"all",name:"Everyone",emoji:"👨‍👩‍👧‍👦"},...kids.map(k=>({id:k.id,name:k.first_name,emoji:"👧",a:getAge(k.date_of_birth)}))];
  const tabs=[{id:"week",l:"This Week",i:"📅"},{id:"money",l:"Money",i:"💳"},{id:"camps",l:"Camps",i:"🏕️"},{id:"clubs",l:"Clubs",i:"🏠"}];
  const noAge=kids.filter(k=>!k.date_of_birth);

  // Build weekly events from recurring + manual
  const weekDates=getWeekDates();
  const weekEvents=useMemo(()=>{
    const evts=[];
    // Recurring events for this week
    recEvents.forEach(re=>{
      weekDates.forEach(wd=>{
        if(wd.getDay()===re.day_of_week&&re.active){
          const club=clubs.find(c=>c.club_id===re.club_id);
          evts.push({id:re.id+"-"+wd.toISOString(),title:re.title,date:wd,time:re.start_time?.slice(0,5),dur:re.duration_minutes,location:re.location,club_name:club?.club_name||"Unknown",colour:club?.colour||"#666",type:"recurring"});
        }
      });
    });
    // Manual events this week
    manEvents.forEach(me=>{
      const d=new Date(me.event_date);
      if(d>=weekDates[0]&&d<=new Date(weekDates[6].getTime()+86400000)){
        const club=clubs.find(c=>c.club_id===me.club_id);
        evts.push({id:me.id,title:me.title,date:d,time:d.toTimeString().slice(0,5),location:me.location,club_name:club?.club_name||"Unknown",colour:club?.colour||"#666",type:"oneoff"});
      }
    });
    evts.sort((a,b)=>a.date-b.date||(a.time||"").localeCompare(b.time||""));
    return evts;
  },[recEvents,manEvents,clubs]);

  // Payment totals
  const totalDue=payments.filter(p=>!p.paid).reduce((s,p)=>s+parseFloat(p.amount||0),0);
  const totalPaid=payments.filter(p=>p.paid).reduce((s,p)=>s+parseFloat(p.amount||0),0);

  return <div className="fi" style={{background:"var(--warm)",minHeight:"100vh"}}>
    <div style={{background:"var(--card)",borderBottom:"1px solid var(--bd)"}}>
      <div style={{maxWidth:520,margin:"0 auto",padding:"14px 16px 8px"}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}><Logo/><div style={{width:32,height:32,borderRadius:10,background:"var(--g)",display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontSize:13,fontWeight:700}}>{(profile?.first_name||"U")[0]}</div></div>
        {members.length>1&&<div className="hsb" style={{display:"flex",gap:6,overflowX:"auto",paddingBottom:6}}>{members.map(m=><button key={m.id} onClick={()=>setFilter(m.id)} style={{display:"flex",alignItems:"center",gap:4,padding:"5px 12px",borderRadius:100,fontSize:12,fontWeight:600,border:"none",cursor:"pointer",whiteSpace:"nowrap",fontFamily:"var(--sn)",background:filter===m.id?"var(--g)":"#f5f3ef",color:filter===m.id?"#fff":"var(--mt)",transition:"all .15s"}}>{m.emoji} {m.name}{m.a!=null&&<span style={{opacity:.6}}>({m.a})</span>}</button>)}</div>}
      </div>
      <div style={{maxWidth:520,margin:"0 auto",display:"flex"}}>{tabs.map(t=><button key={t.id} onClick={()=>setTab(t.id)} style={{flex:1,display:"flex",alignItems:"center",justifyContent:"center",gap:4,padding:"10px 0",fontSize:12,fontWeight:600,border:"none",borderBottom:tab===t.id?"2.5px solid var(--g)":"2.5px solid transparent",cursor:"pointer",background:"none",color:tab===t.id?"var(--g)":"var(--mt)",fontFamily:"var(--sn)"}}>{t.i} {t.l}</button>)}</div>
    </div>
    <div style={{maxWidth:520,margin:"0 auto",padding:16,paddingBottom:100}}>
      {noAge.length>0&&tab!=="camps"&&<div style={{background:"#e8f4fd",border:"1px solid #b6d9f2",borderRadius:14,padding:12,marginBottom:14,display:"flex",alignItems:"center",gap:10}}><span>💡</span><div style={{flex:1,fontSize:13,fontWeight:600,color:"#1565c0"}}>Add {noAge[0].first_name}'s age to find camps</div><button onClick={()=>onNav("addAge",noAge[0].id)} style={{padding:"6px 14px",borderRadius:100,border:"none",background:"#1565c0",color:"#fff",fontSize:12,fontWeight:700,cursor:"pointer"}}>Add</button></div>}

      {/* ===== THIS WEEK ===== */}
      {tab==="week"&&<div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10,marginBottom:16}}>
          <div style={{background:"var(--card)",borderRadius:14,padding:14,textAlign:"center",border:"1px solid var(--bd)"}}><div style={{fontSize:22,fontWeight:800,fontFamily:"var(--sr)"}}>{weekEvents.length}</div><div style={{fontSize:10,fontWeight:600,color:"var(--mt)",marginTop:2}}>This week</div></div>
          <div style={{background:"var(--card)",borderRadius:14,padding:14,textAlign:"center",border:"1px solid var(--bd)"}}><div style={{fontSize:22,fontWeight:800,fontFamily:"var(--sr)"}}>{clubs.length}</div><div style={{fontSize:10,fontWeight:600,color:"var(--mt)",marginTop:2}}>Clubs</div></div>
          <div style={{background:totalDue>0?"var(--accl)":"var(--gxl)",borderRadius:14,padding:14,textAlign:"center",border:totalDue>0?"1px solid #f0d078":"1px solid #c8e6c9"}}><div style={{fontSize:22,fontWeight:800,fontFamily:"var(--sr)",color:totalDue>0?"#8a6d00":"var(--g)"}}>{totalDue>0?"€"+totalDue:"✓"}</div><div style={{fontSize:10,fontWeight:600,color:totalDue>0?"#a68600":"var(--gl)",marginTop:2}}>{totalDue>0?"Fees due":"All clear"}</div></div>
        </div>

        {/* Day-by-day view */}
        <div style={{display:"flex",flexDirection:"column",gap:2}}>
          {weekDates.map(wd=>{
            const dayEvts=weekEvents.filter(e=>isSameDay(e.date,wd));
            const today=isToday(wd);
            return <div key={wd.toISOString()} style={{display:"flex",gap:12,padding:"10px 12px",borderRadius:14,background:today?"var(--accl)":dayEvts.length?"var(--card)":"transparent",border:today?"1px solid #f0d078":dayEvts.length?"1px solid var(--bd)":"1px solid transparent"}}>
              <div style={{width:44,flexShrink:0,paddingTop:2}}>
                <div style={{fontSize:10,fontWeight:700,textTransform:"uppercase",letterSpacing:1,color:today?"#8a6d00":"var(--mt)"}}>{DAYS[wd.getDay()]}</div>
                <div style={{fontSize:18,fontWeight:800,color:today?"#8a6d00":"var(--tx)",fontFamily:"var(--sr)"}}>{wd.getDate()}</div>
              </div>
              <div style={{flex:1}}>
                {dayEvts.length===0?<div style={{fontSize:13,color:"var(--mt)",fontStyle:"italic",paddingTop:4}}>Nothing on</div>:
                dayEvts.map(e=><div key={e.id} style={{display:"flex",alignItems:"center",gap:10,padding:"6px 0"}}>
                  <div style={{width:4,height:32,borderRadius:2,background:e.colour,flexShrink:0}}/>
                  <div style={{flex:1}}>
                    <div style={{fontSize:14,fontWeight:600,color:"var(--tx)"}}>{e.title}</div>
                    <div style={{fontSize:12,color:"var(--mt)"}}>{e.club_name} · {e.time}{e.location?" · "+e.location:""}</div>
                  </div>
                </div>)}
              </div>
            </div>;
          })}
        </div>
        <button onClick={()=>setShowAddEvent(true)} style={{width:"100%",marginTop:16,padding:14,borderRadius:100,border:"2px dashed var(--bd)",background:"none",fontSize:14,fontWeight:600,color:"var(--mt)",cursor:"pointer",fontFamily:"var(--sn)"}}>+ Add an event</button>
      </div>}

      {/* ===== MONEY ===== */}
      {tab==="money"&&<div>
        <div style={{background:"var(--card)",borderRadius:20,border:"1px solid var(--bd)",padding:20,marginBottom:14}}>
          <div style={{fontSize:11,fontWeight:700,color:"var(--mt)",textTransform:"uppercase",letterSpacing:1,marginBottom:12}}>Overview</div>
          <div style={{display:"flex",justifyContent:"space-between",padding:"8px 0",borderBottom:"1px solid #f5f3ef"}}><span style={{fontSize:14,color:"var(--mt)"}}>Total fees tracked</span><span style={{fontSize:18,fontWeight:800,fontFamily:"var(--sr)"}}>€{totalDue+totalPaid}</span></div>
          <div style={{display:"flex",justifyContent:"space-between",padding:"8px 0",borderBottom:"1px solid #f5f3ef"}}><span style={{fontSize:14,color:"var(--mt)"}}>Paid</span><span style={{fontSize:18,fontWeight:800,fontFamily:"var(--sr)",color:"var(--gl)"}}>€{totalPaid}</span></div>
          <div style={{display:"flex",justifyContent:"space-between",padding:"8px 0"}}><span style={{fontSize:14,fontWeight:600}}>Outstanding</span><span style={{fontSize:18,fontWeight:800,fontFamily:"var(--sr)",color:totalDue>0?"#c4960c":"var(--gl)"}}>€{totalDue}</span></div>
        </div>

        {/* Payment list */}
        {payments.length>0?<div style={{display:"flex",flexDirection:"column",gap:10}}>
          {payments.filter(p=>!p.paid).map(p=>{
            const club=clubs.find(c=>c.club_id===p.club_id);
            const daysLeft=Math.ceil((new Date(p.due_date)-new Date())/(86400000));
            const overdue=daysLeft<0;
            return <div key={p.id} style={{background:overdue?"#fef2f2":daysLeft<=14?"var(--accl)":"var(--card)",borderRadius:16,border:"1px solid "+(overdue?"#fecaca":daysLeft<=14?"#f0d078":"var(--bd)"),padding:16}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
                <div><div style={{fontSize:14,fontWeight:700}}>{p.description}</div><div style={{fontSize:12,color:"var(--mt)",marginTop:2}}>{club?.club_name||"Unknown"}</div></div>
                <div style={{textAlign:"right"}}><div style={{fontSize:20,fontWeight:800,fontFamily:"var(--sr)"}}>€{parseFloat(p.amount)}</div><div style={{fontSize:11,fontWeight:600,color:overdue?"#dc2626":daysLeft<=14?"#8a6d00":"var(--mt)"}}>{overdue?"Overdue":daysLeft===0?"Due today":"Due in "+daysLeft+" days"}</div></div>
              </div>
              <button onClick={async()=>{await db("payment_reminders","PATCH",{body:{paid:true,paid_at:new Date().toISOString()},filters:["id=eq."+p.id]});onRefresh()}} style={{marginTop:10,width:"100%",padding:10,borderRadius:100,border:"none",fontSize:13,fontWeight:700,cursor:"pointer",background:overdue?"#dc2626":"var(--g)",color:"#fff",fontFamily:"var(--sn)"}}>Mark as paid</button>
            </div>;
          })}
          {payments.filter(p=>p.paid).length>0&&<div style={{marginTop:8}}><div style={{fontSize:11,fontWeight:700,color:"var(--mt)",textTransform:"uppercase",letterSpacing:1,marginBottom:8}}>Paid</div>
            {payments.filter(p=>p.paid).map(p=>{const club=clubs.find(c=>c.club_id===p.club_id);return<div key={p.id} style={{display:"flex",justifyContent:"space-between",padding:"10px 14px",background:"var(--gxl)",borderRadius:12,border:"1px solid #c8e6c9",marginBottom:6}}><div><div style={{fontSize:13,fontWeight:600,color:"var(--g)"}}>{p.description}</div><div style={{fontSize:11,color:"var(--gl)"}}>{club?.club_name}</div></div><div style={{fontSize:14,fontWeight:700,color:"var(--g)"}}>✓ €{parseFloat(p.amount)}</div></div>})}
          </div>}
        </div>:<div style={{background:"var(--card)",borderRadius:20,border:"1px solid var(--bd)",padding:28,textAlign:"center"}}><div style={{fontSize:36,marginBottom:10}}>💳</div><p style={{fontFamily:"var(--sr)",fontSize:16,fontWeight:700,color:"var(--g)"}}>Track fees here</p><p style={{fontSize:13,color:"var(--mt)",marginTop:6}}>Add payment reminders for each club.</p></div>}
        <button onClick={()=>setShowAddPay(true)} style={{width:"100%",marginTop:16,padding:14,borderRadius:100,border:"2px dashed var(--bd)",background:"none",fontSize:14,fontWeight:600,color:"var(--mt)",cursor:"pointer",fontFamily:"var(--sn)"}}>+ Add a payment reminder</button>
      </div>}

      {/* ===== CAMPS ===== */}
      {tab==="camps"&&<CampsList kids={kids} filter={filter}/>}

      {/* ===== CLUBS ===== */}
      {tab==="clubs"&&<div style={{display:"flex",flexDirection:"column",gap:10}}>
        {clubs.map(c=><div key={c.club_id||c.id} style={{display:"flex",alignItems:"center",gap:12,background:"var(--card)",borderRadius:14,padding:14,border:"1px solid var(--bd)"}}>
          <div style={{width:38,height:38,borderRadius:10,display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontSize:11,fontWeight:800,background:c.colour||"#2d5a3f"}}>{(c.club_name||"?").split(" ").map(w=>w[0]).join("").substring(0,2)}</div>
          <div style={{flex:1}}><div style={{fontSize:14,fontWeight:700}}>{c.club_name}</div><div style={{fontSize:12,color:"var(--mt)"}}>{c.club_source==="external"?"Added by you":"Hosted"}</div></div>
        </div>)}
        <button onClick={()=>onNav("addClub")} style={{width:"100%",padding:14,borderRadius:14,border:"2px dashed var(--bd)",background:"none",fontSize:13,fontWeight:600,color:"var(--mt)",cursor:"pointer"}}>+ Add a club</button>
      </div>}
    </div>

    {/* Modals */}
    {showAddEvent&&<AddEventModal clubs={clubs} userId={user.id} onClose={()=>setShowAddEvent(false)} onSaved={()=>{setShowAddEvent(false);onRefresh()}}/>}
    {showAddPay&&<AddPaymentModal clubs={clubs} userId={user.id} onClose={()=>setShowAddPay(false)} onSaved={()=>{setShowAddPay(false);onRefresh()}}/>}
  </div>;
}

// =========== CAMPS LIST ===========
function CampsList({kids,filter}){
  const[camps,setCamps]=useState([]);const[ld,setLd]=useState(true);const[mc,setMc]=useState(200);const[int,setInt]=useState({});const[sf,setSf]=useState(false);
  useEffect(()=>{(async()=>{const d=await db("camps","GET",{select:"*",filters:["status=eq.active","start_date=gte."+new Date().toISOString().split("T")[0]],order:"start_date.asc"});setCamps(d||[]);setLd(false)})()},[]);
  const fl=useMemo(()=>{let r=[...camps];if(filter!=="all"){const k=kids.find(c=>c.id===filter);if(k?.date_of_birth){const a=getAge(k.date_of_birth);r=r.filter(c=>(!c.age_min||a>=c.age_min)&&(!c.age_max||a<=c.age_max))}}return r.filter(c=>!c.cost_eur||parseFloat(c.cost_eur)<=mc)},[camps,filter,mc,kids]);
  const tg=id=>setInt(p=>({...p,[id]:!p[id]}));const ic=Object.values(int).filter(Boolean).length;const it=camps.filter(c=>int[c.id]).reduce((s,c)=>s+parseFloat(c.cost_eur||0),0);
  return <div>
    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}}>
      <div><div style={{fontFamily:"var(--sr)",fontSize:16,fontWeight:700,color:"var(--g)"}}>🏕️ Easter Camps</div><div style={{fontSize:12,color:"var(--mt)"}}>{fl.length} camps</div></div>
      <button onClick={()=>setSf(!sf)} style={{padding:"6px 12px",borderRadius:100,fontSize:12,fontWeight:700,border:"none",cursor:"pointer",fontFamily:"var(--sn)",background:sf?"var(--g)":"#f5f3ef",color:sf?"#fff":"var(--mt)"}}>⚙ Filter</button>
    </div>
    {sf&&<div style={{background:"var(--card)",borderRadius:14,border:"1px solid var(--bd)",padding:14,marginBottom:12}}><div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}><span style={{fontSize:11,fontWeight:700,color:"var(--mt)",textTransform:"uppercase"}}>Max budget</span><span style={{fontSize:14,fontWeight:700,fontFamily:"var(--sr)"}}>€{mc}</span></div><input type="range" min={30} max={300} step={10} value={mc} onChange={e=>setMc(+e.target.value)}/></div>}
    {ic>0&&<div style={{background:"var(--g)",color:"#fff",borderRadius:14,padding:"10px 16px",marginBottom:12,display:"flex",justifyContent:"space-between"}}><span style={{fontSize:13,fontWeight:600}}>{ic} shortlisted</span><span style={{fontSize:15,fontWeight:800,fontFamily:"var(--sr)"}}>€{it}</span></div>}
    {ld?<div style={{textAlign:"center",padding:48}}><p style={{fontSize:13,color:"var(--mt)"}}>Loading camps...</p></div>
    :fl.length===0?<div style={{textAlign:"center",padding:48}}><p style={{fontSize:13,color:"var(--mt)"}}>No camps match</p></div>
    :<div style={{display:"flex",flexDirection:"column",gap:12}}>{fl.map(c=>{
      const tc=CT[c.camp_type]||CT.other;const ii=!!int[c.id];
      const ek=kids.filter(k=>{if(!k.date_of_birth)return true;const a2=getAge(k.date_of_birth);return(!c.age_min||a2>=c.age_min)&&(!c.age_max||a2<=c.age_max)});
      return <div key={c.id} style={{borderRadius:18,border:ii?"2px solid #a5d6a7":"1px solid var(--bd)",overflow:"hidden",background:ii?"#f1f8e9":"var(--card)"}}>
        <div style={{padding:"8px 14px",display:"flex",alignItems:"center",justifyContent:"space-between",background:tc.bg,borderBottom:"1px solid "+tc.bd}}><span style={{fontSize:11,fontWeight:700,textTransform:"uppercase",letterSpacing:.5,color:tc.tx}}>{tc.i} {tc.l}</span>{c.source==="scraped"&&<span style={{fontSize:9,padding:"3px 8px",borderRadius:100,background:"rgba(21,101,192,.1)",color:"#1565c0",fontWeight:700}}>AI found</span>}</div>
        <div style={{padding:16}}>
          <div style={{display:"flex",justifyContent:"space-between",gap:10}}>
            <div style={{flex:1}}><div style={{fontSize:15,fontWeight:700,lineHeight:1.3}}>{c.title}</div><div style={{marginTop:6,display:"flex",flexDirection:"column",gap:3,fontSize:13,color:"var(--mt)"}}>
              <div>📅 <strong style={{color:"var(--tx)"}}>{fdr(c.start_date,c.end_date)}</strong></div>
              {c.daily_start_time&&<div>🕐 {c.daily_start_time?.slice(0,5)}–{c.daily_end_time?.slice(0,5)}{c.daily_end_time>="15:00"&&<span style={{fontSize:9,padding:"2px 8px",borderRadius:100,background:"var(--gxl)",color:"var(--g)",fontWeight:700,marginLeft:4}}>Covers work day</span>}</div>}
              <div>📍 {c.location_name}</div><div>👶 Ages {c.age_min||"?"}–{c.age_max||"?"}</div>
            </div></div>
            <div style={{textAlign:"right",flexShrink:0}}><div style={{fontSize:20,fontWeight:800,color:"var(--g)",fontFamily:"var(--sr)"}}>{c.cost_eur?"€"+parseFloat(c.cost_eur):"Free"}</div>{c.cost_notes&&<div style={{fontSize:10,color:"var(--mt)",marginTop:2,maxWidth:90,lineHeight:1.3}}>{c.cost_notes}</div>}</div>
          </div>
          {ek.length>0&&<div style={{marginTop:8,display:"flex",alignItems:"center",gap:4,flexWrap:"wrap"}}><span style={{fontSize:9,color:"var(--mt)",fontWeight:700,textTransform:"uppercase"}}>Suits:</span>{ek.map(k=><span key={k.id} style={{fontSize:11,padding:"2px 10px",borderRadius:100,background:"#e3f2fd",color:"#1565c0",fontWeight:600}}>👧 {k.first_name}</span>)}</div>}
          <div style={{marginTop:12,display:"flex",gap:8}}>
            <button onClick={()=>tg(c.id)} style={{flex:1,padding:10,borderRadius:100,border:"none",fontSize:13,fontWeight:700,cursor:"pointer",fontFamily:"var(--sn)",background:ii?"var(--g)":"#f5f3ef",color:ii?"#fff":"var(--mt)"}}>{ii?"✓ Shortlisted":"☆ Shortlist"}</button>
            {c.booking_url&&<a href={c.booking_url} target="_blank" rel="noopener" style={{padding:"10px 16px",borderRadius:100,fontSize:13,fontWeight:700,background:"var(--g)",color:"#fff",textDecoration:"none"}}>Book →</a>}
          </div>
        </div>
      </div>})}</div>}
  </div>;
}

// =========== ADD AGE ===========
function AddAge({kid,onDone}){const[dob,setDob]=useState("");const[s,setS]=useState(false);
  async function save(){if(!dob)return;setS(true);await db("dependants","PATCH",{body:{date_of_birth:dob},filters:["id=eq."+kid.id]});setS(false);onDone()}
  return <div className="fi" style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",padding:20,background:"var(--warm)"}}><div style={{width:"100%",maxWidth:360,textAlign:"center"}}>
    <div style={{fontSize:48,marginBottom:12}}>🎂</div><h2 style={{fontFamily:"var(--sr)",fontSize:22,fontWeight:800,color:"var(--g)"}}>When was {kid.first_name} born?</h2><p style={{fontSize:13,color:"var(--mt)",marginTop:6}}>Helps find age-matched camps</p>
    <input type="date" value={dob} onChange={e=>setDob(e.target.value)} style={{marginTop:20,display:"block"}}/>
    <div style={{display:"flex",gap:10,marginTop:20}}><button onClick={onDone} style={{flex:1,padding:13,borderRadius:100,border:"none",fontSize:14,fontWeight:700,cursor:"pointer",background:"#f5f3ef",color:"var(--mt)",fontFamily:"var(--sn)"}}>Skip</button><button onClick={save} disabled={s||!dob} style={{flex:1,padding:13,borderRadius:100,border:"none",fontSize:14,fontWeight:700,cursor:"pointer",background:"var(--g)",color:"#fff",fontFamily:"var(--sn)",opacity:(s||!dob)?.5:1}}>Save</button></div>
  </div></div>;
}

// =========== APP ===========
function App(){
  const[scr,setScr]=useState("loading");const[user,setUser]=useState(null);const[profile,setProfile]=useState(null);
  const[kids,setKids]=useState([]);const[clubs,setClubs]=useState([]);const[payments,setPayments]=useState([]);
  const[recEvents,setRecEvents]=useState([]);const[manEvents,setManEvents]=useState([]);const[ageKid,setAgeKid]=useState(null);

  async function load(uid){
    const[p,k,c,pay,rec,man]=await Promise.all([
      db("profiles","GET",{filters:["id=eq."+uid],single:true}),
      db("dependants","GET",{filters:["parent_user_id=eq."+uid]}),
      db("hub_subscriptions","GET",{select:"id,club_id,colour,clubs(name,source)",filters:["user_id=eq."+uid]}),
      db("payment_reminders","GET",{filters:["user_id=eq."+uid],order:"due_date.asc"}),
      db("recurring_events","GET",{filters:["user_id=eq."+uid]}),
      db("manual_events","GET",{filters:["user_id=eq."+uid]}),
    ]);
    setProfile(p);setKids(k||[]);
    setClubs((c||[]).map(x=>({...x,club_name:x.clubs?.name,club_source:x.clubs?.source})));
    setPayments(pay||[]);setRecEvents(rec||[]);setManEvents(man||[]);
    if(!p?.onboarding_completed)setScr("onboard");else setScr("hub");
  }
  useEffect(()=>{(async()=>{try{const d=await au("user");if(d?.id){setUser(d);await load(d.id)}else setScr("landing")}catch{setScr("landing")}})()},[]);
  async function onAuth(u){setUser(u);await new Promise(r=>setTimeout(r,600));await load(u.id)}
  async function refresh(){if(user)await load(user.id)}
  function nav(a,d){if(a==="addClub")setScr("onboard");else if(a==="addAge"){const k=kids.find(x=>x.id===d);if(k){setAgeKid(k);setScr("addAge")}}}

  if(scr==="loading")return<div style={{minHeight:"100vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",background:"var(--warm)"}}><Logo/><p style={{fontSize:13,color:"var(--mt)",marginTop:16}}>Loading...</p></div>;
  if(scr==="landing")return<Landing onGo={()=>setScr("auth")} onLogin={()=>setScr("login")}/>;
  if(scr==="auth")return<Auth onAuth={onAuth} mode="signup"/>;
  if(scr==="login")return<Auth onAuth={onAuth} mode="login"/>;
  if(scr==="onboard")return<Onboard userId={user?.id} onDone={async()=>{await refresh();setScr("hub")}}/>;
  if(scr==="addAge"&&ageKid)return<AddAge kid={ageKid} onDone={async()=>{setAgeKid(null);await refresh();setScr("hub")}}/>;
  if(scr==="hub")return<Hub user={user} profile={profile} kids={kids} clubs={clubs} payments={payments} recEvents={recEvents} manEvents={manEvents} onNav={nav} onRefresh={refresh}/>;
  return null;
}
ReactDOM.render(<App/>,document.getElementById("root"));
</script>
</body>
</html>

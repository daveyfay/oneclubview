<div id="root"></div>
<script type="text/babel">
const{useState,useEffect,useMemo}=React;
const SB="https://uqihwazheypvmrcrqklg.supabase.co",SK="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVxaWh3YXpoZXlwdm1yY3Jxa2xnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI4Nzg1MjQsImV4cCI6MjA4ODQ1NDUyNH0.n5I1lkCu7Tf1sBbIceWUdsRQtIrH7-WGc3itZAfrBKI";
let _t=null;
function hd(){return{apikey:SK,"Content-Type":"application/json",Authorization:"Bearer "+(_t||SK)}}
async function au(a,b){const ep={signup:"/auth/v1/signup",login:"/auth/v1/token?grant_type=password",user:"/auth/v1/user"};const r=await fetch(SB+ep[a],{method:a==="user"?"GET":"POST",headers:hd(),body:a==="user"?undefined:JSON.stringify(b)});const d=await r.json();if(!r.ok)throw new Error(d.msg||d.error_description||d.message||"Error");if(d.access_token)_t=d.access_token;return d}
async function db(t,m,o={}){let u=SB+"/rest/v1/"+t;const p=[];if(o.select)p.push("select="+encodeURIComponent(o.select));if(o.filters)o.filters.forEach(f=>p.push(f));if(o.order)p.push("order="+o.order);if(o.limit)p.push("limit="+o.limit);if(p.length)u+="?"+p.join("&");const h=hd();if(m==="POST")h["Prefer"]="return=representation";if(m==="PATCH")h["Prefer"]="return=representation";if(o.single)h["Accept"]="application/vnd.pgrst.object+json";const r=await fetch(u,{method:m,headers:h,body:o.body?JSON.stringify(o.body):undefined});if(!r.ok){console.error("DB error:",await r.text());return null}const txt=await r.text();return txt?JSON.parse(txt):null}

const CT={sport:{l:"Sport",i:"⚽",bg:"#ecfdf5",tx:"#047857",bd:"#a7f3d0"},arts:{l:"Arts",i:"🎨",bg:"#faf5ff",tx:"#7c3aed",bd:"#ddd6fe"},stem:{l:"STEM",i:"🤖",bg:"#eff6ff",tx:"#1d4ed8",bd:"#bfdbfe"},outdoor:{l:"Outdoor",i:"🏔️",bg:"#f0fdfa",tx:"#0f766e",bd:"#99f6e4"},drama:{l:"Drama",i:"🎭",bg:"#fffbeb",tx:"#b45309",bd:"#fde68a"},multi_activity:{l:"Multi",i:"🎪",bg:"#fff7ed",tx:"#c2410c",bd:"#fed7aa"},music:{l:"Music",i:"🎵",bg:"#fdf2f8",tx:"#be185d",bd:"#fbcfe8"},other:{l:"Other",i:"📌",bg:"#f9fafb",tx:"#374151",bd:"#e5e7eb"}};
function age(d){if(!d)return null;const t=new Date(),b=new Date(d);let a=t.getFullYear()-b.getFullYear();if(t.getMonth()<b.getMonth()||(t.getMonth()===b.getMonth()&&t.getDate()<b.getDate()))a--;return a}
function fdr(s,e){const sd=new Date(s+"T00:00:00"),ed=new Date(e+"T00:00:00");if(sd.getMonth()===ed.getMonth())return sd.getDate()+"–"+ed.getDate()+" "+sd.toLocaleDateString("en-IE",{month:"short"});return sd.toLocaleDateString("en-IE",{day:"numeric",month:"short"})+" – "+ed.toLocaleDateString("en-IE",{day:"numeric",month:"short"})}
const IS={width:"100%",padding:"11px 14px",borderRadius:12,border:"1px solid #d6d3d1",fontSize:14,outline:"none",background:"#fff"};
const Btn=({children,onClick,disabled,primary,style:s})=><button onClick={onClick} disabled={disabled} style={{width:"100%",padding:13,borderRadius:12,border:"none",fontSize:14,fontWeight:700,cursor:disabled?"wait":"pointer",opacity:disabled?.6:1,color:primary?"#fff":"#57534e",background:primary?"#1B4332":"#f5f5f4",...s}}>{children}</button>;
const Logo=({s})=><span style={{fontSize:s==="lg"?"28px":s==="md"?"20px":"15px",fontWeight:900,letterSpacing:"-0.5px"}}><span style={{color:"#2D6A4F"}}>One</span><span style={{color:"#1B4332"}}>Club</span><span style={{color:"#40916C"}}>View</span></span>;

// =========== LANDING ===========
function Landing({onGo}){
  return <div className="fi" style={{minHeight:"100vh",background:"linear-gradient(180deg,#f0fdf4 0%,#fafaf9 40%)"}}>
    <div style={{maxWidth:480,margin:"0 auto",padding:"0 20px"}}>
      <div style={{paddingTop:60,textAlign:"center"}} className="su">
        <Logo s="lg"/>
        <h1 style={{fontSize:32,fontWeight:900,color:"#1c1917",lineHeight:1.15,marginTop:20}}>Stop juggling.<br/>Start seeing.</h1>
        <p style={{fontSize:16,color:"#78716c",marginTop:12,lineHeight:1.5}}>Swimming on Tuesday. GAA fees due. Easter camps to book. <strong style={{color:"#1c1917"}}>All your family's clubs in one place.</strong></p>
      </div>
      <div className="su2" style={{marginTop:32,background:"#fff",borderRadius:24,border:"1px solid #e7e5e4",padding:16,boxShadow:"0 8px 30px rgba(0,0,0,.06)"}}>
        <div style={{display:"flex",gap:8,marginBottom:12}}>
          {["👧 Emma","👦 Jack","🧒 Lily"].map((n,i)=><span key={i} style={{padding:"4px 10px",borderRadius:16,fontSize:11,fontWeight:600,background:i===0?"#1c1917":"#f5f5f4",color:i===0?"#fff":"#78716c"}}>{n}</span>)}
        </div>
        {[{t:"Swimming Training",c:"Raheny Swimming",d:"Tue 6pm",col:"#457B9D"},{t:"Hurling Training",c:"Clontarf GAA",d:"Wed 4:30pm",col:"#2D6A4F"},{t:"Scout Meeting",c:"7th Dublin Scouts",d:"Fri 7pm",col:"#E9C46A"}].map((e,i)=>
          <div key={i} style={{display:"flex",alignItems:"center",gap:10,padding:"10px 0",borderBottom:i<2?"1px solid #f5f5f4":"none"}}>
            <div style={{width:28,height:28,borderRadius:6,background:e.col,display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontSize:9,fontWeight:700}}>{e.c.substring(0,2).toUpperCase()}</div>
            <div style={{flex:1}}><div style={{fontSize:13,fontWeight:600,color:"#1c1917"}}>{e.t}</div><div style={{fontSize:11,color:"#a8a29e"}}>{e.c}</div></div>
            <span style={{fontSize:11,fontWeight:600,color:"#78716c"}}>{e.d}</span>
          </div>)}
        <div style={{marginTop:12,display:"flex",gap:8}}>
          <div style={{flex:1,background:"#fffbeb",borderRadius:10,padding:10,textAlign:"center",border:"1px solid #fde68a"}}><div style={{fontSize:18,fontWeight:900,color:"#b45309"}}>€295</div><div style={{fontSize:9,color:"#b45309",fontWeight:600}}>Fees due</div></div>
          <div style={{flex:1,background:"#ecfdf5",borderRadius:10,padding:10,textAlign:"center",border:"1px solid #a7f3d0"}}><div style={{fontSize:18,fontWeight:900,color:"#059669"}}>3</div><div style={{fontSize:9,color:"#059669",fontWeight:600}}>Camps found</div></div>
        </div>
      </div>
      <div className="su3" style={{marginTop:32}}>
        {[{e:"📅",t:"One weekly view",d:"Every club, every kid, every event"},{e:"💳",t:"Track every fee",d:"Know what's paid, what's due, total spend"},{e:"🏕️",t:"Find camps automatically",d:"Matched to your kids' ages"},{e:"⏰",t:"Fits your work day?",d:"Filter camps by times that work for you"}].map((v,i)=>
          <div key={i} style={{display:"flex",gap:14,padding:"12px 0",borderBottom:i<3?"1px solid #e7e5e4":"none"}}>
            <span style={{fontSize:24}}>{v.e}</span>
            <div><div style={{fontSize:14,fontWeight:700,color:"#1c1917"}}>{v.t}</div><div style={{fontSize:12,color:"#78716c",marginTop:1}}>{v.d}</div></div>
          </div>)}
      </div>
      <div className="su4" style={{marginTop:32,paddingBottom:40}}>
        <Btn primary onClick={onGo} style={{fontSize:16,padding:16}}>Get started — it's free</Btn>
        <p style={{textAlign:"center",fontSize:11,color:"#a8a29e",marginTop:8}}>Takes 30 seconds. No credit card.</p>
        <button onClick={onGo} style={{width:"100%",marginTop:12,background:"none",border:"none",fontSize:13,color:"#78716c",cursor:"pointer",textDecoration:"underline"}}>Already have an account? Log in</button>
      </div>
    </div>
  </div>;
}

// =========== AUTH ===========
function Auth({onAuth,mode:initMode}){
  const[mode,setMode]=useState(initMode||"signup");const[email,setEmail]=useState("");const[pw,setPw]=useState("");const[err,setErr]=useState(null);const[loading,setLoading]=useState(false);
  async function go(){setLoading(true);setErr(null);try{if(mode==="signup"){const d=await au("signup",{email,password:pw,data:{}});onAuth(d.user||d)}else{const d=await au("login",{email,password:pw});onAuth(d.user)}}catch(e){setErr(e.message)}setLoading(false)}
  return <div className="fi" style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",padding:16,background:"#fafaf9"}}>
    <div style={{width:"100%",maxWidth:380}}>
      <div style={{textAlign:"center",marginBottom:24}}><Logo s="lg"/></div>
      <div style={{background:"#fff",borderRadius:20,border:"1px solid #e7e5e4",padding:24}}>
        <div style={{display:"flex",background:"#f5f5f4",borderRadius:12,padding:4,marginBottom:20}}>
          {["signup","login"].map(m=><button key={m} onClick={()=>setMode(m)} style={{flex:1,padding:"8px 0",borderRadius:8,border:"none",cursor:"pointer",fontSize:13,fontWeight:700,background:mode===m?"#fff":"transparent",color:mode===m?"#1c1917":"#a8a29e"}}>{m==="signup"?"Sign up":"Log in"}</button>)}
        </div>
        {err&&<div style={{marginBottom:16,padding:12,borderRadius:12,background:"#fef2f2",color:"#b91c1c",fontSize:12,fontWeight:500}}>{err}</div>}
        <div style={{display:"flex",flexDirection:"column",gap:12}}>
          <input type="email" value={email} onChange={e=>setEmail(e.target.value)} placeholder="Email" style={IS}/>
          <input type="password" value={pw} onChange={e=>setPw(e.target.value)} placeholder="Password" style={IS} onKeyDown={e=>e.key==="Enter"&&go()}/>
          <Btn primary onClick={go} disabled={loading}>{loading?"...":mode==="signup"?"Create my hub":"Log in"}</Btn>
        </div>
      </div>
    </div>
  </div>;
}

// =========== ONBOARDING ===========
function Onboard({userId,onDone}){
  const[step,setStep]=useState(1);const[kidName,setKidName]=useState("");const[kids,setKids]=useState([]);
  const[clubName,setClubName]=useState("");const[clubs,setClubs]=useState([]);const[saving,setSaving]=useState(false);
  const colours=["#E63946","#457B9D","#2D6A4F","#E9C46A","#264653","#F4A261"];
  async function addKid(){if(!kidName.trim())return;setSaving(true);await db("dependants","POST",{body:{parent_user_id:userId,first_name:kidName.trim()}});setKids([...kids,kidName.trim()]);setKidName("");setSaving(false)}
  async function addClub(){if(!clubName.trim())return;setSaving(true);try{const ex=await db("clubs","GET",{select:"id,name",filters:["name=ilike.*"+clubName.trim()+"*"],limit:1});let cid;if(ex&&ex.length){cid=ex[0].id}else{let sl=clubName.trim().toLowerCase().replace(/[^a-z0-9]+/g,"-").replace(/^-+|-+$/g,"");if(sl.length<3)sl=sl+"-club";sl=sl+"-"+Math.random().toString(36).substring(2,6);const r=await db("clubs","POST",{body:{name:clubName.trim(),slug:sl,source:"external"}});cid=r?.[0]?.id}if(cid){await db("hub_subscriptions","POST",{body:{user_id:userId,club_id:cid,colour:colours[clubs.length%6]}});setClubs([...clubs,{id:cid,name:clubName.trim()}])}}catch(e){console.error(e)}setClubName("");setSaving(false)}
  async function finish(){await db("profiles","PATCH",{body:{onboarding_step:"done",onboarding_completed:true},filters:["id=eq."+userId]});onDone()}

  if(step===1)return <div className="fi" style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",padding:16,background:"#fafaf9"}}>
    <div style={{width:"100%",maxWidth:380,textAlign:"center"}}>
      <div style={{fontSize:48,marginBottom:8}}>👋</div>
      <h2 style={{fontSize:22,fontWeight:900,color:"#1c1917"}}>Who's in your family?</h2>
      <p style={{fontSize:13,color:"#a8a29e",marginTop:6}}>Just first names — that's all we need right now</p>
      {kids.length>0&&<div style={{margin:"16px 0",display:"flex",flexWrap:"wrap",gap:8,justifyContent:"center"}}>{kids.map((k,i)=><span key={i} style={{padding:"6px 14px",borderRadius:20,background:"#ecfdf5",border:"1px solid #a7f3d0",fontSize:13,fontWeight:600,color:"#059669"}}>✓ {k}</span>)}</div>}
      <div style={{display:"flex",gap:8,marginTop:16}}><input value={kidName} onChange={e=>setKidName(e.target.value)} placeholder="Child's first name" onKeyDown={e=>e.key==="Enter"&&addKid()} style={{...IS,flex:1}}/><button onClick={addKid} disabled={saving||!kidName.trim()} style={{padding:"0 20px",borderRadius:12,border:"none",background:"#1B4332",color:"#fff",fontSize:13,fontWeight:700,cursor:"pointer",opacity:(!kidName.trim()||saving)?.4:1}}>Add</button></div>
      <Btn onClick={()=>setStep(2)} primary={kids.length>0} style={{marginTop:24,...(kids.length===0?{background:"#e7e5e4",color:"#78716c"}:{})}}>{kids.length===0?"Skip — just me":"Next →"}</Btn>
    </div>
  </div>;

  return <div className="fi" style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",padding:16,background:"#fafaf9"}}>
    <div style={{width:"100%",maxWidth:380,textAlign:"center"}}>
      <div style={{fontSize:48,marginBottom:8}}>🏠</div>
      <h2 style={{fontSize:22,fontWeight:900,color:"#1c1917"}}>What clubs are you in?</h2>
      <p style={{fontSize:13,color:"#a8a29e",marginTop:6}}>Swimming, GAA, tennis, scouts — any club</p>
      {clubs.length>0&&<div style={{margin:"16px 0",display:"flex",flexDirection:"column",gap:8}}>{clubs.map((c,i)=><div key={c.id} style={{display:"flex",alignItems:"center",gap:10,background:"#ecfdf5",borderRadius:12,padding:"8px 14px",border:"1px solid #a7f3d0"}}><div style={{width:28,height:28,borderRadius:6,background:colours[i%6],display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontSize:9,fontWeight:700}}>{c.name.substring(0,2).toUpperCase()}</div><span style={{fontSize:13,fontWeight:600,color:"#1c1917"}}>{c.name}</span><span style={{marginLeft:"auto",fontSize:11,color:"#059669",fontWeight:700}}>✓</span></div>)}</div>}
      <div style={{display:"flex",gap:8,marginTop:16}}><input value={clubName} onChange={e=>setClubName(e.target.value)} placeholder="Club name" onKeyDown={e=>e.key==="Enter"&&addClub()} style={{...IS,flex:1}}/><button onClick={addClub} disabled={saving||!clubName.trim()} style={{padding:"0 20px",borderRadius:12,border:"none",background:"#1B4332",color:"#fff",fontSize:13,fontWeight:700,cursor:"pointer",opacity:(!clubName.trim()||saving)?.4:1}}>Add</button></div>
      <Btn primary onClick={finish} style={{marginTop:24}}>{clubs.length===0?"Skip — I'll add later":"Go to my hub →"}</Btn>
    </div>
  </div>;
}

// =========== HUB ===========
function Hub({profile,kids,clubs,onNav}){
  const[tab,setTab]=useState("week");const[filter,setFilter]=useState("all");
  const members=[{id:"all",name:"Everyone",emoji:"👨‍👩‍👧‍👦"},...kids.map(k=>({id:k.id,name:k.first_name,emoji:"👧",a:age(k.date_of_birth)}))];
  const tabs=[{id:"week",l:"This Week",i:"📅"},{id:"money",l:"Money",i:"💳"},{id:"camps",l:"Camps",i:"🏕️"},{id:"clubs",l:"Clubs",i:"🏠"}];
  const kidsNoAge=kids.filter(k=>!k.date_of_birth);

  return <div className="fi">
    <div style={{background:"#fff",borderBottom:"1px solid #e7e5e4"}}>
      <div style={{maxWidth:480,margin:"0 auto",padding:"14px 16px 8px"}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8}}><Logo s="md"/><div style={{width:30,height:30,borderRadius:"50%",background:"#1c1917",display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontSize:12,fontWeight:700}}>{(profile?.first_name||"U")[0]}</div></div>

      </div>
      <div style={{maxWidth:480,margin:"0 auto",display:"flex"}}>{tabs.map(t=><button key={t.id} onClick={()=>setTab(t.id)} style={{flex:1,display:"flex",alignItems:"center",justifyContent:"center",gap:3,padding:"8px 0",fontSize:11,fontWeight:600,border:"none",borderBottom:tab===t.id?"2.5px solid #1B4332":"2.5px solid transparent",cursor:"pointer",background:"none",color:tab===t.id?"#1c1917":"#a8a29e"}}>{t.i} {t.l}</button>)}</div>
    </div>

    <div style={{maxWidth:480,margin:"0 auto",padding:16,paddingBottom:80}}>
      {kidsNoAge.length>0&&tab!=="camps"&&<div style={{background:"#eff6ff",border:"1px solid #bfdbfe",borderRadius:12,padding:10,marginBottom:12,display:"flex",alignItems:"center",gap:8}}>
        <span>💡</span><div style={{flex:1,fontSize:12,fontWeight:600,color:"#1e40af"}}>Add {kidsNoAge[0].first_name}'s age to find camps</div>
        <button onClick={()=>onNav("addAge",kidsNoAge[0].id)} style={{padding:"5px 10px",borderRadius:8,border:"none",background:"#1d4ed8",color:"#fff",fontSize:11,fontWeight:700,cursor:"pointer"}}>Add</button>
      </div>}

      {tab==="week"&&<div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:14}}>
          <div style={{background:"#fff",borderRadius:12,padding:12,textAlign:"center",border:"1px solid #f5f5f4"}}><div style={{fontSize:22,fontWeight:900}}>{clubs.length}</div><div style={{fontSize:10,color:"#78716c",fontWeight:500}}>Clubs</div></div>
          <div style={{background:"#fff",borderRadius:12,padding:12,textAlign:"center",border:"1px solid #f5f5f4"}}><div style={{fontSize:22,fontWeight:900}}>{kids.length}</div><div style={{fontSize:10,color:"#78716c",fontWeight:500}}>Kids</div></div>
          <div style={{background:"#fffbeb",borderRadius:12,padding:12,textAlign:"center",border:"1px solid #fde68a"}}><div style={{fontSize:22,fontWeight:900,color:"#b45309"}}>—</div><div style={{fontSize:10,color:"#b45309",fontWeight:500}}>Fees due</div></div>
        </div>
        <div style={{background:"#fff",borderRadius:16,border:"1px solid #e7e5e4",padding:24,textAlign:"center"}}>
          <div style={{fontSize:36,marginBottom:8}}>📅</div>
          <p style={{fontSize:14,fontWeight:600,color:"#44403c"}}>Your week will show here</p>
          <p style={{fontSize:12,color:"#a8a29e",marginTop:4,lineHeight:1.5}}>Add events to your clubs and they'll appear here. Check out <strong style={{color:"#1c1917"}}>Camps</strong> to find Easter activities!</p>
          <button onClick={()=>setTab("camps")} style={{marginTop:14,padding:"9px 20px",borderRadius:10,border:"none",fontSize:13,fontWeight:700,color:"#fff",background:"#1B4332",cursor:"pointer"}}>🏕️ Browse Easter Camps</button>
        </div>
      </div>}

      {tab==="money"&&<div>
        <div style={{background:"#fff",borderRadius:16,border:"1px solid #e7e5e4",padding:18,marginBottom:12}}>
          <div style={{fontSize:10,fontWeight:700,color:"#a8a29e",textTransform:"uppercase",letterSpacing:1,marginBottom:10}}>2026 Overview</div>
          {[["Total club fees","—","#1c1917"],["Paid so far","—","#059669"],["Outstanding","—","#b45309"]].map(([l,v,c],i)=><div key={i} style={{display:"flex",justifyContent:"space-between",padding:"7px 0",borderBottom:i<2?"1px solid #f5f5f4":"none"}}><span style={{fontSize:13,color:"#57534e"}}>{l}</span><span style={{fontSize:16,fontWeight:900,color:c}}>{v}</span></div>)}
        </div>
        <div style={{background:"#fff",borderRadius:16,border:"1px solid #e7e5e4",padding:24,textAlign:"center"}}>
          <div style={{fontSize:36,marginBottom:8}}>💳</div>
          <p style={{fontSize:14,fontWeight:600,color:"#44403c"}}>Track your club fees here</p>
          <p style={{fontSize:12,color:"#a8a29e",marginTop:4,lineHeight:1.5}}>Add payment reminders for each club — annual fees, camp costs, kit money.</p>
        </div>
      </div>}

      {tab==="camps"&&<CampsList kids={kids} filter={filter}/>}

      {tab==="clubs"&&<div style={{display:"flex",flexDirection:"column",gap:8}}>
        {clubs.map(c=><div key={c.club_id||c.id} style={{display:"flex",alignItems:"center",gap:10,background:"#fff",borderRadius:12,padding:12,border:"1px solid #f5f5f4"}}>
          <div style={{width:34,height:34,borderRadius:8,display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontSize:10,fontWeight:700,background:c.colour||"#457B9D"}}>{(c.club_name||"?").substring(0,2).toUpperCase()}</div>
          <div><div style={{fontSize:13,fontWeight:700,color:"#1c1917"}}>{c.club_name}</div><div style={{fontSize:11,color:"#a8a29e"}}>{c.club_source==="external"?"Added by you":"Hosted"}</div></div>
        </div>)}
        <button onClick={()=>onNav("addClub")} style={{width:"100%",padding:12,borderRadius:12,border:"2px dashed #d6d3d1",background:"none",fontSize:13,fontWeight:600,color:"#a8a29e",cursor:"pointer"}}>+ Add a club</button>
      </div>}
    </div>
  </div>;
}

// =========== CAMPS LIST ===========
function CampsList({kids,filter}){
  const[camps,setCamps]=useState([]);const[ld,setLd]=useState(true);const[mc,setMc]=useState(200);const[int,setInt]=useState({});const[sf,setSf]=useState(false);
  useEffect(()=>{(async()=>{const d=await db("camps","GET",{select:"*",filters:["status=eq.active","start_date=gte."+new Date().toISOString().split("T")[0]],order:"start_date.asc"});setCamps(d||[]);setLd(false)})()},[]);
  const fl=useMemo(()=>{let r=[...camps];if(filter!=="all"){const k=kids.find(c=>c.id===filter);if(k?.date_of_birth){const a=age(k.date_of_birth);r=r.filter(c=>(!c.age_min||a>=c.age_min)&&(!c.age_max||a<=c.age_max))}}r=r.filter(c=>!c.cost_eur||parseFloat(c.cost_eur)<=mc);return r},[camps,filter,mc,kids]);
  const tg=id=>setInt(p=>({...p,[id]:!p[id]}));const ic=Object.values(int).filter(Boolean).length;const it=camps.filter(c=>int[c.id]).reduce((s,c)=>s+parseFloat(c.cost_eur||0),0);

  return <div>
    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>
      <div><div style={{fontSize:14,fontWeight:800,color:"#1c1917"}}>🏕️ Easter Camps 2026</div><div style={{fontSize:11,color:"#a8a29e"}}>{fl.length} camps · Dublin</div></div>
      <button onClick={()=>setSf(!sf)} style={{padding:"4px 10px",borderRadius:8,fontSize:11,fontWeight:700,border:"none",cursor:"pointer",background:sf?"#1c1917":"#f5f5f4",color:sf?"#fff":"#78716c"}}>⚙</button>
    </div>
    {sf&&<div style={{background:"#fff",borderRadius:10,border:"1px solid #e7e5e4",padding:10,marginBottom:10}}>
      <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}><span style={{fontSize:10,fontWeight:700,color:"#a8a29e",textTransform:"uppercase"}}>Max budget</span><span style={{fontSize:13,fontWeight:700}}>€{mc}</span></div>
      <input type="range" min={30} max={300} step={10} value={mc} onChange={e=>setMc(+e.target.value)}/>
    </div>}
    {ic>0&&<div style={{background:"#1B4332",color:"#fff",borderRadius:10,padding:"7px 12px",marginBottom:10,display:"flex",justifyContent:"space-between"}}><span style={{fontSize:12,fontWeight:600}}>{ic} camp{ic>1?"s":""} shortlisted</span><span style={{fontSize:13,fontWeight:900}}>Total: €{it}</span></div>}
    {ld?<div style={{textAlign:"center",padding:40}}><div className="pu" style={{fontSize:36}}>🏕️</div><p style={{fontSize:12,color:"#a8a29e",marginTop:10}}>Loading camps...</p></div>
    :fl.length===0?<div style={{textAlign:"center",padding:40}}><div style={{fontSize:36}}>🔍</div><p style={{fontSize:12,fontWeight:600,color:"#78716c",marginTop:8}}>No camps match</p></div>
    :<div style={{display:"flex",flexDirection:"column",gap:10}}>{fl.map(c=>{
      const tc=CT[c.camp_type]||CT.other;const ii=!!int[c.id];
      const ek=kids.filter(k=>{if(!k.date_of_birth)return true;const a2=age(k.date_of_birth);return(!c.age_min||a2>=c.age_min)&&(!c.age_max||a2<=c.age_max)});
      return <div key={c.id} style={{borderRadius:14,border:ii?"1.5px solid #86efac":"1px solid #e7e5e4",overflow:"hidden",background:ii?"#f0fdf4":"#fff"}}>
        <div style={{padding:"6px 12px",display:"flex",alignItems:"center",justifyContent:"space-between",background:tc.bg,borderBottom:"1px solid "+tc.bd}}>
          <span style={{fontSize:10,fontWeight:700,textTransform:"uppercase",letterSpacing:.5,color:tc.tx}}>{tc.i} {tc.l}</span>
          {c.source==="scraped"&&<span style={{fontSize:8,padding:"2px 5px",borderRadius:4,background:"#eff6ff",color:"#3b82f6",fontWeight:600}}>AI found</span>}
        </div>
        <div style={{padding:12}}>
          <div style={{display:"flex",justifyContent:"space-between",gap:8}}>
            <div style={{flex:1}}>
              <div style={{fontSize:13,fontWeight:700,color:"#1c1917",lineHeight:1.3}}>{c.title}</div>
              <div style={{marginTop:5,display:"flex",flexDirection:"column",gap:2,fontSize:12,color:"#57534e"}}>
                <div>📅 <strong>{fdr(c.start_date,c.end_date)}</strong></div>
                {c.daily_start_time&&<div style={{display:"flex",alignItems:"center",gap:4}}>🕐 {c.daily_start_time?.slice(0,5)}–{c.daily_end_time?.slice(0,5)}{c.daily_end_time>="15:00"&&<span style={{fontSize:8,padding:"1px 4px",borderRadius:3,background:"#dcfce7",color:"#15803d",fontWeight:600}}>Work day ✓</span>}</div>}
                <div>📍 {c.location_name}</div>
                <div>👶 Ages {c.age_min||"?"}–{c.age_max||"?"}</div>
              </div>
            </div>
            <div style={{textAlign:"right",flexShrink:0}}>
              <div style={{fontSize:18,fontWeight:900,color:"#1c1917"}}>{c.cost_eur?"€"+parseFloat(c.cost_eur):"Free"}</div>
              {c.cost_notes&&<div style={{fontSize:8,color:"#a8a29e",marginTop:2,maxWidth:80,lineHeight:1.3}}>{c.cost_notes}</div>}
            </div>
          </div>
          {ek.length>0&&<div style={{marginTop:6,display:"flex",alignItems:"center",gap:4,flexWrap:"wrap"}}>
            <span style={{fontSize:8,color:"#a8a29e",fontWeight:600,textTransform:"uppercase",letterSpacing:.5}}>Suits:</span>
            {ek.map(k=><span key={k.id} style={{fontSize:10,padding:"1px 6px",borderRadius:6,background:"#eff6ff",color:"#1d4ed8",fontWeight:500}}>👧 {k.first_name}</span>)}
          </div>}
          <div style={{marginTop:8,display:"flex",gap:6}}>
            <button onClick={()=>tg(c.id)} style={{flex:1,padding:8,borderRadius:10,border:"none",fontSize:12,fontWeight:700,cursor:"pointer",background:ii?"#16a34a":"#f5f5f4",color:ii?"#fff":"#57534e"}}>{ii?"✓ Interested":"☆ Interested"}</button>
            {c.booking_url&&<a href={c.booking_url} target="_blank" rel="noopener" style={{padding:"8px 12px",borderRadius:10,fontSize:12,fontWeight:700,background:"#1c1917",color:"#fff",textDecoration:"none"}}>Book →</a>}
          </div>
        </div>
      </div>})}</div>}
  </div>;
}

// =========== ADD AGE ===========
function AddAge({kid,onDone}){const[dob,setDob]=useState("");const[s,setS]=useState(false);
  async function save(){if(!dob)return;setS(true);await db("dependants","PATCH",{body:{date_of_birth:dob},filters:["id=eq."+kid.id]});setS(false);onDone()}
  return <div className="fi" style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",padding:16,background:"#fafaf9"}}>
    <div style={{width:"100%",maxWidth:340,textAlign:"center"}}>
      <div style={{fontSize:48,marginBottom:8}}>🎂</div>
      <h2 style={{fontSize:20,fontWeight:900,color:"#1c1917"}}>When was {kid.first_name} born?</h2>
      <p style={{fontSize:12,color:"#a8a29e",marginTop:4}}>Helps us find camps matched to their age</p>
      <input type="date" value={dob} onChange={e=>setDob(e.target.value)} style={{...IS,marginTop:16,display:"block"}}/>
      <div style={{display:"flex",gap:8,marginTop:16}}><Btn onClick={onDone}>Skip</Btn><Btn primary onClick={save} disabled={s||!dob}>{s?"...":"Save"}</Btn></div>
    </div>
  </div>;
}

// =========== APP ===========
function App(){
  const[scr,setScr]=useState("loading");const[user,setUser]=useState(null);const[profile,setProfile]=useState(null);
  const[kids,setKids]=useState([]);const[clubs,setClubs]=useState([]);const[ageKid,setAgeKid]=useState(null);

  async function load(uid){
    const[p,k,c]=await Promise.all([db("profiles","GET",{filters:["id=eq."+uid],single:true}),db("dependants","GET",{filters:["parent_user_id=eq."+uid]}),db("hub_subscriptions","GET",{select:"id,club_id,colour,clubs(name,source)",filters:["user_id=eq."+uid]})]);
    setProfile(p);setKids(k||[]);setClubs((c||[]).map(x=>({...x,club_name:x.clubs?.name,club_source:x.clubs?.source})));
    if(!p?.onboarding_completed)setScr("onboard");else setScr("hub");
  }
  useEffect(()=>{(async()=>{try{const d=await au("user");if(d?.id){setUser(d);await load(d.id)}else setScr("landing")}catch{setScr("landing")}})()},[]);
  async function onAuth(u){setUser(u);await new Promise(r=>setTimeout(r,600));await load(u.id)}
  async function refresh(){if(user)await load(user.id)}
  function nav(a,d){if(a==="addClub")setScr("onboard");else if(a==="addAge"){const k=kids.find(x=>x.id===d);if(k){setAgeKid(k);setScr("addAge")}}}

  if(scr==="loading")return<div style={{minHeight:"100vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center"}}><Logo s="lg"/><p className="pu" style={{fontSize:12,color:"#a8a29e",marginTop:12}}>Loading...</p></div>;
  if(scr==="landing")return<Landing onGo={()=>setScr("auth")}/>;
  if(scr==="auth")return<Auth onAuth={onAuth}/>;
  if(scr==="onboard")return<Onboard userId={user?.id} onDone={async()=>{await refresh();setScr("hub")}}/>;
  if(scr==="addAge"&&ageKid)return<AddAge kid={ageKid} onDone={async()=>{setAgeKid(null);await refresh();setScr("hub")}}/>;
  if(scr==="hub")return<Hub profile={profile} kids={kids} clubs={clubs} onNav={nav}/>;
  return null;
}
ReactDOM.render(<App/>,document.getElementById("root"));
</script>

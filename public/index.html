function Auth({onAuth,mode:initMode}){

  const Wrap=({children})=><div className="fi" style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",padding:20,background:"var(--warm)"}}><div style={{width:"100%",maxWidth:420,textAlign:"center"}}>{children}</div></div>;

    <div style={{fontSize:48,marginBottom:12}}>👋</div>
    <h2 style={{fontFamily:"var(--serif)",fontSize:24,fontWeight:800,color:"var(--green)"}}>Who's in your family?</h2>
    <p style={{fontSize:14,color:"var(--muted)",marginTop:6}}>Just first names — we keep it simple</p>
    {kids.length>0&&<div style={{margin:"20px 0",display:"flex",flexWrap:"wrap",gap:8,justifyContent:"center"}}>{kids.map((k,i)=><span key={i} style={{padding:"6px 16px",borderRadius:100,background:"var(--green-xl)",border:"1px solid #c8e6c9",fontSize:14,fontWeight:600,color:"var(--green)"}}>✓ {k}</span>)}</div>}
    <div style={{display:"flex",gap:8,marginTop:20}}><input value={kidName} onChange={e=>setKidName(e.target.value)} placeholder="Child's first name" onKeyDown={e=>e.key==="Enter"&&addKid()} style={{...IS,flex:1}}/><button onClick={addKid} disabled={saving||!kidName.trim()} style={{padding:"0 24px",borderRadius:100,border:"none",background:"var(--green)",color:"#fff",fontSize:13,fontWeight:700,cursor:"pointer",opacity:(!kidName.trim()||saving)?.4:1}}>Add</button></div>
    <button onClick={()=>setStep(2)} style={{marginTop:28,width:"100%",padding:14,borderRadius:100,border:"none",fontSize:14,fontWeight:700,cursor:"pointer",color:kids.length>0?"#fff":"var(--muted)",background:kids.length>0?"var(--green)":"#e8e4df",fontFamily:"var(--sans)"}}>{kids.length===0?"Skip — just me":"Next →"}</button>
  </Wrap>;

  return <Wrap>
    <div style={{fontSize:48,marginBottom:12}}>🏠</div>
    <h2 style={{fontFamily:"var(--serif)",fontSize:24,fontWeight:800,color:"var(--green)"}}>What clubs are you in?</h2>
    <p style={{fontSize:14,color:"var(--muted)",marginTop:6}}>Swimming, GAA, tennis, scouts — any club</p>
    {clubs.length>0&&<div style={{margin:"20px 0",display:"flex",flexDirection:"column",gap:8}}>{clubs.map((c,i)=><div key={c.id} style={{display:"flex",alignItems:"center",gap:10,background:"var(--green-xl)",borderRadius:14,padding:"10px 16px",border:"1px solid #c8e6c9"}}><div style={{width:30,height:30,borderRadius:8,background:colours[i%6],display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontSize:10,fontWeight:800}}>{c.name.split(" ").map(w=>w[0]).join("").substring(0,2)}</div><span style={{fontSize:14,fontWeight:600,color:"var(--green)"}}>{c.name}</span><span style={{marginLeft:"auto",fontSize:12,color:"var(--green-l)"}}>✓</span></div>)}</div>}
    <div style={{display:"flex",gap:8,marginTop:20}}><input value={clubName} onChange={e=>setClubName(e.target.value)} placeholder="Club name" onKeyDown={e=>e.key==="Enter"&&addClub()} style={{...IS,flex:1}}/><button onClick={addClub} disabled={saving||!clubName.trim()} style={{padding:"0 24px",borderRadius:100,border:"none",background:"var(--green)",color:"#fff",fontSize:13,fontWeight:700,cursor:"pointer",opacity:(!clubName.trim()||saving)?.4:1}}>Add</button></div>
    <button onClick={finish} style={{marginTop:28,width:"100%",padding:14,borderRadius:100,border:"none",fontSize:14,fontWeight:700,cursor:"pointer",color:"#fff",background:"var(--green)",fontFamily:"var(--sans)"}}>{clubs.length===0?"Skip — I'll add later":"Go to my hub →"}</button>
  </Wrap>;
}

// =========== HUB ===========
function Hub({profile,kids,clubs,onNav}){
  const[tab,setTab]=useState("week");const[filter,setFilter]=useState("all");
  const members=[{id:"all",name:"Everyone",emoji:"👨‍👩‍👧‍👦"},...kids.map(k=>({id:k.id,name:k.first_name,emoji:"👧",a:age(k.date_of_birth)}))];
  const tabs=[{id:"week",l:"This Week",i:"📅"},{id:"money",l:"Money",i:"💳"},{id:"camps",l:"Camps",i:"🏕️"},{id:"clubs",l:"Clubs",i:"🏠"}];
  const kidsNoAge=kids.filter(k=>!k.date_of_birth);

  return <div className="fi" style={{background:"var(--warm)",minHeight:"100vh"}}>
    <div style={{background:"var(--card)",borderBottom:"1px solid var(--border)"}}>
      <div style={{maxWidth:520,margin:"0 auto",padding:"14px 16px 8px"}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}><Logo/><div style={{width:32,height:32,borderRadius:10,background:"var(--green)",display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontSize:13,fontWeight:700,fontFamily:"var(--sans)"}}>{(profile?.first_name||"U")[0]}</div></div>
        {members.length>1&&<div className="hsb" style={{display:"flex",gap:6,overflowX:"auto",paddingBottom:6}}>{members.map(m=><button key={m.id} onClick={()=>setFilter(m.id)} style={{display:"flex",alignItems:"center",gap:4,padding:"5px 12px",borderRadius:100,fontSize:12,fontWeight:600,border:"none",cursor:"pointer",whiteSpace:"nowrap",fontFamily:"var(--sans)",background:filter===m.id?"var(--green)":"#f5f3ef",color:filter===m.id?"#fff":"var(--muted)",transition:"all .2s"}}>{m.emoji} {m.name}{m.a!=null&&<span style={{opacity:.6}}>({m.a})</span>}</button>)}</div>}
      </div>
      <div style={{maxWidth:520,margin:"0 auto",display:"flex"}}>{tabs.map(t=><button key={t.id} onClick={()=>setTab(t.id)} style={{flex:1,display:"flex",alignItems:"center",justifyContent:"center",gap:4,padding:"10px 0",fontSize:12,fontWeight:600,border:"none",borderBottom:tab===t.id?"2.5px solid var(--green)":"2.5px solid transparent",cursor:"pointer",background:"none",color:tab===t.id?"var(--green)":"var(--muted)",fontFamily:"var(--sans)",transition:"all .15s"}}>{t.i} {t.l}</button>)}</div>
    </div>
    <div style={{maxWidth:520,margin:"0 auto",padding:16,paddingBottom:80}}>
      {kidsNoAge.length>0&&tab!=="camps"&&<div style={{background:"#e8f4fd",border:"1px solid #b6d9f2",borderRadius:14,padding:12,marginBottom:14,display:"flex",alignItems:"center",gap:10}}>
        <span>💡</span><div style={{flex:1,fontSize:13,fontWeight:600,color:"#1565c0"}}>Add {kidsNoAge[0].first_name}'s age to find camps</div>
        <button onClick={()=>onNav("addAge",kidsNoAge[0].id)} style={{padding:"6px 14px",borderRadius:100,border:"none",background:"#1565c0",color:"#fff",fontSize:12,fontWeight:700,cursor:"pointer"}}>Add</button>
      </div>}

      {tab==="week"&&<div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10,marginBottom:16}}>
          {[[clubs.length,"Clubs","var(--card)","var(--text)"],[kids.length,"Kids","var(--card)","var(--text)"],["—","Fees due","var(--accent-l)","#8a6d00"]].map(([v,l,bg,c],i)=>
            <div key={i} style={{background:bg,borderRadius:14,padding:14,textAlign:"center",border:"1px solid var(--border)"}}><div style={{fontSize:22,fontWeight:800,color:c,fontFamily:"var(--serif)"}}>{v}</div><div style={{fontSize:10,fontWeight:600,color:"var(--muted)",marginTop:2}}>{l}</div></div>)}
        </div>
        <div style={{background:"var(--card)",borderRadius:20,border:"1px solid var(--border)",padding:28,textAlign:"center"}}>
          <div style={{fontSize:36,marginBottom:10}}>📅</div>
          <p style={{fontFamily:"var(--serif)",fontSize:16,fontWeight:700,color:"var(--green)"}}>Your week will appear here</p>
          <p style={{fontSize:13,color:"var(--muted)",marginTop:6,lineHeight:1.6}}>Add events to your clubs and they'll show up. In the meantime — check out Easter camps!</p>
          <button onClick={()=>setTab("camps")} style={{marginTop:16,padding:"11px 24px",borderRadius:100,border:"none",fontSize:13,fontWeight:700,color:"#fff",background:"var(--green)",cursor:"pointer"}}>🏕️ Browse Easter Camps</button>
        </div>
      </div>}

      {tab==="money"&&<div>
        <div style={{background:"var(--card)",borderRadius:20,border:"1px solid var(--border)",padding:20,marginBottom:14}}>
          <div style={{fontSize:11,fontWeight:700,color:"var(--muted)",textTransform:"uppercase",letterSpacing:1,marginBottom:12}}>2026 Overview</div>
          {[["Total club fees","—","var(--text)"],["Paid so far","—","#2d5a3f"],["Outstanding","—","#c4960c"]].map(([l,v,c],i)=><div key={i} style={{display:"flex",justifyContent:"space-between",padding:"8px 0",borderBottom:i<2?"1px solid #f5f3ef":"none"}}><span style={{fontSize:14,color:"var(--muted)"}}>{l}</span><span style={{fontSize:18,fontWeight:800,color:c,fontFamily:"var(--serif)"}}>{v}</span></div>)}
        </div>
        <div style={{background:"var(--card)",borderRadius:20,border:"1px solid var(--border)",padding:28,textAlign:"center"}}>
          <div style={{fontSize:36,marginBottom:10}}>💳</div>
          <p style={{fontFamily:"var(--serif)",fontSize:16,fontWeight:700,color:"var(--green)"}}>Track fees here</p>
          <p style={{fontSize:13,color:"var(--muted)",marginTop:6,lineHeight:1.6}}>Add payment reminders for each club — annual fees, camp costs, kit money.</p>
        </div>
      </div>}

      {tab==="camps"&&<CampsList kids={kids} filter={filter}/>}

      {tab==="clubs"&&<div style={{display:"flex",flexDirection:"column",gap:10}}>
        {clubs.map(c=><div key={c.club_id||c.id} style={{display:"flex",alignItems:"center",gap:12,background:"var(--card)",borderRadius:14,padding:14,border:"1px solid var(--border)"}}>
          <div style={{width:38,height:38,borderRadius:10,display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontSize:11,fontWeight:800,background:c.colour||"#2d5a3f"}}>{(c.club_name||"?").split(" ").map(w=>w[0]).join("").substring(0,2)}</div>
          <div><div style={{fontSize:14,fontWeight:700,color:"var(--text)"}}>{c.club_name}</div><div style={{fontSize:12,color:"var(--muted)"}}>{c.club_source==="external"?"Added by you":"Hosted"}</div></div>
        </div>)}
        <button onClick={()=>onNav("addClub")} style={{width:"100%",padding:14,borderRadius:14,border:"2px dashed var(--border)",background:"none",fontSize:13,fontWeight:600,color:"var(--muted)",cursor:"pointer",fontFamily:"var(--sans)"}}>+ Add a club</button>
      </div>}
    </div>
  </div>;
}

// =========== CAMPS LIST ===========
function CampsList({kids,filter}){
  const[camps,setCamps]=useState([]);const[ld,setLd]=useState(true);const[mc,setMc]=useState(200);const[int,setInt]=useState({});const[sf,setSf]=useState(false);
  useEffect(()=>{(async()=>{const d=await db("camps","GET",{select:"*",filters:["status=eq.active","start_date=gte."+new Date().toISOString().split("T")[0]],order:"start_date.asc"});setCamps(d||[]);setLd(false)})()},[]);
  const fl=useMemo(()=>{let r=[...camps];if(filter!=="all"){const k=kids.find(c=>c.id===filter);if(k?.date_of_birth){const a=age(k.date_of_birth);r=r.filter(c=>(!c.age_min||a>=c.age_min)&&(!c.age_max||a<=c.age_max))}}r=r.filter(c=>!c.cost_eur||parseFloat(c.cost_eur)<=mc);return r},[camps,filter,mc,kids]);
  const tg=id=>setInt(p=>({...p,[id]:!p[id]}));const ic=Object.values(int).filter(Boolean).length;const it=camps.filter(c=>int[c.id]).reduce((s,c)=>s+parseFloat(c.cost_eur||0),0);

  return <div>
    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}}>
      <div><div style={{fontFamily:"var(--serif)",fontSize:16,fontWeight:700,color:"var(--green)"}}>🏕️ Easter Camps 2026</div><div style={{fontSize:12,color:"var(--muted)"}}>{fl.length} camps · Dublin area</div></div>
      <button onClick={()=>setSf(!sf)} style={{padding:"6px 12px",borderRadius:100,fontSize:12,fontWeight:700,border:"none",cursor:"pointer",fontFamily:"var(--sans)",background:sf?"var(--green)":"#f5f3ef",color:sf?"#fff":"var(--muted)"}}>⚙ Filter</button>
    </div>
    {sf&&<div style={{background:"var(--card)",borderRadius:14,border:"1px solid var(--border)",padding:14,marginBottom:12}}>
      <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}><span style={{fontSize:11,fontWeight:700,color:"var(--muted)",textTransform:"uppercase"}}>Max budget</span><span style={{fontSize:14,fontWeight:700,fontFamily:"var(--serif)"}}>€{mc}</span></div>
      <input type="range" min={30} max={300} step={10} value={mc} onChange={e=>setMc(+e.target.value)}/>
    </div>}
    {ic>0&&<div style={{background:"var(--green)",color:"#fff",borderRadius:14,padding:"10px 16px",marginBottom:12,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
      <span style={{fontSize:13,fontWeight:600}}>{ic} camp{ic>1?"s":""} shortlisted</span>
      <span style={{fontSize:15,fontWeight:800,fontFamily:"var(--serif)"}}>Total: €{it}</span>
    </div>}
    {ld?<div style={{textAlign:"center",padding:48}}><div style={{fontSize:36,opacity:.5}}>🏕️</div><p style={{fontSize:13,color:"var(--muted)",marginTop:12}}>Loading camps...</p></div>
    :fl.length===0?<div style={{textAlign:"center",padding:48}}><div style={{fontSize:36}}>🔍</div><p style={{fontSize:13,fontWeight:600,color:"var(--muted)",marginTop:8}}>No camps match your filters</p></div>
    :<div style={{display:"flex",flexDirection:"column",gap:12}}>{fl.map(c=>{
      const tc=CT[c.camp_type]||CT.other;const ii=!!int[c.id];
      const ek=kids.filter(k=>{if(!k.date_of_birth)return true;const a2=age(k.date_of_birth);return(!c.age_min||a2>=c.age_min)&&(!c.age_max||a2<=c.age_max)});
      return <div key={c.id} style={{borderRadius:18,border:ii?"2px solid #a5d6a7":"1px solid var(--border)",overflow:"hidden",background:ii?"#f1f8e9":"var(--card)",transition:"all .2s"}}>
        <div style={{padding:"8px 14px",display:"flex",alignItems:"center",justifyContent:"space-between",background:tc.bg,borderBottom:"1px solid "+tc.bd}}>
          <span style={{fontSize:11,fontWeight:700,textTransform:"uppercase",letterSpacing:.5,color:tc.tx}}>{tc.i} {tc.l}</span>
          {c.source==="scraped"&&<span style={{fontSize:9,padding:"3px 8px",borderRadius:100,background:"rgba(21,101,192,.1)",color:"#1565c0",fontWeight:700}}>AI found</span>}
        </div>
        <div style={{padding:16}}>
          <div style={{display:"flex",justifyContent:"space-between",gap:10}}>
            <div style={{flex:1}}>
              <div style={{fontSize:15,fontWeight:700,color:"var(--text)",lineHeight:1.3}}>{c.title}</div>
              <div style={{marginTop:6,display:"flex",flexDirection:"column",gap:3,fontSize:13,color:"var(--muted)"}}>
                <div>📅 <strong style={{color:"var(--text)"}}>{fdr(c.start_date,c.end_date)}</strong></div>
                {c.daily_start_time&&<div style={{display:"flex",alignItems:"center",gap:6}}>🕐 {c.daily_start_time?.slice(0,5)}–{c.daily_end_time?.slice(0,5)}{c.daily_end_time>="15:00"&&<span style={{fontSize:9,padding:"2px 8px",borderRadius:100,background:"var(--green-xl)",color:"var(--green)",fontWeight:700}}>Covers work day</span>}</div>}
                <div>📍 {c.location_name}</div>
                <div>👶 Ages {c.age_min||"?"}–{c.age_max||"?"}</div>
              </div>
            </div>
            <div style={{textAlign:"right",flexShrink:0}}>
              <div style={{fontSize:20,fontWeight:800,color:"var(--green)",fontFamily:"var(--serif)"}}>{c.cost_eur?"€"+parseFloat(c.cost_eur):"Free"}</div>
              {c.cost_notes&&<div style={{fontSize:10,color:"var(--muted)",marginTop:2,maxWidth:90,lineHeight:1.3}}>{c.cost_notes}</div>}
            </div>
          </div>
          {ek.length>0&&<div style={{marginTop:8,display:"flex",alignItems:"center",gap:4,flexWrap:"wrap"}}>
            <span style={{fontSize:9,color:"var(--muted)",fontWeight:700,textTransform:"uppercase",letterSpacing:.5}}>Suits:</span>
            {ek.map(k=><span key={k.id} style={{fontSize:11,padding:"2px 10px",borderRadius:100,background:"#e3f2fd",color:"#1565c0",fontWeight:600}}>👧 {k.first_name}</span>)}
          </div>}
          <div style={{marginTop:12,display:"flex",gap:8}}>
            <button onClick={()=>tg(c.id)} style={{flex:1,padding:10,borderRadius:100,border:"none",fontSize:13,fontWeight:700,cursor:"pointer",fontFamily:"var(--sans)",background:ii?"var(--green)":"#f5f3ef",color:ii?"#fff":"var(--muted)",transition:"all .2s"}}>{ii?"✓ Shortlisted":"☆ Shortlist"}</button>
            {c.booking_url&&<a href={c.booking_url} target="_blank" rel="noopener" style={{padding:"10px 16px",borderRadius:100,fontSize:13,fontWeight:700,background:"var(--green)",color:"#fff",textDecoration:"none"}}>Book →</a>}
          </div>
        </div>
      </div>})}</div>}
  </div>;
}

// =========== ADD AGE ===========
function AddAge({kid,onDone}){const[dob,setDob]=useState("");const[s,setS]=useState(false);
  const IS={width:"100%",padding:"13px 16px",borderRadius:12,border:"1px solid var(--border)",fontSize:14,outline:"none",background:"#fff",fontFamily:"var(--sans)"};
  async function save(){if(!dob)return;setS(true);await db("dependants","PATCH",{body:{date_of_birth:dob},filters:["id=eq."+kid.id]});setS(false);onDone()}
  return <div className="fi" style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",padding:20,background:"var(--warm)"}}>
    <div style={{width:"100%",maxWidth:360,textAlign:"center"}}>
      <div style={{fontSize:48,marginBottom:12}}>🎂</div>
      <h2 style={{fontFamily:"var(--serif)",fontSize:22,fontWeight:800,color:"var(--green)"}}>When was {kid.first_name} born?</h2>
      <p style={{fontSize:13,color:"var(--muted)",marginTop:6}}>Helps us find camps matched to their age</p>
      <input type="date" value={dob} onChange={e=>setDob(e.target.value)} style={{...IS,marginTop:20,display:"block"}}/>
      <div style={{display:"flex",gap:10,marginTop:20}}>
        <button onClick={onDone} style={{flex:1,padding:13,borderRadius:100,border:"none",fontSize:14,fontWeight:700,cursor:"pointer",background:"#f5f3ef",color:"var(--muted)",fontFamily:"var(--sans)"}}>Skip</button>
        <button onClick={save} disabled={s||!dob} style={{flex:1,padding:13,borderRadius:100,border:"none",fontSize:14,fontWeight:700,cursor:"pointer",background:"var(--green)",color:"#fff",fontFamily:"var(--sans)",opacity:(s||!dob)?.5:1}}>{s?"...":"Save"}</button>
      </div>
    </div>
  </div>;
}

// =========== APP ===========
function App(){
  const[scr,setScr]=useState("loading");const[user,setUser]=useState(null);const[profile,setProfile]=useState(null);
  const[kids,setKids]=useState([]);const[clubs,setClubs]=useState([]);const[ageKid,setAgeKid]=useState(null);
  async function load(uid){const[p,k,c]=await Promise.all([db("profiles","GET",{filters:["id=eq."+uid],single:true}),db("dependants","GET",{filters:["parent_user_id=eq."+uid]}),db("hub_subscriptions","GET",{select:"id,club_id,colour,clubs(name,source)",filters:["user_id=eq."+uid]})]);setProfile(p);setKids(k||[]);setClubs((c||[]).map(x=>({...x,club_name:x.clubs?.name,club_source:x.clubs?.source})));if(!p?.onboarding_completed)setScr("onboard");else setScr("hub")}
  useEffect(()=>{(async()=>{try{const d=await au("user");if(d?.id){setUser(d);await load(d.id)}else setScr("landing")}catch{setScr("landing")}})()},[]);
  async function onAuth(u){setUser(u);await new Promise(r=>setTimeout(r,600));await load(u.id)}
  async function refresh(){if(user)await load(user.id)}
  function nav(a,d){if(a==="addClub")setScr("onboard");else if(a==="addAge"){const k=kids.find(x=>x.id===d);if(k){setAgeKid(k);setScr("addAge")}}}

  if(scr==="loading")return<div style={{minHeight:"100vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",background:"var(--warm)"}}><Logo/><p style={{fontSize:13,color:"var(--muted)",marginTop:16}}>Loading...</p></div>;
  if(scr==="landing")return<Landing onGo={()=>setScr("auth")} onLogin={()=>setScr("login")}/>;
  if(scr==="auth")return<Auth onAuth={onAuth} mode="signup"/>;
  if(scr==="login")return<Auth onAuth={onAuth} mode="login"/>;
  if(scr==="onboard")return<Onboard userId={user?.id} onDone={async()=>{await refresh();setScr("hub")}}/>;
  if(scr==="addAge"&&ageKid)return<AddAge kid={ageKid} onDone={async()=>{setAgeKid(null);await refresh();setScr("hub")}}/>;
  if(scr==="hub")return<Hub profile={profile} kids={kids} clubs={clubs} onNav={nav}/>;
  return null;
}
ReactDOM.render(<App/>,document.getElementById("root"));
</script>

const hd=()=>({apikey:SK,"Content-Type":"application/json",Authorization:"Bearer "+(_t||SK)});

async function au(a,b){
  const ep={signup:"/auth/v1/signup",login:"/auth/v1/token?grant_type=password",user:"/auth/v1/user"};
  const r=await fetch(SB+ep[a],{method:a==="user"?"GET":"POST",headers:hd(),body:a==="user"?undefined:JSON.stringify(b)});
  const d=await r.json();
  if(!r.ok)throw new Error(d.msg||d.error_description||d.message||"Error");
  if(d.access_token)_t=d.access_token;
  return d;
}

async function db(t,m,o={}){
  let u=SB+"/rest/v1/"+t;
  const p=[];
  if(o.select)p.push("select="+encodeURIComponent(o.select));
  if(o.filters)o.filters.forEach(f=>p.push(f));
  if(o.order)p.push("order="+o.order);
  if(o.limit)p.push("limit="+o.limit);
  if(p.length)u+="?"+p.join("&");
  const h=hd();
  if(m==="POST"||m==="PATCH")h.Prefer="return=representation";
  const r=await fetch(u,{method:m,headers:h,body:o.body?JSON.stringify(o.body):undefined});
  if(!r.ok){const errTxt=await r.text();console.error("DB err:",t,m,errTxt);return null}
  const txt=await r.text();
  return txt?JSON.parse(txt):null;
}

async function rpc(fn,params={}){
  const r=await fetch(SB+"/rest/v1/rpc/"+fn,{method:"POST",headers:hd(),body:JSON.stringify(params)});
  if(!r.ok)return null;
  const txt=await r.text();
  return txt?JSON.parse(txt):null;
}

  async function go(){
    setLd(true);setErr(null);
    try{
      if(mode==="signup"){const d=await au("signup",{email,password:pw,data:{}});onAuth(d.user||d)}
      else{const d=await au("login",{email,password:pw});onAuth(d.user)}

          </div>)}
        </div>}
        <div style={{display:"flex",flexDirection:"column",gap:8,marginTop:16,textAlign:"left"}}>
          <input value={name} onChange={e=>setName(e.target.value)} placeholder="Child’s first name" onKeyDown={e=>e.key==="Enter"&&add()}/>
          <div style={{display:"flex",gap:8}}>
            <input type="date" value={dob} onChange={e=>setDob(e.target.value)} style={{flex:1}}/>

          </div>

          {kids.length?"Next — add clubs →":"Skip — just me"}
        </button>
      </div>
    </div>
  );
}

function OnboardClubs({userId,kids,onDone}){
  const[q,setQ]=useState("");const[res,setRes]=useState([]);const[added,setAdded]=useState([]);const[sv,setSv]=useState(false);
  const[assign,setAssign]=useState(null);const[searching,setSearching]=useState(false);const tmr=useRef(null);

  function onType(v){
    setQ(v);clearTimeout(tmr.current);
    if(v.length<2){setRes([]);return}
    tmr.current=setTimeout(async()=>{
      setSearching(true);
      const r=await db("clubs","GET",{select:"id,name,address,location,rating",filters:["name=ilike.*"+v+"*"],limit:8,order:"rating.desc.nullslast"});
      setRes(r||[]);setSearching(false);
    },300);
  }

  async function pick(club){
    if(kids.length===0){
      setSv(true);
      await db("hub_subscriptions","POST",{body:{user_id:userId,club_id:club.id,colour:COLS[added.length%COLS.length]}});
      setAdded([...added,{...club,who:"You"}]);setQ("");setRes([]);setSv(false);
    } else { setAssign(club);setQ("");setRes([]) }
  }

  async function doAssign(club,depId,who){
    setSv(true);
    await db("hub_subscriptions","POST",{body:{user_id:userId,club_id:club.id,dependant_id:depId||null,colour:COLS[added.length%COLS.length]}});
    setAdded([...added,{...club,who}]);setAssign(null);setSv(false);
  }

  async function addNew(){
    if(!q.trim())return;setSv(true);
    const sl=q.trim().toLowerCase().replace(/[^a-z0-9]+/g,"-").replace(/^-+|-+$/g,"")+"-"+Math.random().toString(36).substring(2,6);
    const r=await db("clubs","POST",{body:{name:q.trim(),slug:sl,source:"external"}});
    if(r&&r[0]){
      if(kids.length===0){
        await db("hub_subscriptions","POST",{body:{user_id:userId,club_id:r[0].id,colour:COLS[added.length%COLS.length]}});
        setAdded([...added,{id:r[0].id,name:q.trim(),who:"You"}]);
      } else { setAssign({id:r[0].id,name:q.trim()}) }
    }
    setQ("");setRes([]);setSv(false);
  }

  async function finish(){
    await db("profiles","PATCH",{body:{onboarding_step:"done",onboarding_completed:true},filters:["id=eq."+userId]});
    onDone();
  }

  const initials=(n)=>n.split(" ").map(w=>w[0]).join("").substring(0,2).toUpperCase();

  return (
    <div className="fi" style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",padding:20,background:"var(--warm)"}}>
      <div style={{width:"100%",maxWidth:440}}>
        <div style={{textAlign:"center",marginBottom:20}}>
          <div style={{fontSize:48,marginBottom:12}}>🏠</div>
          <h2 style={{fontFamily:"var(--sr)",fontSize:24,fontWeight:800,color:"var(--g)"}}>What clubs are you in?</h2>
          <p style={{fontSize:14,color:"var(--mt)",marginTop:6}}>Search for your club — we’ll find it</p>
        </div>
        {added.length>0&&<div style={{marginBottom:16,display:"flex",flexDirection:"column",gap:8}}>
          {added.map((c,i)=><div key={c.id+"-"+i} style={{display:"flex",alignItems:"center",gap:10,background:"var(--gxl)",borderRadius:14,padding:"10px 16px",border:"1px solid #c8e6c9"}}>
            <div style={{width:30,height:30,borderRadius:8,background:COLS[i%COLS.length],display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontSize:10,fontWeight:800}}>{initials(c.name)}</div>
            <div style={{flex:1}}><div style={{fontSize:14,fontWeight:600,color:"var(--g)"}}>{c.name}</div><div style={{fontSize:11,color:"var(--gl)"}}>{c.who}</div></div>
            <span style={{color:"var(--gl)"}}>✓</span>
          </div>)}
        </div>}
        <div style={{position:"relative"}}>
          <input value={q} onChange={e=>onType(e.target.value)} placeholder="Type club name..."/>
          {searching&&<span style={{position:"absolute",right:14,top:13,fontSize:12,color:"var(--mt)"}}>...</span>}
        </div>
        {res.length>0&&<div style={{marginTop:4,background:"var(--card)",border:"1px solid var(--bd)",borderRadius:14,overflow:"hidden",boxShadow:"0 8px 24px rgba(0,0,0,.08)"}}>
          {res.map(c=><button key={c.id} onClick={()=>pick(c)} style={{width:"100%",padding:"12px 16px",border:"none",borderBottom:"1px solid #f5f3ef",background:"none",cursor:"pointer",textAlign:"left",fontFamily:"var(--sn)",display:"flex",alignItems:"center",gap:10}}>
            <div style={{width:36,height:36,borderRadius:8,background:"var(--gxl)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,fontWeight:800,color:"var(--g)",flexShrink:0}}>{initials(c.name)}</div>
            <div><div style={{fontSize:14,fontWeight:600}}>{c.name}</div>{(c.address||c.location)&&<div style={{fontSize:11,color:"var(--mt)"}}>{c.address||c.location}</div>}</div>
            {c.rating&&<span style={{marginLeft:"auto",fontSize:11,color:"var(--acc)",fontWeight:700}}>★ {c.rating}</span>}
          </button>)}
        </div>}
        {q.length>=2&&res.length===0&&!searching&&<button onClick={addNew} style={{width:"100%",marginTop:8,padding:12,borderRadius:12,border:"2px dashed var(--bd)",background:"none",cursor:"pointer",fontSize:13,fontWeight:600,color:"var(--mt)",fontFamily:"var(--sn)"}}>+ Add “{q}” as a new club</button>}
        {assign&&<div className="mbg" onClick={e=>e.target===e.currentTarget&&setAssign(null)}>
          <div className="mbox" style={{textAlign:"center",padding:32}}>
            <h3 style={{fontFamily:"var(--sr)",fontSize:18,fontWeight:700,color:"var(--g)",marginBottom:4}}>Who goes to {assign.name}?</h3>
            <p style={{fontSize:13,color:"var(--mt)",marginBottom:20}}>Tap each family member who attends</p>
            <div style={{display:"flex",flexDirection:"column",gap:8}}>
              <button onClick={()=>doAssign(assign,null,"You")} className="btn bs" style={{display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>👤 Me</button>
              {kids.map(k=><button key={k.id} onClick={()=>doAssign(assign,k.id,k.first_name)} className="btn bs" style={{display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>👧 {k.first_name}</button>)}
            </div>
          </div>
        </div>}
        <button onClick={finish} className={"btn "+(added.length?"bp":"bs")} style={{marginTop:24}}>{added.length?"Go to my hub →":"Skip"}</button>
      </div>
    </div>
  );
}

function Hub({user,profile,onRefresh,onLogout}){
  const[tab,setTab]=useState("week");const[filter,setFilter]=useState("all");
  const[kids,setKids]=useState([]);const[clubs,setClubs]=useState([]);const[recs,setRecs]=useState([]);
  const[mans,setMans]=useState([]);const[pays,setPays]=useState([]);const[camps,setCamps]=useState([]);const[campBookings,setCampBookings]=useState([]);const[holidays,setHolidays]=useState([]);const[userHolidays,setUserHolidays]=useState([]);
  const[showAddEv,setShowAddEv]=useState(false);const[showAddPay,setShowAddPay]=useState(false);
  const[showAddKid,setShowAddKid]=useState(false);const[editClub,setEditClub]=useState(null);const[editHol,setEditHol]=useState(null);const[showAddHol,setShowAddHol]=useState(false);const[showInvite,setShowInvite]=useState(false);const[showSupport,setShowSupport]=useState(false);const[showAdmin,setShowAdmin]=useState(false);const[localEvents,setLocalEvents]=useState([]);const[actCats,setActCats]=useState([]);const[discoverSearch,setDiscoverSearch]=useState("");const[discoverFilter,setDiscoverFilter]=useState("all");const[loading,setLoading]=useState(true);

  async function load(){
    setLoading(true);
    const[k,c,r,m,p,ca,hols,userHols,cBooks,lEvts,aCats]=await Promise.all([
      db("dependants","GET",{filters:["parent_user_id=eq."+user.id],order:"created_at.asc"}),
      db("hub_subscriptions","GET",{select:"id,club_id,dependant_id,colour,clubs(id,name,address,location,phone,rating)",filters:["user_id=eq."+user.id]}),
      db("recurring_events","GET",{filters:["user_id=eq."+user.id]}),
      db("manual_events","GET",{filters:["user_id=eq."+user.id]}),
      db("payment_reminders","GET",{filters:["user_id=eq."+user.id],order:"due_date.asc"}),
      db("camps","GET",{select:"id,title,camp_type,start_date,end_date,daily_start_time,daily_end_time,age_min,age_max,cost_eur,cost_notes,location_name,booking_url,source",filters:["status=eq.active"],order:"start_date.asc"}),
      db("school_holidays","GET",{order:"start_date.asc"}),
      db("user_school_holidays","GET",{filters:["user_id=eq."+user.id],order:"start_date.asc"}),
      db("camp_bookings","GET",{filters:["user_id=eq."+user.id]}),
      db("local_events","GET",{order:"event_date.asc"}),
      db("activity_categories","GET",{order:"name.asc"})
    ]);
    setKids(k||[]);
    setClubs((c||[]).map(s=>({...s,club_id:s.club_id||s.clubs?.id,club_name:s.clubs?.name||"?",club_addr:s.clubs?.address})));
    setRecs(r||[]);setMans(m||[]);setPays(p||[]);setCamps(ca||[]);setHolidays(hols||[]);setUserHolidays(userHols||[]);setCampBookings(cBooks||[]);setLocalEvents(lEvts||[]);setActCats(aCats||[]);
    setLoading(false);
    // Update last active
    db("profiles","PATCH",{body:{last_active_at:new Date().toISOString()},filters:["id=eq."+user.id]});
  }
  useEffect(()=>{load()},[]);

  const members=useMemo(()=>{
    const m=[{id:"all",name:"Everyone",emoji:"👨‍👩‍👧‍👦",type:"all"}];
    kids.forEach(k=>m.push({id:k.id,name:k.first_name,emoji:"👧",type:"kid",age:getAge(k.date_of_birth),dob:k.date_of_birth}));
    if(kids.length>0)m.push({id:"self",name:profile?.first_name||"Me",emoji:"👤",type:"self"});
    return m;
  },[kids,profile]);

  // Build weekly events with member names
  const wd=weekDates();
  const weekEvts=useMemo(()=>{
    const evts=[];
    (recs||[]).forEach(re=>{
      if(!re.active)return;
      wd.forEach(d=>{
        if(d.getDay()===re.day_of_week){
          const cl=clubs.find(c=>c.club_id===re.club_id);
          const kid=re.dependant_id?kids.find(k=>k.id===re.dependant_id):null;
          evts.push({id:re.id+d.toISOString(),title:re.title,date:d,time:re.start_time?.slice(0,5)||"",
            endTime:re.start_time&&re.duration_minutes?((h,m)=>{const t=parseInt(re.start_time.slice(0,2))*60+parseInt(re.start_time.slice(3,5))+re.duration_minutes;return String(Math.floor(t/60)).padStart(2,"0")+":"+String(t%60).padStart(2,"0")})()||"":"",
            club:cl?.club_name||"",colour:cl?.colour||"#999",member:kid?.first_name||(profile?.first_name||"You"),memberId:re.dependant_id||"self"});
        }
      });
    });
    (mans||[]).forEach(me=>{
      const d=new Date(me.event_date);
      const end=new Date(wd[6]);end.setDate(end.getDate()+1);
      if(d>=wd[0]&&d<end){
        const cl=clubs.find(c=>c.club_id===me.club_id);
        const kid=me.dependant_id?kids.find(k=>k.id===me.dependant_id):null;
        evts.push({id:me.id,title:me.title,date:d,time:d.toTimeString().slice(0,5),club:cl?.club_name||"",colour:cl?.colour||"#999",member:kid?.first_name||(profile?.first_name||"You"),memberId:me.dependant_id||"self"});
      }
    });
    return evts.sort((a,b)=>a.date-b.date||(a.time||"").localeCompare(b.time||""));
  },[recs,mans,clubs,kids,profile,wd]);

  const filtEvts=filter==="all"?weekEvts:weekEvts.filter(e=>e.memberId===filter);
  const filtPays=filter==="all"?pays:pays.filter(p=>(p.dependant_id||"self")===filter);
  const totalDue=filtPays.filter(p=>!p.paid).reduce((s,p)=>s+parseFloat(p.amount||0),0);
  const totalPaid=filtPays.filter(p=>p.paid).reduce((s,p)=>s+parseFloat(p.amount||0),0);

  // Camps filtered by kid age
  const filtCamps=useMemo(()=>{
    if(filter==="all"||filter==="self")return camps;
    const kid=kids.find(k=>k.id===filter);
    if(!kid||!kid.date_of_birth)return camps;
    const age=getAge(kid.date_of_birth);
    return camps.filter(c=>age>=c.age_min&&age<=c.age_max);
  },[camps,filter,kids]);

  const tabs=[{id:"week",l:"This Week",i:"📅"},{id:"money",l:"Money",i:"💳"},{id:"camps",l:"Camps",i:"🏕️"},{id:"clubs",l:"Clubs",i:"🏠"},{id:"discover",l:"Discover",i:"🔍"}];

  if(loading)return <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"var(--warm)"}}><p style={{color:"var(--mt)"}}>Loading...</p></div>;

  // If no clubs yet, prompt
  if(clubs.length===0)return (
    <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",padding:20,background:"var(--warm)"}}>
      <div style={{textAlign:"center",maxWidth:360}}>
        <div style={{fontSize:48,marginBottom:16}}>🏠</div>
        <h2 style={{fontFamily:"var(--sr)",fontSize:22,fontWeight:800,color:"var(--g)"}}>No clubs yet</h2>
        <p style={{fontSize:14,color:"var(--mt)",margin:"8px 0 24px"}}>Add your first club to get started</p>
        <button onClick={()=>onRefresh("clubs")} className="btn bp">+ Add a club</button>
      </div>
    </div>
  );

  return (
    <div className="fi" style={{background:"var(--warm)",minHeight:"100vh"}}>
      {/* Header */}
      <div style={{background:"var(--card)",borderBottom:"1px solid var(--bd)"}}>
        <div style={{maxWidth:520,margin:"0 auto",padding:"14px 16px 8px"}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>
            <Logo/>
            <button onClick={onLogout} style={{width:32,height:32,borderRadius:10,background:"var(--g)",display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontSize:13,fontWeight:700,border:"none",cursor:"pointer"}}>{(profile?.first_name||"U")[0]}</button>
          </div>
          <div className="hsb" style={{display:"flex",gap:6,overflowX:"auto",paddingBottom:6}}>
            {members.map(m=><button key={m.id} onClick={()=>setFilter(m.id)} className={"pill "+(filter===m.id?"pon":"poff")}>{m.emoji} {m.name}{m.age!=null&&<span style={{opacity:.6,marginLeft:2}}>({m.age})</span>}</button>)}
            <button onClick={()=>setShowAddKid(true)} className="pill poff" style={{border:"2px dashed var(--bd)",background:"none"}}>+ member</button>
            {filter!=="all"&&filter!=="self"&&<button onClick={()=>{const kid=kids.find(k=>k.id===filter);if(kid)setShowAddKid(kid)}} className="pill poff" style={{fontSize:11}}>✎ edit</button>}
          </div>
        </div>
        <div style={{maxWidth:520,margin:"0 auto",display:"flex"}}>
          {tabs.map(t=><button key={t.id} onClick={()=>setTab(t.id)} style={{flex:1,display:"flex",alignItems:"center",justifyContent:"center",gap:4,padding:"10px 0",fontSize:12,fontWeight:600,border:"none",borderBottom:tab===t.id?"2.5px solid var(--g)":"2.5px solid transparent",cursor:"pointer",background:"none",color:tab===t.id?"var(--g)":"var(--mt)",fontFamily:"var(--sn)"}}>{t.i} {t.l}</button>)}
        </div>
      </div>

      <div style={{maxWidth:520,margin:"0 auto",padding:16,paddingBottom:100}}>

      {/* TODAY QUICK VIEW */}
      <div style={{background:"var(--g)",borderRadius:16,padding:16,marginBottom:16,color:"#fff"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>

          const todayEvts=weekEvts.filter(e=>e.date.getFullYear()===today.getFullYear()&&e.date.getMonth()===today.getMonth()&&e.date.getDate()===today.getDate());
          const dueSoon=pays.filter(p=>!p.paid&&Math.ceil((new Date(p.due_date)-today)/(86400000))<=7&&Math.ceil((new Date(p.due_date)-today)/(86400000))>=-3);
          if(todayEvts.length===0&&dueSoon.length===0)return <p style={{fontSize:13,opacity:.6}}>Nothing on today — enjoy the free time!</p>;

            </div>)}
            {dueSoon.map(p=><div key={p.id} style={{fontSize:12,color:"#f0a500",fontWeight:600}}>💳 {p.description} — €{parseFloat(p.amount).toFixed(0)} due {new Date(p.due_date).toLocaleDateString("en-IE",{day:"numeric",month:"short"})}</div>)}

      {/* THIS WEEK */}

            <div style={{fontSize:20,fontWeight:800,color:"#8a6d00",fontFamily:"var(--sr)"}}>€{totalDue.toFixed(0)}</div>
            <div style={{fontSize:11,color:"#a68600",fontWeight:600}}>due</div>
          </div>
          <div style={{background:"var(--gxl)",borderRadius:14,padding:12,border:"1px solid #c8e6c9",textAlign:"center"}}>
            <div style={{fontSize:20,fontWeight:800,color:"var(--g)",fontFamily:"var(--sr)"}}>{clubs.length}</div>
            <div style={{fontSize:11,color:"var(--gl)",fontWeight:600}}>clubs</div>
          </div>
        </div>
        {wd.map(d=>{
          const dayEvts=filtEvts.filter(e=>e.date.getFullYear()===d.getFullYear()&&e.date.getMonth()===d.getMonth()&&e.date.getDate()===d.getDate());
          const today=isToday(d);

            </div>
            {dayEvts.length===0?<div style={{padding:"8px 0 4px",fontSize:13,color:"#ccc",fontStyle:"italic"}}>Nothing on</div>
            :dayEvts.map(e=><div key={e.id} style={{display:"flex",alignItems:"center",gap:12,padding:"10px 14px",background:"var(--card)",borderRadius:14,border:"1px solid var(--bd)",marginBottom:6}}>
              <div style={{width:4,height:36,borderRadius:2,background:e.colour,flexShrink:0}}/>
              <div style={{flex:1}}>
                <div style={{fontSize:14,fontWeight:600}}><span style={{color:"var(--mt)",fontWeight:500}}>{e.member}</span> — {e.title}</div>
                <div style={{fontSize:12,color:"var(--mt)",marginTop:1}}>{e.club}</div>
              </div>
              {e.time&&<span style={{fontSize:12,fontWeight:600,color:"var(--g)",background:"var(--gxl)",padding:"4px 10px",borderRadius:8,whiteSpace:"nowrap"}}>{e.time}{e.endTime?"–"+e.endTime:""}</span>}
            </div>)}
          </div>
        })}

      </div>}

      {/* MONEY */}
      {tab==="money"&&<div>

            <span style={{fontSize:24}}>🚨</span>
            <div>
              <div style={{fontSize:14,fontWeight:700,color:"#dc2626"}}>€{total.toFixed(0)} overdue</div>
              <div style={{fontSize:12,color:"#991b1b"}}>{overdue.length} payment{overdue.length>1?"s":""} past due date</div>
            </div>
          </div>;
        })()}

          <div style={{background:"var(--accl)",borderRadius:14,padding:16,border:"1px solid #f0d078"}}>
            <div style={{fontSize:28,fontWeight:800,color:"#8a6d00",fontFamily:"var(--sr)"}}>€{totalDue.toFixed(0)}</div>
            <div style={{fontSize:12,fontWeight:600,color:"#a68600",marginTop:2}}>Outstanding</div>
          </div>
          <div style={{background:"var(--gxl)",borderRadius:14,padding:16,border:"1px solid #c8e6c9"}}>

            <div style={{fontSize:12,fontWeight:600,color:"var(--gl)",marginTop:2}}>Paid</div>
          </div>

      {tab==="camps"&&<div>
        {(()=>{

          // Merge default + user overrides
          const mergedHols=holidays.map(h=>{
            const override=userHolidays.find(uh=>uh.base_holiday_id===h.id);
            if(override){
              if(override.holiday_type==="hidden")return null;
              return {...override,is_user_override:true,holiday_type:override.holiday_type||h.holiday_type};
            }
            return {...h,is_user_override:false};
          }).filter(Boolean);
          // Add custom user holidays (no base_holiday_id)
          userHolidays.filter(uh=>!uh.base_holiday_id&&uh.holiday_type!=="hidden").forEach(uh=>{
            mergedHols.push({...uh,is_user_override:true});
          });
          const futureHols=mergedHols.filter(h=>new Date(h.end_date+"T23:59:59")>=now).sort((a,b)=>new Date(a.start_date)-new Date(b.start_date));
          const kidName=filter!=="all"&&filter!=="self"?kids.find(k=>k.id===filter)?.first_name:null;
          const kidAge=filter!=="all"&&filter!=="self"?getAge(kids.find(k=>k.id===filter)?.date_of_birth):null;

          if(futureHols.length===0) return <p style={{color:"var(--mt)",padding:20,textAlign:"center"}}>No upcoming school holidays found</p>;

          return futureHols.map(hol=>{
            const hs=new Date(hol.start_date+"T00:00:00"),he=new Date(hol.end_date+"T23:59:59");
            const holCamps=filtCamps.filter(camp=>{
              const cs=new Date(camp.start_date+"T00:00:00");
              return cs>=hs&&cs<=he;
            });
            const holEmoji=hol.holiday_type==="easter"?"🐣":hol.holiday_type==="summer"?"☀️":hol.holiday_type==="christmas"?"🎄":"🍂";

            return <div key={hol.id} style={{marginBottom:24}}>
              <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4}}>
                <span style={{fontSize:20}}>{holEmoji}</span>

                  <div style={{fontSize:28,marginBottom:6}}>🔍</div>
                  <p style={{fontSize:13,color:"var(--mt)"}}>No camps listed yet for this break</p>
                  <p style={{fontSize:12,color:"var(--mt)",marginTop:2}}>We'll alert you when camps appear</p>
                </div>

            </div>
          });
        })()}
        <button onClick={()=>setShowAddHol(true)} style={{width:"100%",padding:14,borderRadius:14,border:"2px dashed var(--bd)",background:"none",cursor:"pointer",fontSize:13,fontWeight:600,color:"var(--mt)",fontFamily:"var(--sn)",marginTop:8}}>+ Add a school holiday or closure day</button>
      </div>}

      {tab==="clubs"&&<div>
        {(()=>{
          // Group subscriptions by club
          const grouped={};
          clubs.forEach((c,i)=>{
            if(!grouped[c.club_id])grouped[c.club_id]={...c,members:[],idx:i};
            const kid=c.dependant_id?kids.find(k=>k.id===c.dependant_id):null;

      </div>}

      {tab==="discover"&&<div>
        {/* Search by activity */}
        <input value={discoverSearch} onChange={e=>setDiscoverSearch(e.target.value)} placeholder="Search clubs by activity... e.g. swimming, karate" style={{width:"100%",padding:"12px 16px",borderRadius:14,border:"1px solid var(--bd)",fontSize:14,marginBottom:12,fontFamily:"var(--sn)"}}/>

        {/* Category pills */}
        <div style={{display:"flex",gap:6,overflowX:"auto",paddingBottom:8,marginBottom:16,WebkitOverflowScrolling:"touch"}}>
          <button onClick={()=>setDiscoverFilter("all")} className={"pill "+(discoverFilter==="all"?"pon":"poff")}>All</button>
          <button onClick={()=>setDiscoverFilter("kids")} className={"pill "+(discoverFilter==="kids"?"pon":"poff")}>👧 Kids</button>
          <button onClick={()=>setDiscoverFilter("adults")} className={"pill "+(discoverFilter==="adults"?"pon":"poff")}>👤 Adults</button>
        </div>

        {/* Activity categories grid */}
        {!discoverSearch&&<div>
          <h3 style={{fontFamily:"var(--sr)",fontSize:17,fontWeight:700,color:"var(--g)",marginBottom:12}}>Browse by activity</h3>
          <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8,marginBottom:24}}>
            {actCats.map(cat=>(
              <button key={cat.id} onClick={()=>setDiscoverSearch(cat.name)} style={{background:"var(--card)",border:"1px solid var(--bd)",borderRadius:14,padding:"14px 8px",cursor:"pointer",textAlign:"center"}}>
                <div style={{fontSize:24}}>{cat.emoji}</div>
                <div style={{fontSize:12,fontWeight:600,color:"var(--tx)",marginTop:4,fontFamily:"var(--sn)"}}>{cat.name}</div>
              </button>
            ))}
          </div>
        </div>}

        {/* Search results from clubs table */}
        {discoverSearch&&<div style={{marginBottom:24}}>
          <h3 style={{fontFamily:"var(--sr)",fontSize:17,fontWeight:700,color:"var(--g)",marginBottom:12}}>Clubs matching "{discoverSearch}"</h3>
          <p style={{fontSize:12,color:"var(--mt)",marginBottom:12}}>Tap any club to add it to your family</p>
          {/* Note: this searches the existing clubs DB. Full Google Places integration coming soon */}
          <div style={{fontSize:13,color:"var(--mt)",background:"var(--card)",borderRadius:14,border:"1px solid var(--bd)",padding:16,textAlign:"center"}}>
            <div style={{fontSize:28,marginBottom:8}}>🔍</div>
            <p>Club search for "{discoverSearch}" in your area</p>
            <button onClick={()=>{onRefresh("clubs")}} className="btn bp" style={{marginTop:12,fontSize:13}}>Go to Add Club →</button>
          </div>
        </div>}

        {/* Local events & competitions */}
        <div>
          <h3 style={{fontFamily:"var(--sr)",fontSize:17,fontWeight:700,color:"var(--g)",marginBottom:4}}>Local events & competitions</h3>
          <p style={{fontSize:12,color:"var(--mt)",marginBottom:14}}>Open days, tournaments, and social events from clubs near you</p>
          {(()=>{
            const now=new Date();
            const filtered=localEvents
              .filter(e=>new Date(e.event_date+"T23:59:59")>=now)
              .filter(e=>discoverFilter==="all"||e.audience===discoverFilter||e.audience==="all");
            if(filtered.length===0)return <p style={{textAlign:"center",padding:20,color:"var(--mt)"}}>No upcoming events found</p>;

            const ET={competition:{i:"🏆",bg:"var(--goldl)",c:"#8a6d00"},tournament:{i:"🏅",bg:"var(--goldl)",c:"#8a6d00"},open_day:{i:"🎪",bg:"var(--sage)",c:"var(--gl)"},social:{i:"🍻",bg:"#f0e8f8",c:"#6b21a8"},fundraiser:{i:"❤️",bg:"#fce8e8",c:"#c0392b"}};

            return filtered.map(ev=>{
              const t=ET[ev.event_type]||ET.competition;
              const isAdult=ev.audience==="adults";
              return <div key={ev.id} style={{background:"var(--card)",borderRadius:16,border:"1px solid var(--bd)",padding:16,marginBottom:10}}>
                <div style={{display:"flex",alignItems:"flex-start",gap:10}}>
                  <div style={{width:40,height:40,borderRadius:10,background:t.bg,display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,flexShrink:0}}>{t.i}</div>
                  <div style={{flex:1}}>
                    <div style={{fontSize:14,fontWeight:700,color:"var(--tx)"}}>{ev.title}</div>
                    <div style={{fontSize:12,color:"var(--mt)",marginTop:2}}>{ev.club_name}</div>
                    <div style={{fontSize:12,color:"var(--mt)",marginTop:2}}>
                      {new Date(ev.event_date).toLocaleDateString("en-IE",{weekday:"short",day:"numeric",month:"short"})}
                      {ev.event_time?" · "+ev.event_time.slice(0,5):""}
                      {ev.location_name?" · "+ev.location_name:""}
                    </div>
                    <div style={{display:"flex",gap:6,marginTop:8,flexWrap:"wrap"}}>
                      {ev.age_group&&<span style={{fontSize:11,fontWeight:600,padding:"3px 8px",borderRadius:6,background:isAdult?"#f0e8f8":"var(--sage)",color:isAdult?"#6b21a8":"var(--gl)"}}>{ev.age_group}</span>}
                      {ev.cost_eur!==null&&<span style={{fontSize:11,fontWeight:700,padding:"3px 8px",borderRadius:6,background:"var(--goldl)",color:"#8a6d00"}}>{ev.cost_eur>0?"€"+ev.cost_eur:"Free"}</span>}
                      <span style={{fontSize:11,fontWeight:600,padding:"3px 8px",borderRadius:6,background:t.bg,color:t.c}}>{ev.event_type==="open_day"?"Open Day":ev.event_type==="social"?"Social":ev.event_type==="tournament"?"Tournament":"Competition"}</span>
                    </div>
                  </div>
                </div>
                {(ev.booking_url||ev.facebook_url)&&<div style={{display:"flex",gap:6,marginTop:10}}>
                  {ev.booking_url&&<a href={ev.booking_url} target="_blank" rel="noopener" style={{flex:1,textAlign:"center",padding:8,borderRadius:10,background:"var(--g)",color:"#fff",fontSize:12,fontWeight:700,textDecoration:"none"}}>More info →</a>}
                  {ev.facebook_url&&<a href={ev.facebook_url} target="_blank" rel="noopener" style={{flex:1,textAlign:"center",padding:8,borderRadius:10,background:"#1877F2",color:"#fff",fontSize:12,fontWeight:700,textDecoration:"none"}}>Facebook →</a>}
                </div>}
              </div>;
            });
          })()}
        </div>
      </div>}

      </div>

      {/* Help & Admin */}
      <div style={{marginTop:20,paddingTop:16,borderTop:"1px solid var(--bd)",display:"flex",gap:8}}>
        <button onClick={()=>setShowSupport(true)} style={{flex:1,padding:12,borderRadius:14,border:"1px solid var(--bd)",background:"var(--card)",cursor:"pointer",fontSize:13,fontWeight:600,color:"var(--mt)",fontFamily:"var(--sn)"}}>💬 Contact Support</button>
        {profile?.role==="admin"&&<button onClick={()=>setShowAdmin(true)} style={{flex:1,padding:12,borderRadius:14,border:"none",background:"var(--g)",cursor:"pointer",fontSize:13,fontWeight:700,color:"#fff",fontFamily:"var(--sn)"}}>📊 Admin</button>}
      </div>

      {/* Modals */}
      {showAddEv&&<AddEventModal clubs={clubs} userId={user.id} kids={kids} profile={profile} onClose={()=>setShowAddEv(false)} onSaved={()=>{setShowAddEv(false);load()}}/>}
      {showAddPay&&<AddPaymentModal clubs={clubs} userId={user.id} kids={kids} profile={profile} onClose={()=>setShowAddPay(false)} onSaved={()=>{setShowAddPay(false);load()}}/>}
      {showSupport&&<SupportModal userId={user.id} userEmail={user.email} onClose={()=>setShowSupport(false)}/>}
      {showAdmin&&<AdminDashboard user={user} onBack={()=>setShowAdmin(false)}/>}
      {showAddKid&&<AddKidModal userId={user.id} editKid={typeof showAddKid==="object"?showAddKid:null} profile={profile} onClose={()=>setShowAddKid(false)} onSaved={()=>{setShowAddKid(false);load()}}/>}
      {editClub&&<EditClubModal club={editClub} kids={kids} profile={profile} userId={user.id} onClose={()=>setEditClub(null)} onSaved={()=>{setEditClub(null);load()}} onDelete={()=>{setEditClub(null);load()}}/>}
      {editHol&&<EditHolidayModal holiday={editHol} userId={user.id} onClose={()=>setEditHol(null)} onSaved={()=>{setEditHol(null);load()}}/>}
      {showAddHol&&<AddHolidayModal userId={user.id} onClose={()=>setShowAddHol(false)} onSaved={()=>{setShowAddHol(false);load()}}/>}
      
    </div>
  );
}

function AddEventModal({clubs,userId,kids,profile,onClose,onSaved}){
  const[cid,setCid]=useState(clubs[0]?.club_id||"");const[mid,setMid]=useState("self");
  const[title,setTitle]=useState("");const[type,setType]=useState("recurring");
  const[date,setDate]=useState("");const[time,setTime]=useState("18:00");const[endTime,setEndTime]=useState("19:00");const[dur,setDur]=useState(60);
  const[dow,setDow]=useState(1);const[sv,setSv]=useState(false);
  async function save(){
    if(!title.trim()||!cid)return;setSv(true);const dep=mid==="self"?null:mid;
    let result;
    if(type==="recurring"){
      result=await db("recurring_events","POST",{body:{user_id:userId,club_id:cid,dependant_id:dep,title:title.trim(),frequency:"weekly",day_of_week:parseInt(dow),start_time:time+":00",duration_minutes:endTime?Math.max(30,Math.round((new Date("2000-01-01T"+endTime)-new Date("2000-01-01T"+time))/60000)):parseInt(dur),starts_from:new Date().toISOString().split("T")[0],excluded_dates:[]}});
    }else{
      if(!date){setSv(false);return}
      result=await db("manual_events","POST",{body:{user_id:userId,club_id:cid,dependant_id:dep,title:title.trim(),event_date:date+"T"+time+":00"}});
    }
    setSv(false);
    if(!result){alert("Failed to save event. Please try again.");return}
    onSaved();
  }
  return <div className="mbg" onClick={e=>e.target===e.currentTarget&&onClose()}><div className="mbox">
    <div style={{display:"flex",justifyContent:"space-between",marginBottom:20}}><h3 style={{fontFamily:"var(--sr)",fontSize:18,fontWeight:700,color:"var(--g)"}}>Add Event</h3><button onClick={onClose} style={{background:"none",border:"none",fontSize:20,cursor:"pointer",color:"var(--mt)"}}>✕</button></div>
    <div style={{display:"flex",flexDirection:"column",gap:12}}>
      <div><span className="lbl">Club</span>{clubs.length===0?<p style={{fontSize:13,color:"#dc2626",padding:8}}>No clubs added yet. Add a club first.</p>:<select value={cid} onChange={e=>setCid(e.target.value)}>{clubs.map(c=><option key={c.club_id} value={c.club_id}>{c.club_name}</option>)}</select>}</div>
      <div><span className="lbl">Who is this for?</span><select value={mid} onChange={e=>setMid(e.target.value)}><option value="self">{profile?.first_name||"Me"}</option>{kids.map(k=><option key={k.id} value={k.id}>{k.first_name}</option>)}</select></div>
      <div><span className="lbl">What</span><input value={title} onChange={e=>setTitle(e.target.value)} placeholder="e.g. Training, Match"/></div>
      <div style={{display:"flex",gap:8,background:"#f5f3ef",borderRadius:12,padding:4}}>
        <button onClick={()=>setType("recurring")} className={"pill "+(type==="recurring"?"pon":"poff")} style={{flex:1,padding:8}}>Every week</button>
        <button onClick={()=>setType("oneoff")} className={"pill "+(type==="oneoff"?"pon":"poff")} style={{flex:1,padding:8}}>One-off</button>
      </div>
      {type==="recurring"?<div style={{display:"flex",flexDirection:"column",gap:8}}>
        <div><span className="lbl">Day</span><select value={dow} onChange={e=>setDow(e.target.value)}>{DAYF.map((d,i)=><option key={i} value={i}>{d}</option>)}</select></div>
        <div style={{display:"flex",gap:8}}>
          <div style={{flex:1}}><span className="lbl">Start time</span><input type="time" value={time} onChange={e=>setTime(e.target.value)}/></div>
          <div style={{flex:1}}><span className="lbl">End time</span><input type="time" value={endTime} onChange={e=>setEndTime(e.target.value)}/></div>
        </div>
      </div>:<div style={{display:"flex",flexDirection:"column",gap:8}}>
        <div><span className="lbl">Date</span><input type="date" value={date} onChange={e=>setDate(e.target.value)}/></div>
        <div style={{display:"flex",gap:8}}>
          <div style={{flex:1}}><span className="lbl">Start time</span><input type="time" value={time} onChange={e=>setTime(e.target.value)}/></div>
          <div style={{flex:1}}><span className="lbl">End time</span><input type="time" value={endTime} onChange={e=>setEndTime(e.target.value)}/></div>
        </div>
      </div>}
      <button onClick={save} disabled={sv||!title.trim()||!cid} className="btn bp">{sv?"Saving...":(clubs.length===0?"Add a club first":"Save event")}</button>
    </div>
  </div></div>;
}

function AddPaymentModal({clubs,userId,kids,profile,onClose,onSaved}){
  const[cid,setCid]=useState(clubs[0]?.club_id||"");const[mid,setMid]=useState("self");
  const[desc,setDesc]=useState("");const[amt,setAmt]=useState("");const[due,setDue]=useState("");const[sv,setSv]=useState(false);
  async function save(){if(!desc.trim()||!amt||!due)return;setSv(true);const r=await db("payment_reminders","POST",{body:{user_id:userId,club_id:cid,dependant_id:mid==="self"?null:mid,description:desc.trim(),amount:parseFloat(amt),due_date:due}});setSv(false);if(!r){alert("Failed to save. Please try again.");return}onSaved()}
  return <div className="mbg" onClick={e=>e.target===e.currentTarget&&onClose()}><div className="mbox">
    <div style={{display:"flex",justifyContent:"space-between",marginBottom:20}}><h3 style={{fontFamily:"var(--sr)",fontSize:18,fontWeight:700,color:"var(--g)"}}>Add Payment Reminder</h3><button onClick={onClose} style={{background:"none",border:"none",fontSize:20,cursor:"pointer",color:"var(--mt)"}}>✕</button></div>

    </div>
    <button onClick={onClose} className="btn bp">Done</button>
  </div></div>;

  return <div className="mbg" onClick={e=>e.target===e.currentTarget&&onClose()}><div className="mbox">
    <div style={{display:"flex",justifyContent:"space-between",marginBottom:20}}>
      <h3 style={{fontFamily:"var(--sr)",fontSize:18,fontWeight:700,color:"var(--g)"}}>{editKid?"Edit "+editKid.first_name:"Add family member"}</h3>
      <button onClick={onClose} style={{background:"none",border:"none",fontSize:20,cursor:"pointer",color:"var(--mt)"}}>✕</button>
    </div>
    {!editKid&&<div style={{display:"flex",gap:8,background:"#f5f3ef",borderRadius:12,padding:4,marginBottom:16}}>
      <button onClick={()=>setMemberType("kid")} style={{flex:1,padding:10,borderRadius:10,border:"none",background:memberType==="kid"?"var(--g)":"transparent",color:memberType==="kid"?"#fff":"var(--mt)",fontSize:13,fontWeight:700,cursor:"pointer",fontFamily:"var(--sn)"}}>👧 Child</button>
      <button onClick={()=>setMemberType("adult")} style={{flex:1,padding:10,borderRadius:10,border:"none",background:memberType==="adult"?"var(--g)":"transparent",color:memberType==="adult"?"#fff":"var(--mt)",fontSize:13,fontWeight:700,cursor:"pointer",fontFamily:"var(--sn)"}}>👤 Adult / Partner</button>
    </div>}
    <div style={{display:"flex",flexDirection:"column",gap:12}}>
      <div><span className="lbl">Name</span><input value={name} onChange={e=>setName(e.target.value)} placeholder="First name"/></div>

        <div><span className="lbl">Their email</span><input type="email" value={adultEmail} onChange={e=>setAdultEmail(e.target.value)} placeholder="email@example.com"/></div>
        <p style={{fontSize:12,color:"var(--mt)",lineHeight:1.4}}>They'll get an invite email and can sign up to see the same family calendar.</p>
      </>}
      {memberType==="kid"&&<>
        <div><span className="lbl">Date of birth</span><input type="date" value={dob} onChange={e=>setDob(e.target.value)}/></div>

function EditClubModal({club,kids,profile,userId,onClose,onSaved,onDelete}){
  const[who,setWho]=useState([]);
  const[sv,setSv]=useState(false);
  const[clubUrl,setClubUrl]=useState("");
  const[clubFb,setClubFb]=useState("");
  const[clubPhone,setClubPhone]=useState("");
  const[clubEmail,setClubEmail]=useState("");
  const[clubEircode,setClubEircode]=useState("");
  const[clubNotes,setClubNotes]=useState("");
  const[termStart,setTermStart]=useState("");
  const[termEnd,setTermEnd]=useState("");
  const[allSubs,setAllSubs]=useState([]);
  const[showDetails,setShowDetails]=useState(false);
  const[loaded,setLoaded]=useState(false);

  useEffect(()=>{
    // Load club details and all subscriptions for this club
    (async()=>{
      const clubData=await db("clubs","GET",{filters:["id=eq."+club.club_id]});
      if(clubData&&clubData[0]){
        const cd=clubData[0];
        setClubUrl(cd.website_url||"");setClubFb(cd.facebook_url||"");
        setClubPhone(cd.contact_phone||"");setClubEmail(cd.contact_email||"");
        setClubEircode(cd.eircode||"");setClubNotes(cd.notes||"");
        setTermStart(cd.term_start||"");setTermEnd(cd.term_end||"");
      }
      const subs=await db("hub_subscriptions","GET",{filters:["user_id=eq."+userId,"club_id=eq."+club.club_id]});
      const ids=(subs||[]).map(s=>s.dependant_id||"self");
      setWho(ids);
      setAllSubs(subs||[]);
      setLoaded(true);
    })();
  },[]);

  async function save(){
    setSv(true);
    // Update club details
    await db("clubs","PATCH",{body:{website_url:clubUrl.trim()||null,facebook_url:clubFb.trim()||null,contact_phone:clubPhone.trim()||null,contact_email:clubEmail.trim()||null,eircode:clubEircode.trim()||null,notes:clubNotes.trim()||null,term_start:termStart||null,term_end:termEnd||null},filters:["id=eq."+club.club_id]});
    // Sync subscriptions: remove old ones, add new ones
    const currentIds=allSubs.map(s=>s.dependant_id||"self");
    // Remove subs no longer selected
    for(const s of allSubs){
      const sid=s.dependant_id||"self";
      if(!who.includes(sid)){
        await db("hub_subscriptions","DELETE",{filters:["id=eq."+s.id]});
      }
    }
    // Add new subs
    for(const w of who){
      if(!currentIds.includes(w)){
        await db("hub_subscriptions","POST",{body:{user_id:userId,club_id:club.club_id,dependant_id:w==="self"?null:w,colour:club.colour||"#2d5a3f"}});
      }
    }
    setSv(false);onSaved();
  }

  async function remove(){
    if(!confirm("Remove "+club.club_name+" from your family?"))return;
    setSv(true);
    for(const s of allSubs){
      await db("hub_subscriptions","DELETE",{filters:["id=eq."+s.id]});
    }
    setSv(false);onDelete();
  }

  function toggleMember(id){
    setWho(prev=>prev.includes(id)?prev.filter(x=>x!==id):[...prev,id]);
  }

  if(!loaded)return <div className="mbg"><div className="mbox" style={{textAlign:"center",padding:40}}><p>Loading...</p></div></div>;

  return <div className="mbg" onClick={e=>e.target===e.currentTarget&&onClose()}><div className="mbox">
    <div style={{display:"flex",justifyContent:"space-between",marginBottom:16}}>
      <h3 style={{fontFamily:"var(--sr)",fontSize:18,fontWeight:700,color:"var(--g)"}}>{club.club_name}</h3>
      <button onClick={onClose} style={{background:"none",border:"none",fontSize:20,cursor:"pointer",color:"var(--mt)"}}>✕</button>
    </div>
    {club.club_addr&&<p style={{fontSize:12,color:"var(--mt)",marginBottom:12}}>{club.club_addr}</p>}

    {/* Who attends - multi-select */}
    <div style={{marginBottom:16}}>
      <span className="lbl">Who goes to this club?</span>
      <div style={{display:"flex",flexWrap:"wrap",gap:8,marginTop:6}}>
        <button onClick={()=>toggleMember("self")} style={{padding:"8px 16px",borderRadius:10,border:who.includes("self")?"2px solid var(--g)":"2px solid var(--bd)",background:who.includes("self")?"var(--gxl)":"var(--card)",cursor:"pointer",fontSize:13,fontWeight:600,color:who.includes("self")?"var(--gl)":"var(--mt)",fontFamily:"var(--sn)"}}>👤 {profile?.first_name||"Me"}</button>
        {kids.map(k=><button key={k.id} onClick={()=>toggleMember(k.id)} style={{padding:"8px 16px",borderRadius:10,border:who.includes(k.id)?"2px solid var(--g)":"2px solid var(--bd)",background:who.includes(k.id)?"var(--gxl)":"var(--card)",cursor:"pointer",fontSize:13,fontWeight:600,color:who.includes(k.id)?"var(--gl)":"var(--mt)",fontFamily:"var(--sn)"}}>👧 {k.first_name}</button>)}
      </div>
    </div>

    {/* Club details toggle */}
    <button onClick={()=>setShowDetails(!showDetails)} style={{width:"100%",padding:12,borderRadius:12,border:"1px solid var(--bd)",background:"var(--card)",cursor:"pointer",fontSize:13,fontWeight:600,color:"var(--mt)",fontFamily:"var(--sn)",marginBottom:12,textAlign:"left",display:"flex",justifyContent:"space-between"}}>
      <span>Club details {clubUrl||clubPhone?"(added)":""}</span>
      <span>{showDetails?"▲":"▼"}</span>
    </button>

    {showDetails&&<div style={{display:"flex",flexDirection:"column",gap:10,marginBottom:16,background:"#f8f7f4",borderRadius:14,padding:14,border:"1px solid var(--bd)"}}>
      <div><span className="lbl">Website</span><input value={clubUrl} onChange={e=>setClubUrl(e.target.value)} placeholder="https://..."/></div>
      <div><span className="lbl">Facebook page</span><input value={clubFb} onChange={e=>setClubFb(e.target.value)} placeholder="https://facebook.com/..."/></div>
      <div style={{display:"flex",gap:8}}>
        <div style={{flex:1}}><span className="lbl">Phone</span><input value={clubPhone} onChange={e=>setClubPhone(e.target.value)} placeholder="085..."/></div>
        <div style={{flex:1}}><span className="lbl">Email</span><input value={clubEmail} onChange={e=>setClubEmail(e.target.value)} placeholder="info@club.ie"/></div>
      </div>
      <div><span className="lbl">Eircode</span><input value={clubEircode} onChange={e=>setClubEircode(e.target.value)} placeholder="D05 X1Y2" style={{maxWidth:140}}/></div>
      <div style={{display:"flex",gap:8}}>
        <div style={{flex:1}}><span className="lbl">Term starts</span><input type="date" value={termStart} onChange={e=>setTermStart(e.target.value)}/></div>
        <div style={{flex:1}}><span className="lbl">Term ends</span><input type="date" value={termEnd} onChange={e=>setTermEnd(e.target.value)}/></div>
      </div>
      <div><span className="lbl">Notes</span><textarea value={clubNotes} onChange={e=>setClubNotes(e.target.value)} placeholder="Coach name, WhatsApp group link, gear needed..." rows={3} style={{width:"100%",padding:10,borderRadius:10,border:"1px solid var(--bd)",fontSize:13,fontFamily:"var(--sn)",resize:"vertical"}}/></div>
    </div>}

    {/* Quick links if URLs set */}
    {(clubUrl||clubFb)&&!showDetails&&<div style={{display:"flex",gap:6,marginBottom:12}}>
      {clubUrl&&<a href={clubUrl} target="_blank" rel="noopener" style={{flex:1,textAlign:"center",padding:8,borderRadius:10,background:"var(--g)",color:"#fff",fontSize:12,fontWeight:700,textDecoration:"none"}}>Website</a>}
      {clubFb&&<a href={clubFb} target="_blank" rel="noopener" style={{flex:1,textAlign:"center",padding:8,borderRadius:10,background:"#1877F2",color:"#fff",fontSize:12,fontWeight:700,textDecoration:"none"}}>Facebook</a>}
    </div>}

    {/* Term info if set */}
    {termStart&&termEnd&&!showDetails&&<div style={{fontSize:12,color:"var(--mt)",marginBottom:12,background:"var(--sage)",padding:"8px 12px",borderRadius:10}}>
      📅 Current term: {new Date(termStart).toLocaleDateString("en-IE",{day:"numeric",month:"short"})} – {new Date(termEnd).toLocaleDateString("en-IE",{day:"numeric",month:"short"})}
    </div>}

    <button onClick={save} disabled={sv} className="btn bp" style={{marginBottom:8}}>{sv?"Saving...":"Save changes"}</button>
    <button onClick={remove} disabled={sv} style={{width:"100%",padding:12,borderRadius:14,border:"none",background:"#fef2f2",cursor:"pointer",fontSize:13,fontWeight:600,color:"#dc2626",fontFamily:"var(--sn)"}}>Remove club</button>
  </div></div>;
}

function InviteAdultModal({userId,familyId,onClose,onSaved}){
  const[email,setEmail]=useState("");const[name,setName]=useState("");const[sv,setSv]=useState(false);const[done,setDone]=useState(false);

  async function send(){
    if(!email.trim())return;setSv(true);

      const fam=await db("families","POST",{body:{created_by:userId}});

    setSv(false);

    <button onClick={onClose} className="btn bp">Done</button>

    </div>
    <p style={{fontSize:13,color:"var(--mt)",marginBottom:16}}>Add your partner or another adult. They’ll get their own login and see the same family calendar.</p>

function EditHolidayModal({holiday,userId,onClose,onSaved}){

  const[start,setStart]=useState(holiday.start_date);
  const[end,setEnd]=useState(holiday.end_date);
  const[sv,setSv]=useState(false);

  async function save(){
    setSv(true);
    if(holiday.is_user_override){
      // Update existing user override
      await db("user_school_holidays","PATCH",{body:{name,start_date:start,end_date:end},filters:["id=eq."+holiday.id]});
    } else {
      // Create a user override from the default
      await db("user_school_holidays","POST",{body:{user_id:userId,base_holiday_id:holiday.id,name,start_date:start,end_date:end,holiday_type:holiday.holiday_type}});
    }
    setSv(false);onSaved();
  }

  async function reset(){
    if(!holiday.is_user_override)return;
    setSv(true);
    await db("user_school_holidays","DELETE",{filters:["id=eq."+holiday.id]});
    setSv(false);onSaved();
  }

  async function remove(){
    if(!confirm("Remove this holiday from your calendar?"))return;
    setSv(true);
    if(holiday.is_user_override){
      await db("user_school_holidays","DELETE",{filters:["id=eq."+holiday.id]});
    } else {
      // Create an override that marks it as hidden
      await db("user_school_holidays","POST",{body:{user_id:userId,base_holiday_id:holiday.id,name:holiday.name+"_hidden",start_date:holiday.start_date,end_date:holiday.start_date,holiday_type:"hidden"}});
    }
    setSv(false);onSaved();
  }

  return <div className="mbg" onClick={e=>e.target===e.currentTarget&&onClose()}><div className="mbox">

function AddHolidayModal({userId,onClose,onSaved}){

  async function save(){
    if(!name.trim()||!start||!end)return;setSv(true);
    await db("user_school_holidays","POST",{body:{user_id:userId,name:name.trim(),start_date:start,end_date:end,holiday_type:"custom"}});
    setSv(false);onSaved();
  }
  return <div className="mbg" onClick={e=>e.target===e.currentTarget&&onClose()}><div className="mbox">
    <div style={{display:"flex",justifyContent:"space-between",marginBottom:20}}>
      <h3 style={{fontFamily:"var(--sr)",fontSize:18,fontWeight:700,color:"var(--g)"}}>Add School Holiday</h3>
      <button onClick={onClose} style={{background:"none",border:"none",fontSize:20,cursor:"pointer",color:"var(--mt)"}}>✕</button>
    </div>
    <p style={{fontSize:13,color:"var(--mt)",marginBottom:16}}>Add a holiday your school has that’s not in the standard calendar</p>
    <div style={{display:"flex",flexDirection:"column",gap:12}}>
      <div><span className="lbl">Name</span><input value={name} onChange={e=>setName(e.target.value)} placeholder="e.g. School closure day, Staff training day"/></div>
      <div style={{display:"flex",gap:8}}>
        <div style={{flex:1}}><span className="lbl">Starts</span><input type="date" value={start} onChange={e=>setStart(e.target.value)}/></div>
        <div style={{flex:1}}><span className="lbl">Ends</span><input type="date" value={end} onChange={e=>setEnd(e.target.value)}/></div>
      </div>
      <button onClick={save} disabled={sv||!name.trim()||!start||!end} className="btn bp">{sv?"Saving...":"Add holiday"}</button>
    </div>
  </div></div>;
}


function CampCard({camp,user,kids,filter,campBookings,CT,fmtDate,onBookingChange}){
  const[classmateCount,setClassmateCount]=useState(0);
  const activeKid=filter!=="all"&&filter!=="self"?kids.find(k=>k.id===filter):null;
  const hasSchool=activeKid?.school_name&&activeKid?.school_class;
  const myBooking=campBookings.find(b=>b.camp_id===camp.id);
  const ct=CT[camp.camp_type]||CT.other;
  const coversWork=camp.daily_end_time&&camp.daily_end_time>="15:00";

  useEffect(()=>{
    if(hasSchool&&activeKid){
      rpc("camp_classmates_count",{p_camp_id:camp.id,p_dependant_id:activeKid.id}).then(n=>{
        if(n!=null)setClassmateCount(n);
      });
    } else {setClassmateCount(0)}
  },[camp.id,activeKid?.id,hasSchool,campBookings.length]);

  async function markCamp(status){
    await db("camp_bookings","POST",{body:{user_id:user.id,dependant_id:activeKid?.id||null,camp_id:camp.id,status}});
    onBookingChange();
  }
  async function removeCamp(){
    if(myBooking)await db("camp_bookings","DELETE",{filters:["id=eq."+myBooking.id]});
    onBookingChange();
  }

  return <div style={{background:"var(--card)",borderRadius:16,border:"1px solid var(--bd)",padding:16,marginBottom:10}}>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
      <div style={{flex:1}}>
        <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:4}}>
          <span style={{fontSize:16}}>{ct.i}</span>
          <span style={{fontSize:14,fontWeight:700}}>{camp.title}</span>
        </div>
        <div style={{fontSize:12,color:"var(--mt)"}}>{camp.location_name}</div>
        <div style={{fontSize:12,color:"var(--mt)",marginTop:2}}>
          {camp.start_date&&camp.end_date?fmtDate(new Date(camp.start_date+"T00:00"))+" – "+fmtDate(new Date(camp.end_date+"T00:00")):""}
          {camp.daily_start_time&&camp.daily_end_time?" · "+camp.daily_start_time?.slice(0,5)+"–"+camp.daily_end_time?.slice(0,5):""}
        </div>
        <div style={{display:"flex",gap:6,marginTop:8,flexWrap:"wrap"}}>
          <span style={{fontSize:11,fontWeight:700,padding:"3px 8px",borderRadius:6,background:"var(--accl)",color:"#8a6d00"}}>€{camp.cost_eur}</span>
          <span style={{fontSize:11,fontWeight:600,padding:"3px 8px",borderRadius:6,background:"#f0f0f0",color:"var(--mt)"}}>Ages {camp.age_min}–{camp.age_max}</span>
          {(()=>{const suited=kids.filter(k=>{const a=k.date_of_birth?Math.floor((new Date()-new Date(k.date_of_birth))/(365.25*86400000)):null;return a!==null&&a>=camp.age_min&&a<=camp.age_max});return suited.length>0?<span style={{fontSize:11,fontWeight:600,padding:"3px 8px",borderRadius:6,background:"#e8f0fe",color:"#1a56db"}}>👧 Suits {suited.map(k=>k.first_name).join(", ")}</span>:null})()}
          {coversWork&&<span style={{fontSize:11,fontWeight:600,padding:"3px 8px",borderRadius:6,background:"var(--gxl)",color:"var(--gl)"}}>✓ Covers work day</span>}
        </div>
      </div>
    </div>

    {/* Classmate notification */}
    {classmateCount>0&&<div style={{marginTop:10,padding:"8px 12px",borderRadius:10,background:"#eef6ff",border:"1px solid #c5ddf5",display:"flex",alignItems:"center",gap:8}}>
      <span style={{fontSize:14}}>🏫</span>
      <span style={{fontSize:12,fontWeight:600,color:"#1a5fa0"}}>{classmateCount} {classmateCount===1?"family":"families"} from {activeKid.school_class} at {activeKid.school_name} {classmateCount===1?"has":"have"} booked this camp</span>
    </div>}
    {hasSchool&&classmateCount===0&&<div style={{marginTop:8,fontSize:11,color:"var(--mt)",fontStyle:"italic"}}>
      🏫 We’ll notify you when classmates from {activeKid.school_class} book this camp
    </div>}

    {/* Interested / Booked buttons */}
    <div style={{display:"flex",gap:6,marginTop:10}}>
      {!myBooking?<>
        <button onClick={()=>markCamp("interested")} style={{flex:1,padding:8,borderRadius:10,border:"1px solid var(--bd)",background:"var(--card)",cursor:"pointer",fontSize:12,fontWeight:700,color:"var(--mt)",fontFamily:"var(--sn)"}}>❤️ Interested</button>
        <button onClick={()=>markCamp("booked")} style={{flex:1,padding:8,borderRadius:10,border:"1px solid var(--g)",background:"var(--card)",cursor:"pointer",fontSize:12,fontWeight:700,color:"var(--g)",fontFamily:"var(--sn)"}}>Mark booked</button>
      </>:
        <div style={{flex:1,padding:8,borderRadius:10,background:myBooking.status==="booked"?"var(--gxl)":"var(--accl)",textAlign:"center",fontSize:12,fontWeight:700,color:myBooking.status==="booked"?"var(--gl)":"#8a6d00"}}>
          {myBooking.status==="booked"?"✓ Booked":"❤️ Interested"}
          <button onClick={removeCamp} style={{marginLeft:8,background:"none",border:"none",fontSize:11,color:"var(--mt)",cursor:"pointer",textDecoration:"underline"}}>undo</button>
        </div>
      }
    </div>

    {camp.booking_url&&camp.booking_url!=="#"&&<a href={camp.booking_url} target="_blank" rel="noopener" style={{display:"block",marginTop:6,textAlign:"center",padding:10,borderRadius:10,background:"var(--g)",color:"#fff",fontSize:13,fontWeight:700,textDecoration:"none"}}>Book on their site →</a>}
  </div>;
}

function SupportModal({userId,userEmail,onClose}){
  const[subject,setSubject]=useState("");const[message,setMessage]=useState("");const[sv,setSv]=useState(false);const[done,setDone]=useState(false);
  async function send(){
    if(!subject.trim()||!message.trim())return;setSv(true);
    await db("support_tickets","POST",{body:{user_id:userId,user_email:userEmail,subject:subject.trim(),message:message.trim()}});
    setSv(false);setDone(true);
  }
  if(done)return <div className="mbg" onClick={e=>e.target===e.currentTarget&&onClose()}><div className="mbox" style={{textAlign:"center",padding:32}}>
    <div style={{fontSize:48,marginBottom:12}}>✅</div>
    <h3 style={{fontFamily:"var(--sr)",fontSize:18,fontWeight:700,color:"var(--g)"}}>Message sent!</h3>
    <p style={{fontSize:13,color:"var(--mt)",margin:"8px 0 16px"}}>We'll get back to you at {userEmail}</p>
    <button onClick={onClose} className="btn bp">Done</button>
  </div></div>;
  return <div className="mbg" onClick={e=>e.target===e.currentTarget&&onClose()}><div className="mbox">
    <div style={{display:"flex",justifyContent:"space-between",marginBottom:16}}>
      <h3 style={{fontFamily:"var(--sr)",fontSize:18,fontWeight:700,color:"var(--g)"}}>Contact Support</h3>
      <button onClick={onClose} style={{background:"none",border:"none",fontSize:20,cursor:"pointer",color:"var(--mt)"}}>✕</button>
    </div>
    <div style={{display:"flex",flexDirection:"column",gap:12}}>
      <div><span className="lbl">Subject</span><input value={subject} onChange={e=>setSubject(e.target.value)} placeholder="What do you need help with?"/></div>
      <div><span className="lbl">Message</span><textarea value={message} onChange={e=>setMessage(e.target.value)} placeholder="Describe your issue..." rows={4} style={{width:"100%",padding:10,borderRadius:10,border:"1px solid var(--bd)",fontSize:13,fontFamily:"var(--sn)",resize:"vertical"}}/></div>
      <button onClick={send} disabled={sv||!subject.trim()||!message.trim()} className="btn bp">{sv?"Sending...":"Send message"}</button>
    </div>
  </div></div>;
}

function AdminDashboard({user,onBack}){
  const[stats,setStats]=useState(null);const[tickets,setTickets]=useState([]);const[loading,setLoading]=useState(true);
  const[users,setUsers]=useState([]);

  useEffect(()=>{
    (async()=>{
      const s=await rpc("admin_dashboard_stats");
      setStats(s);
      const t=await db("support_tickets","GET",{order:"created_at.desc"});
      setTickets(t||[]);
      const u=await db("profiles","GET",{order:"created_at.desc"});
      setUsers(u||[]);
      setLoading(false);
    })();
  },[]);

  if(loading)return <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"var(--bg)"}}><p>Loading dashboard...</p></div>;

  const S=({label,value,color,sub})=><div style={{background:"#fff",borderRadius:14,padding:16,border:"1px solid var(--bd)"}}>
    <div style={{fontSize:24,fontWeight:800,color:color||"var(--g)",fontFamily:"var(--sr)"}}>{value}</div>
    <div style={{fontSize:12,fontWeight:600,color:"var(--mt)",marginTop:2}}>{label}</div>
    {sub&&<div style={{fontSize:11,color:"var(--mt)",marginTop:2}}>{sub}</div>}
  </div>;

  return <div style={{minHeight:"100vh",background:"var(--bg)"}}>
    <div style={{background:"var(--g)",padding:"20px 16px",display:"flex",alignItems:"center",gap:12}}>
      <button onClick={onBack} style={{background:"none",border:"none",color:"#fff",fontSize:20,cursor:"pointer"}}>←</button>
      <h1 style={{fontFamily:"var(--sr)",fontSize:20,fontWeight:700,color:"#fff"}}>Admin Dashboard</h1>
    </div>
    <div style={{maxWidth:600,margin:"0 auto",padding:16}}>

      {/* Key Metrics */}
      <h2 style={{fontFamily:"var(--sr)",fontSize:18,fontWeight:700,color:"var(--g)",marginBottom:12}}>Key Metrics</h2>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:24}}>
        <S label="Total Families" value={stats?.total_families||0} color="var(--g)"/>
        <S label="Total Users" value={stats?.total_users||0}/>
        <S label="Active (7d)" value={stats?.active_users_7d||0} color="#2d7cb5"/>
        <S label="Active (30d)" value={stats?.active_users_30d||0}/>
      </div>

      {/* Revenue */}
      <h2 style={{fontFamily:"var(--sr)",fontSize:18,fontWeight:700,color:"var(--g)",marginBottom:12}}>Revenue</h2>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10,marginBottom:24}}>
        <S label="MRR" value={"€"+(stats?.mrr||0)} color="#2d7cb5"/>
        <S label="Subscribers" value={stats?.active_subscribers||0} color="var(--gl)"/>
        <S label="Trial" value={stats?.trial_users||0} color="#f0a500"/>
      </div>

      {/* Churn */}
      <h2 style={{fontFamily:"var(--sr)",fontSize:18,fontWeight:700,color:"var(--g)",marginBottom:12}}>Churn</h2>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:24}}>
        <S label="Churned" value={stats?.churned_users||0} color="#dc2626"/>
        <S label="Avg days to churn" value={stats?.avg_days_to_churn||"—"}/>
      </div>

      {/* Growth */}
      <h2 style={{fontFamily:"var(--sr)",fontSize:18,fontWeight:700,color:"var(--g)",marginBottom:12}}>Growth</h2>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:24}}>
        <S label="Signups (7d)" value={stats?.signups_last_7d||0} color="var(--gl)"/>
        <S label="Signups (30d)" value={stats?.signups_last_30d||0}/>
      </div>

      {/* Product */}
      <h2 style={{fontFamily:"var(--sr)",fontSize:18,fontWeight:700,color:"var(--g)",marginBottom:12}}>Product</h2>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10,marginBottom:24}}>
        <S label="Avg family size" value={stats?.avg_family_size||"—"}/>
        <S label="Avg clubs/family" value={stats?.avg_clubs_per_family||"—"}/>
        <S label="Total kids" value={stats?.total_kids||0}/>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:24}}>
        <S label="Clubs tracked" value={stats?.total_clubs_tracked||0}/>
        <S label="Camps listed" value={stats?.total_camps_listed||0}/>
      </div>

      {/* Support Tickets */}
      <h2 style={{fontFamily:"var(--sr)",fontSize:18,fontWeight:700,color:"var(--g)",marginBottom:12}}>Support ({stats?.open_tickets||0} open)</h2>
      {tickets.length===0?<p style={{color:"var(--mt)",fontSize:13}}>No tickets yet</p>
      :tickets.slice(0,20).map(t=><div key={t.id} style={{background:"#fff",borderRadius:14,border:"1px solid var(--bd)",padding:14,marginBottom:8}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <span style={{fontSize:14,fontWeight:600}}>{t.subject}</span>
          <span style={{fontSize:11,fontWeight:700,padding:"3px 8px",borderRadius:6,
            background:t.status==="open"?"#fef2f2":t.status==="resolved"?"var(--sage)":"var(--goldl)",
            color:t.status==="open"?"#dc2626":t.status==="resolved"?"var(--gl)":"#8a6d00"
          }}>{t.status}</span>
        </div>
        <div style={{fontSize:12,color:"var(--mt)",marginTop:4}}>{t.user_email} · {new Date(t.created_at).toLocaleDateString("en-IE",{day:"numeric",month:"short",hour:"2-digit",minute:"2-digit"})}</div>
        <div style={{fontSize:13,color:"var(--tx)",marginTop:6,lineHeight:1.4}}>{t.message.substring(0,150)}{t.message.length>150?"...":""}</div>
      </div>)}

      {/* Recent Users */}
      <h2 style={{fontFamily:"var(--sr)",fontSize:18,fontWeight:700,color:"var(--g)",marginBottom:12,marginTop:24}}>Recent Users</h2>
      {users.slice(0,20).map(u=><div key={u.id} style={{background:"#fff",borderRadius:10,border:"1px solid var(--bd)",padding:12,marginBottom:6,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <div>
          <span style={{fontSize:13,fontWeight:600}}>{u.first_name||"—"} {u.last_name||""}</span>
          <div style={{fontSize:11,color:"var(--mt)"}}>{u.email||u.id.substring(0,8)} · Joined {new Date(u.created_at).toLocaleDateString("en-IE",{day:"numeric",month:"short"})}</div>
        </div>
        <span style={{fontSize:11,fontWeight:700,padding:"3px 8px",borderRadius:6,
          background:u.subscription_status==="active"?"var(--sage)":u.subscription_status==="churned"?"#fef2f2":"var(--goldl)",
          color:u.subscription_status==="active"?"var(--gl)":u.subscription_status==="churned"?"#dc2626":"#8a6d00"
        }}>{u.subscription_status||"trial"}</span>
      </div>)}

    </div>
  </div>;
}

function App(){
  const[screen,setScreen]=useState("loading");const[user,setUser]=useState(null);const[profile,setProfile]=useState(null);const[kids,setKids]=useState([]);

  useEffect(()=>{
    const t=localStorage.getItem("ocv_token");
    if(t){_t=t;au("user").then(async u=>{
      const p=await db("profiles","GET",{filters:["id=eq."+u.id]});
      const pr=p&&p[0]?p[0]:null;
      setUser(u);setProfile(pr);
      if(pr&&(pr.role==="admin"||pr.role==="support"||pr.onboarding_completed))setScreen("hub");
      else setScreen("onboard_kids");
    }).catch(()=>{localStorage.removeItem("ocv_token");setScreen("landing")})}
    else setScreen("landing");
  },[]);

  async function onAuth(u){
    if(_t)localStorage.setItem("ocv_token",_t);
    setUser(u);
    const p=await db("profiles","GET",{filters:["id=eq."+u.id]});
    const pr=p&&p[0]?p[0]:null;
    setProfile(pr);
    if(pr&&(pr.role==="admin"||pr.role==="support"||pr.onboarding_completed))setScreen("hub");
    else setScreen("onboard_kids");
  }

  async function afterKids(){
    const k=await db("dependants","GET",{filters:["parent_user_id=eq."+user.id]});
    setKids(k||[]);
    setScreen("onboard_clubs");
  }

  function logout(){localStorage.removeItem("ocv_token");_t=null;setUser(null);setProfile(null);setScreen("landing")}

  if(screen==="loading")return <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"var(--warm)"}}><Logo/></div>;
  if(screen==="landing")return <Landing onGo={()=>setScreen("auth_signup")} onLogin={()=>setScreen("auth_login")}/>;
  if(screen==="auth_signup")return <Auth onAuth={onAuth} mode="signup"/>;
  if(screen==="auth_login")return <Auth onAuth={onAuth} mode="login"/>;
  if(screen==="onboard_kids")return <OnboardKids userId={user.id} onDone={afterKids}/>;
  if(screen==="onboard_clubs")return <OnboardClubs userId={user.id} kids={kids} onDone={()=>setScreen("hub")}/>;
  if(screen==="hub")return <Hub user={user} profile={profile} onRefresh={(s)=>{if(s==="clubs")setScreen("onboard_clubs")}} onLogout={logout}/>;
  return null;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);

</script>

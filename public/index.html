const{useState,useEffect,useMemo,useRef}=React;
const SB="https://uqihwazheypvmrcrqklg.supabase.co";
const SK="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVxaWh3YXpoZXlwdm1yY3Jxa2xnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI4Nzg1MjQsImV4cCI6MjA4ODQ1NDUyNH0.n5I1lkCu7Tf1sBbIceWUdsRQtIrH7-WGc3itZAfrBKI";
let _t=null;
const hd=()=>({apikey:SK,"Content-Type":"application/json",Authorization:"Bearer "+(_t||SK)});

async function au(a,b){
  const ep={signup:"/auth/v1/signup",login:"/auth/v1/token?grant_type=password",user:"/auth/v1/user"};
  const r=await fetch(SB+ep[a],{method:a==="user"?"GET":"POST",headers:hd(),body:a==="user"?undefined:JSON.stringify(b)});
  const d=await r.json();
  if(!r.ok)throw new Error(d.msg||d.error_description||d.message||"Error");
  if(d.access_token)_t=d.access_token;
  return d;
}

async function db(t,m,o={}){
  let u=SB+"/rest/v1/"+t;
  const p=[];
  if(o.select)p.push("select="+encodeURIComponent(o.select));
  if(o.filters)o.filters.forEach(f=>p.push(f));
  if(o.order)p.push("order="+o.order);
  if(o.limit)p.push("limit="+o.limit);
  if(p.length)u+="?"+p.join("&");
  const h=hd();
  if(m==="POST"||m==="PATCH")h.Prefer="return=representation";
  const r=await fetch(u,{method:m,headers:h,body:o.body?JSON.stringify(o.body):undefined});
  if(!r.ok){console.error("DB err:",await r.text());return null}
  const txt=await r.text();
  return txt?JSON.parse(txt):null;
}

const COLS=["#2d7cb5","#2d5a3f","#c4960c","#9b4dca","#d64545","#1a8a7d","#e67e22","#e84393"];
const DAYF=["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
function getAge(d){if(!d)return null;const t=new Date(),b=new Date(d);let a=t.getFullYear()-b.getFullYear();if(t.getMonth()<b.getMonth()||(t.getMonth()===b.getMonth()&&t.getDate()<b.getDate()))a--;return a}
function weekDates(){const n=new Date(),d=n.getDay(),m=new Date(n);m.setDate(n.getDate()-((d+6)%7));return Array.from({length:7},(_,i)=>{const x=new Date(m);x.setDate(m.getDate()+i);return x})}
function isToday(d){const n=new Date();return d.getFullYear()===n.getFullYear()&&d.getMonth()===n.getMonth()&&d.getDate()===n.getDate()}
function fmtDate(d){return d.toLocaleDateString("en-IE",{weekday:"short",day:"numeric",month:"short"})}
const CT={sport:{i:"⚽"},arts:{i:"🎨"},stem:{i:"🤖"},outdoor:{i:"🏔"},drama:{i:"🎭"},multi_activity:{i:"🎪"},music:{i:"🎵"},other:{i:"📌"}};

        <p style={{fontSize:14,color:"var(--mt)",marginTop:8}}>14-day free trial. Cancel anytime.</p>

function Auth({onAuth,mode:im}){
  const[mode,setMode]=useState(im||"signup");
  const[email,setEmail]=useState("");
  const[pw,setPw]=useState("");
  const[err,setErr]=useState(null);
  const[ld,setLd]=useState(false);

  async function go(){
    setLd(true);setErr(null);
    try{
      if(mode==="signup"){const d=await au("signup",{email,password:pw,data:{}});onAuth(d.user||d)}
      else{const d=await au("login",{email,password:pw});onAuth(d.user)}
    }catch(e){setErr(e.message)}
    setLd(false);
  }

  return (
    <div className="fi" style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",padding:16,background:"var(--warm)"}}>
      <div style={{width:"100%",maxWidth:400}}>
        <div style={{textAlign:"center",marginBottom:32}}><Logo/></div>
        <div style={{background:"var(--card)",borderRadius:24,border:"1px solid var(--bd)",padding:28}}>
          <div style={{display:"flex",background:"#f5f3ef",borderRadius:12,padding:4,marginBottom:24}}>
            {["signup","login"].map(m=>(
              <button key={m} onClick={()=>setMode(m)} style={{flex:1,padding:"9px 0",borderRadius:8,border:"none",cursor:"pointer",fontSize:13,fontWeight:700,fontFamily:"var(--sn)",background:mode===m?"#fff":"transparent",color:mode===m?"var(--g)":"var(--mt)"}}>
                {m==="signup"?"Sign up":"Log in"}
              </button>
            ))}
          </div>
          {err&&<div style={{marginBottom:16,padding:12,borderRadius:12,background:"#fef2f2",color:"#b91c1c",fontSize:13}}>{err}</div>}
          <div style={{display:"flex",flexDirection:"column",gap:14}}>
            <input type="email" value={email} onChange={e=>setEmail(e.target.value)} placeholder="Email"/>
            <input type="password" value={pw} onChange={e=>setPw(e.target.value)} placeholder="Password" onKeyDown={e=>e.key==="Enter"&&go()}/>
            <button onClick={go} disabled={ld} className="btn bp">{ld?"...":mode==="signup"?"Start free trial":"Log in"}</button>
            {mode==="signup"&&<p style={{fontSize:12,color:"var(--mt)",textAlign:"center"}}>14 days free, then €7.99/month</p>}
          </div>
        </div>
      </div>
    </div>
  );
}

function OnboardKids({userId,onDone}){
  const[name,setName]=useState("");const[dob,setDob]=useState("");const[kids,setKids]=useState([]);const[sv,setSv]=useState(false);
  async function add(){if(!name.trim())return;setSv(true);const r=await db("dependants","POST",{body:{parent_user_id:userId,first_name:name.trim(),date_of_birth:dob||null}});if(r&&r[0])setKids([...kids,{id:r[0].id,name:name.trim(),dob}]);setName("");setDob("");setSv(false)}
  return (
    <div className="fi" style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",padding:20,background:"var(--warm)"}}>
      <div style={{width:"100%",maxWidth:420,textAlign:"center"}}>
        <div style={{fontSize:48,marginBottom:12}}>👋</div>
        <h2 style={{fontFamily:"var(--sr)",fontSize:24,fontWeight:800,color:"var(--g)"}}>Who’s in your family?</h2>
        <p style={{fontSize:14,color:"var(--mt)",marginTop:6}}>Add your kids so we can match clubs and camps to them</p>
        {kids.length>0&&<div style={{margin:"20px 0",display:"flex",flexDirection:"column",gap:8}}>
          {kids.map(k=><div key={k.id} style={{display:"flex",alignItems:"center",gap:10,background:"var(--gxl)",borderRadius:14,padding:"10px 16px",border:"1px solid #c8e6c9"}}>
            <span>👧</span><span style={{fontSize:14,fontWeight:600,color:"var(--g)"}}>{k.name}</span>
            {k.dob&&<span style={{fontSize:12,color:"var(--gl)",marginLeft:"auto"}}>age {getAge(k.dob)}</span>}
          </div>)}
        </div>}
        <div style={{display:"flex",flexDirection:"column",gap:8,marginTop:16,textAlign:"left"}}>
          <input value={name} onChange={e=>setName(e.target.value)} placeholder="Child’s first name" onKeyDown={e=>e.key==="Enter"&&add()}/>
          <div style={{display:"flex",gap:8}}>
            <input type="date" value={dob} onChange={e=>setDob(e.target.value)} style={{flex:1}}/>
            <button onClick={add} disabled={sv||!name.trim()} className="btn bp" style={{width:"auto",padding:"0 24px",opacity:(!name.trim()||sv)?.4:1}}>Add</button>
          </div>
        </div>
        <button onClick={onDone} className={"btn "+(kids.length?"bp":"bs")} style={{marginTop:24}}>
          {kids.length?"Next — add clubs →":"Skip — just me"}
        </button>
      </div>
    </div>
  );
}

function OnboardClubs({userId,kids,onDone}){
  const[q,setQ]=useState("");const[res,setRes]=useState([]);const[added,setAdded]=useState([]);const[sv,setSv]=useState(false);
  const[assign,setAssign]=useState(null);const[searching,setSearching]=useState(false);const tmr=useRef(null);

  function onType(v){
    setQ(v);clearTimeout(tmr.current);
    if(v.length<2){setRes([]);return}
    tmr.current=setTimeout(async()=>{
      setSearching(true);
      const r=await db("clubs","GET",{select:"id,name,address,location,rating",filters:["name=ilike.*"+v+"*"],limit:8,order:"rating.desc.nullslast"});
      setRes(r||[]);setSearching(false);
    },300);
  }

  async function pick(club){
    if(kids.length===0){
      setSv(true);
      await db("hub_subscriptions","POST",{body:{user_id:userId,club_id:club.id,colour:COLS[added.length%COLS.length]}});
      setAdded([...added,{...club,who:"You"}]);setQ("");setRes([]);setSv(false);
    } else { setAssign(club);setQ("");setRes([]) }
  }

  async function doAssign(club,depId,who){
    setSv(true);
    await db("hub_subscriptions","POST",{body:{user_id:userId,club_id:club.id,dependant_id:depId||null,colour:COLS[added.length%COLS.length]}});
    setAdded([...added,{...club,who}]);setAssign(null);setSv(false);
  }

  async function addNew(){
    if(!q.trim())return;setSv(true);
    const sl=q.trim().toLowerCase().replace(/[^a-z0-9]+/g,"-").replace(/^-+|-+$/g,"")+"-"+Math.random().toString(36).substring(2,6);
    const r=await db("clubs","POST",{body:{name:q.trim(),slug:sl,source:"external"}});
    if(r&&r[0]){
      if(kids.length===0){
        await db("hub_subscriptions","POST",{body:{user_id:userId,club_id:r[0].id,colour:COLS[added.length%COLS.length]}});
        setAdded([...added,{id:r[0].id,name:q.trim(),who:"You"}]);
      } else { setAssign({id:r[0].id,name:q.trim()}) }
    }
    setQ("");setRes([]);setSv(false);
  }

  async function finish(){
    await db("profiles","PATCH",{body:{onboarding_step:"done",onboarding_completed:true},filters:["id=eq."+userId]});
    onDone();
  }

  const initials=(n)=>n.split(" ").map(w=>w[0]).join("").substring(0,2).toUpperCase();

  return (
    <div className="fi" style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",padding:20,background:"var(--warm)"}}>
      <div style={{width:"100%",maxWidth:440}}>
        <div style={{textAlign:"center",marginBottom:20}}>
          <div style={{fontSize:48,marginBottom:12}}>🏠</div>
          <h2 style={{fontFamily:"var(--sr)",fontSize:24,fontWeight:800,color:"var(--g)"}}>What clubs are you in?</h2>
          <p style={{fontSize:14,color:"var(--mt)",marginTop:6}}>Search for your club — we’ll find it</p>
        </div>
        {added.length>0&&<div style={{marginBottom:16,display:"flex",flexDirection:"column",gap:8}}>
          {added.map((c,i)=><div key={c.id+"-"+i} style={{display:"flex",alignItems:"center",gap:10,background:"var(--gxl)",borderRadius:14,padding:"10px 16px",border:"1px solid #c8e6c9"}}>
            <div style={{width:30,height:30,borderRadius:8,background:COLS[i%COLS.length],display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontSize:10,fontWeight:800}}>{initials(c.name)}</div>
            <div style={{flex:1}}><div style={{fontSize:14,fontWeight:600,color:"var(--g)"}}>{c.name}</div><div style={{fontSize:11,color:"var(--gl)"}}>{c.who}</div></div>
            <span style={{color:"var(--gl)"}}>✓</span>
          </div>)}
        </div>}
        <div style={{position:"relative"}}>
          <input value={q} onChange={e=>onType(e.target.value)} placeholder="Type club name..."/>
          {searching&&<span style={{position:"absolute",right:14,top:13,fontSize:12,color:"var(--mt)"}}>...</span>}
        </div>
        {res.length>0&&<div style={{marginTop:4,background:"var(--card)",border:"1px solid var(--bd)",borderRadius:14,overflow:"hidden",boxShadow:"0 8px 24px rgba(0,0,0,.08)"}}>
          {res.map(c=><button key={c.id} onClick={()=>pick(c)} style={{width:"100%",padding:"12px 16px",border:"none",borderBottom:"1px solid #f5f3ef",background:"none",cursor:"pointer",textAlign:"left",fontFamily:"var(--sn)",display:"flex",alignItems:"center",gap:10}}>
            <div style={{width:36,height:36,borderRadius:8,background:"var(--gxl)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,fontWeight:800,color:"var(--g)",flexShrink:0}}>{initials(c.name)}</div>
            <div><div style={{fontSize:14,fontWeight:600}}>{c.name}</div>{(c.address||c.location)&&<div style={{fontSize:11,color:"var(--mt)"}}>{c.address||c.location}</div>}</div>
            {c.rating&&<span style={{marginLeft:"auto",fontSize:11,color:"var(--acc)",fontWeight:700}}>★ {c.rating}</span>}
          </button>)}
        </div>}
        {q.length>=2&&res.length===0&&!searching&&<button onClick={addNew} style={{width:"100%",marginTop:8,padding:12,borderRadius:12,border:"2px dashed var(--bd)",background:"none",cursor:"pointer",fontSize:13,fontWeight:600,color:"var(--mt)",fontFamily:"var(--sn)"}}>+ Add “{q}” as a new club</button>}
        {assign&&<div className="mbg" onClick={e=>e.target===e.currentTarget&&setAssign(null)}>
          <div className="mbox" style={{textAlign:"center",padding:32}}>
            <h3 style={{fontFamily:"var(--sr)",fontSize:18,fontWeight:700,color:"var(--g)",marginBottom:4}}>Who goes to {assign.name}?</h3>
            <p style={{fontSize:13,color:"var(--mt)",marginBottom:20}}>Tap each family member who attends</p>
            <div style={{display:"flex",flexDirection:"column",gap:8}}>
              <button onClick={()=>doAssign(assign,null,"You")} className="btn bs" style={{display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>👤 Me</button>
              {kids.map(k=><button key={k.id} onClick={()=>doAssign(assign,k.id,k.first_name)} className="btn bs" style={{display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>👧 {k.first_name}</button>)}
            </div>
          </div>
        </div>}
        <button onClick={finish} className={"btn "+(added.length?"bp":"bs")} style={{marginTop:24}}>{added.length?"Go to my hub →":"Skip"}</button>
      </div>
    </div>
  );
}

function Hub({user,profile,onRefresh,onLogout}){
  const[tab,setTab]=useState("week");const[filter,setFilter]=useState("all");
  const[kids,setKids]=useState([]);const[clubs,setClubs]=useState([]);const[recs,setRecs]=useState([]);
  const[mans,setMans]=useState([]);const[pays,setPays]=useState([]);const[camps,setCamps]=useState([]);const[campBookings,setCampBookings]=useState([]);const[holidays,setHolidays]=useState([]);const[userHolidays,setUserHolidays]=useState([]);
  const[showAddEv,setShowAddEv]=useState(false);const[showAddPay,setShowAddPay]=useState(false);
  const[showAddKid,setShowAddKid]=useState(false);const[editClub,setEditClub]=useState(null);const[editHol,setEditHol]=useState(null);const[showAddHol,setShowAddHol]=useState(false);const[showInvite,setShowInvite]=useState(false);const[loading,setLoading]=useState(true);

  async function load(){
    setLoading(true);
    const[k,c,r,m,p,ca,hols,userHols,cBooks]=await Promise.all([
      db("dependants","GET",{filters:["parent_user_id=eq."+user.id],order:"created_at.asc"}),
      db("hub_subscriptions","GET",{select:"id,club_id,dependant_id,colour,clubs(id,name,address,location,phone,rating)",filters:["user_id=eq."+user.id]}),
      db("recurring_events","GET",{filters:["user_id=eq."+user.id]}),
      db("manual_events","GET",{filters:["user_id=eq."+user.id]}),
      db("payment_reminders","GET",{filters:["user_id=eq."+user.id],order:"due_date.asc"}),
      db("camps","GET",{select:"id,title,camp_type,start_date,end_date,daily_start_time,daily_end_time,age_min,age_max,cost_eur,cost_notes,location_name,booking_url,source",filters:["status=eq.active"],order:"start_date.asc"}),
      db("school_holidays","GET",{order:"start_date.asc"}),
      db("user_school_holidays","GET",{filters:["user_id=eq."+user.id],order:"start_date.asc"}),
      db("camp_bookings","GET",{filters:["user_id=eq."+user.id]})
    ]);
    setKids(k||[]);
    setClubs((c||[]).map(s=>({...s,club_id:s.club_id||s.clubs?.id,club_name:s.clubs?.name||"?",club_addr:s.clubs?.address})));
    setRecs(r||[]);setMans(m||[]);setPays(p||[]);setCamps(ca||[]);setHolidays(hols||[]);setUserHolidays(userHols||[]);setCampBookings(cBooks||[]);
    setLoading(false);
  }
  useEffect(()=>{load()},[]);

  const members=useMemo(()=>{
    const m=[{id:"all",name:"Everyone",emoji:"👨‍👩‍👧‍👦",type:"all"}];
    kids.forEach(k=>m.push({id:k.id,name:k.first_name,emoji:"👧",type:"kid",age:getAge(k.date_of_birth),dob:k.date_of_birth}));
    if(kids.length>0)m.push({id:"self",name:profile?.first_name||"Me",emoji:"👤",type:"self"});
    return m;
  },[kids,profile]);

  // Build weekly events with member names
  const wd=weekDates();
  const weekEvts=useMemo(()=>{
    const evts=[];
    (recs||[]).forEach(re=>{
      if(!re.active)return;
      wd.forEach(d=>{
        if(d.getDay()===re.day_of_week){
          const cl=clubs.find(c=>c.club_id===re.club_id);
          const kid=re.dependant_id?kids.find(k=>k.id===re.dependant_id):null;
          evts.push({id:re.id+d.toISOString(),title:re.title,date:d,time:re.start_time?.slice(0,5)||"",club:cl?.club_name||"",colour:cl?.colour||"#999",member:kid?.first_name||(profile?.first_name||"You"),memberId:re.dependant_id||"self"});
        }
      });
    });
    (mans||[]).forEach(me=>{
      const d=new Date(me.event_date);
      const end=new Date(wd[6]);end.setDate(end.getDate()+1);
      if(d>=wd[0]&&d<end){
        const cl=clubs.find(c=>c.club_id===me.club_id);
        const kid=me.dependant_id?kids.find(k=>k.id===me.dependant_id):null;
        evts.push({id:me.id,title:me.title,date:d,time:d.toTimeString().slice(0,5),club:cl?.club_name||"",colour:cl?.colour||"#999",member:kid?.first_name||(profile?.first_name||"You"),memberId:me.dependant_id||"self"});
      }
    });
    return evts.sort((a,b)=>a.date-b.date||(a.time||"").localeCompare(b.time||""));
  },[recs,mans,clubs,kids,profile,wd]);

  const filtEvts=filter==="all"?weekEvts:weekEvts.filter(e=>e.memberId===filter);
  const filtPays=filter==="all"?pays:pays.filter(p=>(p.dependant_id||"self")===filter);
  const totalDue=filtPays.filter(p=>!p.paid).reduce((s,p)=>s+parseFloat(p.amount||0),0);
  const totalPaid=filtPays.filter(p=>p.paid).reduce((s,p)=>s+parseFloat(p.amount||0),0);

  // Camps filtered by kid age
  const filtCamps=useMemo(()=>{
    if(filter==="all"||filter==="self")return camps;
    const kid=kids.find(k=>k.id===filter);
    if(!kid||!kid.date_of_birth)return camps;
    const age=getAge(kid.date_of_birth);
    return camps.filter(c=>age>=c.age_min&&age<=c.age_max);
  },[camps,filter,kids]);

  const tabs=[{id:"week",l:"This Week",i:"📅"},{id:"money",l:"Money",i:"💳"},{id:"camps",l:"Camps",i:"🏕️"},{id:"clubs",l:"Clubs",i:"🏠"}];

  if(loading)return <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"var(--warm)"}}><p style={{color:"var(--mt)"}}>Loading...</p></div>;

  // If no clubs yet, prompt
  if(clubs.length===0)return (
    <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",padding:20,background:"var(--warm)"}}>
      <div style={{textAlign:"center",maxWidth:360}}>
        <div style={{fontSize:48,marginBottom:16}}>🏠</div>
        <h2 style={{fontFamily:"var(--sr)",fontSize:22,fontWeight:800,color:"var(--g)"}}>No clubs yet</h2>
        <p style={{fontSize:14,color:"var(--mt)",margin:"8px 0 24px"}}>Add your first club to get started</p>
        <button onClick={()=>onRefresh("clubs")} className="btn bp">+ Add a club</button>
      </div>
    </div>
  );

  return (
    <div className="fi" style={{background:"var(--warm)",minHeight:"100vh"}}>
      {/* Header */}
      <div style={{background:"var(--card)",borderBottom:"1px solid var(--bd)"}}>
        <div style={{maxWidth:520,margin:"0 auto",padding:"14px 16px 8px"}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>
            <Logo/>
            <button onClick={onLogout} style={{width:32,height:32,borderRadius:10,background:"var(--g)",display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontSize:13,fontWeight:700,border:"none",cursor:"pointer"}}>{(profile?.first_name||"U")[0]}</button>
          </div>
          <div className="hsb" style={{display:"flex",gap:6,overflowX:"auto",paddingBottom:6}}>
            {members.map(m=><button key={m.id} onClick={()=>setFilter(m.id)} className={"pill "+(filter===m.id?"pon":"poff")}>{m.emoji} {m.name}{m.age!=null&&<span style={{opacity:.6,marginLeft:2}}>({m.age})</span>}</button>)}
            <button onClick={()=>setShowAddKid(true)} className="pill poff" style={{border:"2px dashed var(--bd)",background:"none"}}>+ kid</button>
            {filter!=="all"&&filter!=="self"&&<button onClick={()=>{const kid=kids.find(k=>k.id===filter);if(kid)setShowAddKid(kid)}} className="pill poff" style={{fontSize:11}}>\u270e edit</button>}
          </div>
        </div>
        <div style={{maxWidth:520,margin:"0 auto",display:"flex"}}>
          {tabs.map(t=><button key={t.id} onClick={()=>setTab(t.id)} style={{flex:1,display:"flex",alignItems:"center",justifyContent:"center",gap:4,padding:"10px 0",fontSize:12,fontWeight:600,border:"none",borderBottom:tab===t.id?"2.5px solid var(--g)":"2.5px solid transparent",cursor:"pointer",background:"none",color:tab===t.id?"var(--g)":"var(--mt)",fontFamily:"var(--sn)"}}>{t.i} {t.l}</button>)}
        </div>
      </div>

      <div style={{maxWidth:520,margin:"0 auto",padding:16,paddingBottom:100}}>

      {/* THIS WEEK */}
      {tab==="week"&&<div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10,marginBottom:16}}>
          <div style={{background:"var(--card)",borderRadius:14,padding:12,border:"1px solid var(--bd)",textAlign:"center"}}>
            <div style={{fontSize:20,fontWeight:800,color:"var(--g)",fontFamily:"var(--sr)"}}>{filtEvts.length}</div>
            <div style={{fontSize:11,color:"var(--mt)",fontWeight:600}}>events</div>
          </div>
          <div style={{background:"var(--accl)",borderRadius:14,padding:12,border:"1px solid #f0d078",textAlign:"center"}}>
            <div style={{fontSize:20,fontWeight:800,color:"#8a6d00",fontFamily:"var(--sr)"}}>€{totalDue.toFixed(0)}</div>
            <div style={{fontSize:11,color:"#a68600",fontWeight:600}}>due</div>
          </div>
          <div style={{background:"var(--gxl)",borderRadius:14,padding:12,border:"1px solid #c8e6c9",textAlign:"center"}}>
            <div style={{fontSize:20,fontWeight:800,color:"var(--g)",fontFamily:"var(--sr)"}}>{clubs.length}</div>
            <div style={{fontSize:11,color:"var(--gl)",fontWeight:600}}>clubs</div>
          </div>
        </div>
        {wd.map(d=>{
          const dayEvts=filtEvts.filter(e=>e.date.getFullYear()===d.getFullYear()&&e.date.getMonth()===d.getMonth()&&e.date.getDate()===d.getDate());
          const today=isToday(d);
          return <div key={d.toISOString()} style={{marginBottom:12}}>
            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}>
              {today&&<span style={{width:8,height:8,borderRadius:4,background:"var(--acc)"}}/>}
              <span style={{fontSize:13,fontWeight:today?800:600,color:today?"var(--g)":"var(--mt)"}}>{fmtDate(d)}</span>
            </div>
            {dayEvts.length===0?<div style={{padding:"8px 0 4px",fontSize:13,color:"#ccc",fontStyle:"italic"}}>Nothing on</div>
            :dayEvts.map(e=><div key={e.id} style={{display:"flex",alignItems:"center",gap:12,padding:"10px 14px",background:"var(--card)",borderRadius:14,border:"1px solid var(--bd)",marginBottom:6}}>
              <div style={{width:4,height:36,borderRadius:2,background:e.colour,flexShrink:0}}/>
              <div style={{flex:1}}>
                <div style={{fontSize:14,fontWeight:600}}><span style={{color:"var(--mt)",fontWeight:500}}>{e.member}</span> — {e.title}</div>
                <div style={{fontSize:12,color:"var(--mt)",marginTop:1}}>{e.club}</div>
              </div>
              {e.time&&<span style={{fontSize:12,fontWeight:600,color:"var(--g)",background:"var(--gxl)",padding:"4px 10px",borderRadius:8,whiteSpace:"nowrap"}}>{e.time}</span>}
            </div>)}
          </div>
        })}
        <button onClick={()=>setShowAddEv(true)} style={{width:"100%",padding:14,borderRadius:14,border:"2px dashed var(--bd)",background:"none",cursor:"pointer",fontSize:13,fontWeight:600,color:"var(--mt)",fontFamily:"var(--sn)"}}>+ Add an event</button>
      </div>}

      {/* MONEY */}
      {tab==="money"&&<div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:20}}>
          <div style={{background:"var(--accl)",borderRadius:14,padding:16,border:"1px solid #f0d078"}}>
            <div style={{fontSize:28,fontWeight:800,color:"#8a6d00",fontFamily:"var(--sr)"}}>€{totalDue.toFixed(0)}</div>
            <div style={{fontSize:12,fontWeight:600,color:"#a68600",marginTop:2}}>Outstanding</div>
          </div>
          <div style={{background:"var(--gxl)",borderRadius:14,padding:16,border:"1px solid #c8e6c9"}}>
            <div style={{fontSize:28,fontWeight:800,color:"var(--g)",fontFamily:"var(--sr)"}}>€{totalPaid.toFixed(0)}</div>
            <div style={{fontSize:12,fontWeight:600,color:"var(--gl)",marginTop:2}}>Paid</div>
          </div>
        </div>
        {filtPays.length===0?<div style={{textAlign:"center",padding:"40px 0",color:"var(--mt)"}}><div style={{fontSize:36,marginBottom:8}}>💳</div><p style={{fontSize:14}}>No payment reminders yet</p></div>
        :filtPays.map(p=>{
          const overdue=!p.paid&&new Date(p.due_date)<new Date();
          const kid=p.dependant_id?kids.find(k=>k.id===p.dependant_id):null;
          const cl=clubs.find(c=>c.club_id===p.club_id);
          return <div key={p.id} style={{background:"var(--card)",borderRadius:14,border:"1px solid var(--bd)",padding:16,marginBottom:8}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <div><div style={{fontSize:14,fontWeight:600}}>{kid?.first_name||profile?.first_name||"You"} — {p.description}</div><div style={{fontSize:12,color:"var(--mt)",marginTop:2}}>{cl?.club_name||""} • Due {new Date(p.due_date).toLocaleDateString("en-IE",{day:"numeric",month:"short"})}</div></div>
              <div style={{textAlign:"right"}}><div style={{fontSize:18,fontWeight:800,color:p.paid?"var(--gl)":overdue?"#dc2626":"var(--tx)",fontFamily:"var(--sr)"}}>€{parseFloat(p.amount).toFixed(0)}</div>
                {!p.paid&&<button onClick={async()=>{await db("payment_reminders","PATCH",{body:{paid:true},filters:["id=eq."+p.id]});load()}} style={{fontSize:11,fontWeight:700,color:"var(--gl)",background:"var(--gxl)",border:"none",borderRadius:8,padding:"3px 10px",cursor:"pointer",marginTop:4}}>Mark paid</button>}
                {p.paid&&<span style={{fontSize:11,color:"var(--gl)",fontWeight:700}}>✓ Paid</span>}
              </div>
            </div>
          </div>
        })}
        <button onClick={()=>setShowAddPay(true)} style={{width:"100%",padding:14,borderRadius:14,border:"2px dashed var(--bd)",background:"none",cursor:"pointer",fontSize:13,fontWeight:600,color:"var(--mt)",fontFamily:"var(--sn)",marginTop:8}}>+ Add payment reminder</button>
      </div>}

      {/* CAMPS */}
      {tab==="camps"&&<div>
        {(()=>{
          const now=new Date();
          // Merge default + user overrides
          const mergedHols=holidays.map(h=>{
            const override=userHolidays.find(uh=>uh.base_holiday_id===h.id);
            if(override){
              if(override.holiday_type==="hidden")return null;
              return {...override,is_user_override:true,holiday_type:override.holiday_type||h.holiday_type};
            }
            return {...h,is_user_override:false};
          }).filter(Boolean);
          // Add custom user holidays (no base_holiday_id)
          userHolidays.filter(uh=>!uh.base_holiday_id&&uh.holiday_type!=="hidden").forEach(uh=>{
            mergedHols.push({...uh,is_user_override:true});
          });
          const futureHols=mergedHols.filter(h=>new Date(h.end_date+"T23:59:59")>=now).sort((a,b)=>new Date(a.start_date)-new Date(b.start_date));
          const kidName=filter!=="all"&&filter!=="self"?kids.find(k=>k.id===filter)?.first_name:null;
          const kidAge=filter!=="all"&&filter!=="self"?getAge(kids.find(k=>k.id===filter)?.date_of_birth):null;

          if(futureHols.length===0) return <p style={{color:"var(--mt)",padding:20,textAlign:"center"}}>No upcoming school holidays found</p>;

          return futureHols.map(hol=>{
            const hs=new Date(hol.start_date+"T00:00:00"),he=new Date(hol.end_date+"T23:59:59");
            const holCamps=filtCamps.filter(camp=>{
              const cs=new Date(camp.start_date+"T00:00:00");
              return cs>=hs&&cs<=he;
            });
            const holEmoji=hol.holiday_type==="easter"?"🐣":hol.holiday_type==="summer"?"☀️":hol.holiday_type==="christmas"?"🎄":"🍂";
            const weeks=Math.max(1,Math.ceil((he-hs)/(7*86400000)));
            
            return <div key={hol.id} style={{marginBottom:24}}>
              <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4}}>
                <span style={{fontSize:20}}>{holEmoji}</span>
                <h3 style={{fontFamily:"var(--sr)",fontSize:17,fontWeight:700,color:"var(--g)",flex:1}}>{hol.name}</h3>
                <button onClick={(e)=>{e.stopPropagation();setEditHol(hol)}} style={{background:"var(--gxl)",border:"none",borderRadius:8,padding:"4px 10px",fontSize:11,fontWeight:700,color:"var(--gl)",cursor:"pointer",fontFamily:"var(--sn)"}}>\u270e Edit dates</button>
              </div>
              <p style={{fontSize:12,color:"var(--mt)",marginBottom:12}}>
                {new Date(hol.start_date).toLocaleDateString("en-IE",{day:"numeric",month:"short"})} – {new Date(hol.end_date).toLocaleDateString("en-IE",{day:"numeric",month:"short"})} ({weeks} week{weeks>1?"s":""}){hol.is_user_override?" \u2022 customised":""}
                {kidName&&kidAge!=null?" · Showing camps for "+kidName+" (age "+kidAge+")":""}
                {" · "+holCamps.length+" camp"+(holCamps.length!==1?"s":"")+" found"}
              </p>

              {holCamps.length===0?
                <div style={{padding:20,borderRadius:14,border:"2px dashed var(--bd)",textAlign:"center",marginBottom:8}}>
                  <div style={{fontSize:28,marginBottom:6}}>🔍</div>
                  <p style={{fontSize:13,color:"var(--mt)"}}>No camps listed yet for this break</p>
                  <p style={{fontSize:12,color:"var(--mt)",marginTop:2}}>We'll alert you when camps appear</p>
                </div>
              :holCamps.map(camp=>{
                const ct=CT[camp.camp_type]||CT.other;
                const coversWork=camp.daily_end_time&&camp.daily_end_time>="15:00";
                return <div key={camp.id} style={{background:"var(--card)",borderRadius:16,border:"1px solid var(--bd)",padding:16,marginBottom:10}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
                    <div style={{flex:1}}>
                      <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:4}}>
                        <span style={{fontSize:16}}>{ct.i}</span>
                        <span style={{fontSize:14,fontWeight:700}}>{camp.title}</span>
                      </div>
                      <div style={{fontSize:12,color:"var(--mt)"}}>{camp.location_name}</div>
                      <div style={{fontSize:12,color:"var(--mt)",marginTop:2}}>
                        {camp.start_date&&camp.end_date?fmtDate(new Date(camp.start_date+"T00:00"))+" – "+fmtDate(new Date(camp.end_date+"T00:00")):""}
                        {camp.daily_start_time&&camp.daily_end_time?" · "+camp.daily_start_time?.slice(0,5)+"–"+camp.daily_end_time?.slice(0,5):""}
                      </div>
                      <div style={{display:"flex",gap:6,marginTop:8,flexWrap:"wrap"}}>
                        <span style={{fontSize:11,fontWeight:700,padding:"3px 8px",borderRadius:6,background:"var(--accl)",color:"#8a6d00"}}>€{camp.cost_eur}</span>
                        <span style={{fontSize:11,fontWeight:600,padding:"3px 8px",borderRadius:6,background:"#f0f0f0",color:"var(--mt)"}}>Ages {camp.age_min}–{camp.age_max}</span>
                        {coversWork&&<span style={{fontSize:11,fontWeight:600,padding:"3px 8px",borderRadius:6,background:"var(--gxl)",color:"var(--gl)"}}>✓ Covers work day</span>}
                      </div>
                    </div>
                  </div>
                  {(()=>{
                  const myBooking=campBookings.find(b=>b.camp_id===camp.id);
                  const activeKid=filter!=="all"&&filter!=="self"?kids.find(k=>k.id===filter):null;
                  const hasSchool=activeKid?.school_name&&activeKid?.school_class;
                  return <>
                    <div style={{display:"flex",gap:6,marginTop:10}}>
                      {!myBooking?<>
                        <button onClick={async()=>{await db("camp_bookings","POST",{body:{user_id:user.id,dependant_id:activeKid?.id||null,camp_id:camp.id,status:"interested"}});load()}} style={{flex:1,padding:8,borderRadius:10,border:"1px solid var(--bd)",background:"var(--card)",cursor:"pointer",fontSize:12,fontWeight:700,color:"var(--mt)",fontFamily:"var(--sn)"}}>\u2764\ufe0f Interested</button>

function InviteAdultModal({userId,familyId,onClose,onSaved}){

      await db("family_invites","POST",{body:{family_id:fid,invited_by:userId,invited_email:email.trim(),invited_name:name.trim()||null}});

    <button onClick={onClose} className="btn bp">Done</button>
  </div></div>;

  return <div className="mbg" onClick={e=>e.target===e.currentTarget&&onClose()}><div className="mbox">

      <h3 style={{fontFamily:"var(--sr)",fontSize:18,fontWeight:700,color:"var(--g)"}}>Invite a family member</h3>

    </div>

function EditHolidayModal({holiday,userId,onClose,onSaved}){
  const[name,setName]=useState(holiday.name);
  const[start,setStart]=useState(holiday.start_date);
  const[end,setEnd]=useState(holiday.end_date);
  const[sv,setSv]=useState(false);

  async function save(){
    setSv(true);
    if(holiday.is_user_override){
      // Update existing user override
      await db("user_school_holidays","PATCH",{body:{name,start_date:start,end_date:end},filters:["id=eq."+holiday.id]});
    } else {
      // Create a user override from the default
      await db("user_school_holidays","POST",{body:{user_id:userId,base_holiday_id:holiday.id,name,start_date:start,end_date:end,holiday_type:holiday.holiday_type}});
    }
    setSv(false);onSaved();
  }

  async function reset(){
    if(!holiday.is_user_override)return;
    setSv(true);
    await db("user_school_holidays","DELETE",{filters:["id=eq."+holiday.id]});
    setSv(false);onSaved();
  }

  async function remove(){
    if(!confirm("Remove this holiday from your calendar?"))return;
    setSv(true);
    if(holiday.is_user_override){
      await db("user_school_holidays","DELETE",{filters:["id=eq."+holiday.id]});
    } else {
      // Create an override that marks it as hidden
      await db("user_school_holidays","POST",{body:{user_id:userId,base_holiday_id:holiday.id,name:holiday.name+"_hidden",start_date:holiday.start_date,end_date:holiday.start_date,holiday_type:"hidden"}});
    }
    setSv(false);onSaved();
  }

  return <div className="mbg" onClick={e=>e.target===e.currentTarget&&onClose()}><div className="mbox">
    <div style={{display:"flex",justifyContent:"space-between",marginBottom:20}}>
      <h3 style={{fontFamily:"var(--sr)",fontSize:18,fontWeight:700,color:"var(--g)"}}>Edit Holiday Dates</h3>
      <button onClick={onClose} style={{background:"none",border:"none",fontSize:20,cursor:"pointer",color:"var(--mt)"}}>\u2715</button>
    </div>
    <p style={{fontSize:13,color:"var(--mt)",marginBottom:16}}>Adjust to match your school\u2019s actual dates</p>
    <div style={{display:"flex",flexDirection:"column",gap:12}}>
      <div><span className="lbl">Holiday name</span><input value={name} onChange={e=>setName(e.target.value)}/></div>
      <div style={{display:"flex",gap:8}}>
        <div style={{flex:1}}><span className="lbl">Starts</span><input type="date" value={start} onChange={e=>setStart(e.target.value)}/></div>
        <div style={{flex:1}}><span className="lbl">Ends</span><input type="date" value={end} onChange={e=>setEnd(e.target.value)}/></div>
      </div>
      <button onClick={save} disabled={sv} className="btn bp">{sv?"Saving...":"Save dates"}</button>
      {holiday.is_user_override&&<button onClick={reset} className="btn bs" style={{fontSize:13}}>Reset to default dates</button>}
    </div>
  </div></div>;
}

  const[name,setName]=useState("");const[start,setStart]=useState("");const[end,setEnd]=useState("");const[sv,setSv]=useState(false);
  async function save(){
    if(!name.trim()||!start||!end)return;setSv(true);
    await db("user_school_holidays","POST",{body:{user_id:userId,name:name.trim(),start_date:start,end_date:end,holiday_type:"custom"}});
    setSv(false);onSaved();
  }
  return <div className="mbg" onClick={e=>e.target===e.currentTarget&&onClose()}><div className="mbox">
    <div style={{display:"flex",justifyContent:"space-between",marginBottom:20}}>
      <h3 style={{fontFamily:"var(--sr)",fontSize:18,fontWeight:700,color:"var(--g)"}}>Add School Holiday</h3>
      <button onClick={onClose} style={{background:"none",border:"none",fontSize:20,cursor:"pointer",color:"var(--mt)"}}>\u2715</button>
    </div>
    <p style={{fontSize:13,color:"var(--mt)",marginBottom:16}}>Add a holiday your school has that\u2019s not in the standard calendar</p>
    <div style={{display:"flex",flexDirection:"column",gap:12}}>
      <div><span className="lbl">Name</span><input value={name} onChange={e=>setName(e.target.value)} placeholder="e.g. School closure day, Staff training day"/></div>
      <div style={{display:"flex",gap:8}}>
        <div style={{flex:1}}><span className="lbl">Starts</span><input type="date" value={start} onChange={e=>setStart(e.target.value)}/></div>
        <div style={{flex:1}}><span className="lbl">Ends</span><input type="date" value={end} onChange={e=>setEnd(e.target.value)}/></div>
      </div>
      <button onClick={save} disabled={sv||!name.trim()||!start||!end} className="btn bp">{sv?"Saving...":"Add holiday"}</button>
    </div>
  </div></div>;
}

function App(){
  const[screen,setScreen]=useState("loading");const[user,setUser]=useState(null);const[profile,setProfile]=useState(null);const[kids,setKids]=useState([]);

  useEffect(()=>{
    const t=localStorage.getItem("ocv_token");
    if(t){_t=t;au("user").then(async u=>{
      const p=await db("profiles","GET",{filters:["id=eq."+u.id]});
      const pr=p&&p[0]?p[0]:null;
      setUser(u);setProfile(pr);
      if(!pr||!pr.onboarding_completed)setScreen("onboard_kids");
      else setScreen("hub");
    }).catch(()=>{localStorage.removeItem("ocv_token");setScreen("landing")})}
    else setScreen("landing");
  },[]);

  async function onAuth(u){
    if(_t)localStorage.setItem("ocv_token",_t);
    setUser(u);
    const p=await db("profiles","GET",{filters:["id=eq."+u.id]});
    const pr=p&&p[0]?p[0]:null;
    setProfile(pr);
    if(!pr||!pr.onboarding_completed)setScreen("onboard_kids");
    else setScreen("hub");
  }

  async function afterKids(){
    const k=await db("dependants","GET",{filters:["parent_user_id=eq."+user.id]});
    setKids(k||[]);
    setScreen("onboard_clubs");
  }

  function logout(){localStorage.removeItem("ocv_token");_t=null;setUser(null);setProfile(null);setScreen("landing")}

  if(screen==="loading")return <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"var(--warm)"}}><Logo/></div>;
  if(screen==="landing")return <Landing onGo={()=>setScreen("auth_signup")} onLogin={()=>setScreen("auth_login")}/>;
  if(screen==="auth_signup")return <Auth onAuth={onAuth} mode="signup"/>;
  if(screen==="auth_login")return <Auth onAuth={onAuth} mode="login"/>;
  if(screen==="onboard_kids")return <OnboardKids userId={user.id} onDone={afterKids}/>;
  if(screen==="onboard_clubs")return <OnboardClubs userId={user.id} kids={kids} onDone={()=>setScreen("hub")}/>;
  if(screen==="hub")return <Hub user={user} profile={profile} onRefresh={(s)=>{if(s==="clubs")setScreen("onboard_clubs")}} onLogout={logout}/>;
  return null;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);

</script>
</body>
</html>

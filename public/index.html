async function au(a,b){
  const ep={signup:"/auth/v1/signup",login:"/auth/v1/token?grant_type=password",user:"/auth/v1/user"};
  const r=await fetch(SB+ep[a],{method:a==="user"?"GET":"POST",headers:hd(),body:a==="user"?undefined:JSON.stringify(b)});

async function db(t,m,o={}){
  let u=SB+"/rest/v1/"+t;
  const p=[];
  if(o.select)p.push("select="+encodeURIComponent(o.select));
  if(o.filters)o.filters.forEach(f=>p.push(f));
  if(o.order)p.push("order="+o.order);
  if(o.limit)p.push("limit="+o.limit);
  if(p.length)u+="?"+p.join("&");
  const h=hd();
  if(m==="POST"||m==="PATCH")h.Prefer="return=representation";
  const r=await fetch(u,{method:m,headers:h,body:o.body?JSON.stringify(o.body):undefined});
  if(!r.ok){const errTxt=await r.text();console.error("DB err:",t,m,errTxt);return null}
  const txt=await r.text();
  return txt?JSON.parse(txt):null;
}

async function rpc(fn,params={}){
  const r=await fetch(SB+"/rest/v1/rpc/"+fn,{method:"POST",headers:hd(),body:JSON.stringify(params)});
  if(!r.ok)return null;
  const txt=await r.text();
  return txt?JSON.parse(txt):null;
}

function Auth({onAuth,mode:im}){
  const[mode,setMode]=useState(im||"signup");
  const[email,setEmail]=useState("");
  const[name,setName]=useState("");
  const[pw,setPw]=useState("");
  const[pw2,setPw2]=useState("");
  const[err,setErr]=useState(null);
  const[ld,setLd]=useState(false);

  const pwStrength=(p)=>{
    if(p.length<8)return{score:0,label:"Too short",color:"#dc2626"};
    let s=0;
    if(p.length>=8)s++;
    if(p.length>=10)s++;
    if(/[A-Z]/.test(p))s++;
    if(/[0-9]/.test(p))s++;
    if(/[^A-Za-z0-9]/.test(p))s++;
    if(s<=2)return{score:s,label:"Weak",color:"#dc2626"};
    if(s<=3)return{score:s,label:"Fair",color:"#f0a500"};
    return{score:s,label:"Strong",color:"#16a34a"};
  };

  const strength=pwStrength(pw);
  const pwMatch=pw===pw2;
  const canSignup=email.trim()&&name.trim()&&pw.length>=8&&pwMatch;
  const canLogin=email.trim()&&pw.length>0;

  async function go(){
    if(mode==="signup"){
      if(!name.trim()){setErr("Please enter your name");return}
      if(pw.length<8){setErr("Password must be at least 8 characters");return}
      if(!pwMatch){setErr("Passwords don't match");return}
      if(strength.score<=2){setErr("Password is too weak. Add uppercase letters, numbers, or symbols.");return}
    }
    setLd(true);setErr(null);
    try{
      if(mode==="signup"){
        const d=await au("signup",{email,password:pw,data:{first_name:name.trim()}});
        const u=d.user||d;
        // If no token (email confirmation required), auto-login immediately
        if(!_t&&u){
          try{
            const loginD=await au("login",{email,password:pw});
            if(loginD.user||loginD.id){
              const lu=loginD.user||loginD;
              // Create profile after successful login
              await db("profiles","POST",{body:{id:lu.id,first_name:name.trim(),email:email.trim(),trial_started_at:new Date().toISOString(),subscription_status:"trial"}});
              onAuth(lu);setLd(false);return;
            }
          }catch(loginErr){
            // Login failed — email might need confirmation
            setErr("Account created! Please check your email to verify, then log in.");
            setMode("login");setLd(false);return;
          }
        }
        // Token was issued (no email confirm required)
        if(u&&u.id){
          await db("profiles","POST",{body:{id:u.id,first_name:name.trim(),email:email.trim(),trial_started_at:new Date().toISOString(),subscription_status:"trial"}});
        }
        onAuth(u);
      }
      else{const d=await au("login",{email,password:pw});onAuth(d.user)}
    }catch(e){setErr(e.message)}
    setLd(false);
  }

  return (
    <div className="fi" style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",padding:16,background:"var(--warm)"}}>
      <div style={{width:"100%",maxWidth:400}}>
        <div style={{textAlign:"center",marginBottom:32}}><Logo/></div>
        <div style={{background:"var(--card)",borderRadius:24,border:"1px solid var(--bd)",padding:28}}>
          <div style={{display:"flex",background:"#f5f3ef",borderRadius:12,padding:4,marginBottom:24}}>
            {["signup","login"].map(m=>(
              <button key={m} onClick={()=>{setMode(m);setErr(null)}} style={{flex:1,padding:"9px 0",borderRadius:8,border:"none",cursor:"pointer",fontSize:13,fontWeight:700,fontFamily:"var(--sn)",background:mode===m?"#fff":"transparent",color:mode===m?"var(--g)":"var(--mt)"}}>
                {m==="signup"?"Sign up":"Log in"}
              </button>
            ))}
          </div>
          {err&&<div style={{marginBottom:16,padding:12,borderRadius:12,background:"#fef2f2",color:"#b91c1c",fontSize:13}}>{err}</div>}
          <div style={{display:"flex",flexDirection:"column",gap:14}}>
            {mode==="signup"&&<input type="text" value={name} onChange={e=>setName(e.target.value)} placeholder="Your first name"/>}
            <input type="email" value={email} onChange={e=>setEmail(e.target.value)} placeholder="Email"/>
            <div>
              <input type="password" value={pw} onChange={e=>setPw(e.target.value)} placeholder={mode==="signup"?"Create a password":"Password"} onKeyDown={e=>e.key==="Enter"&&mode==="login"&&go()}/>
              {mode==="signup"&&pw.length>0&&<div style={{display:"flex",alignItems:"center",gap:8,marginTop:6}}>
                <div style={{flex:1,height:4,borderRadius:2,background:"#eee"}}>
                  <div style={{width:(strength.score/5*100)+"%",height:4,borderRadius:2,background:strength.color,transition:"all .3s"}}/>
                </div>
                <span style={{fontSize:11,fontWeight:700,color:strength.color}}>{strength.label}</span>
              </div>}
            </div>
            {mode==="signup"&&<div>
              <input type="password" value={pw2} onChange={e=>setPw2(e.target.value)} placeholder="Confirm password" onKeyDown={e=>e.key==="Enter"&&canSignup&&go()}/>
              {pw2.length>0&&!pwMatch&&<p style={{fontSize:11,color:"#dc2626",marginTop:4}}>Passwords don't match</p>}
              {pw2.length>0&&pwMatch&&<p style={{fontSize:11,color:"#16a34a",marginTop:4}}>Passwords match ✓</p>}
            </div>}
            <button onClick={go} disabled={ld||(mode==="signup"?!canSignup:!canLogin)} className="btn bp">{ld?"...":mode==="signup"?"Start free trial":"Log in"}</button>
            {mode==="signup"&&<p style={{fontSize:12,color:"var(--mt)",textAlign:"center"}}>14 days free, then €7.99/month</p>}
            {mode==="signup"&&<p style={{fontSize:11,color:"var(--mt)",textAlign:"center"}}>Password must be 8+ characters with a mix of uppercase, numbers, or symbols</p>}
          </div>
        </div>
      </div>
    </div>
  );
}

function OnboardClubs({userId,kids,onDone}){
  const[q,setQ]=useState("");const[res,setRes]=useState([]);const[added,setAdded]=useState([]);const[sv,setSv]=useState(false);
  const[assign,setAssign]=useState(null);const[searching,setSearching]=useState(false);const tmr=useRef(null);

  function onType(v){
    setQ(v);clearTimeout(tmr.current);
    if(v.length<2){setRes([]);return}
    tmr.current=setTimeout(async()=>{
      setSearching(true);
      const r=await db("clubs","GET",{select:"id,name,address,location,rating",filters:["name=ilike.*"+v+"*"],limit:8,order:"rating.desc.nullslast"});
      setRes(r||[]);setSearching(false);
    },300);
  }

  async function pick(club){
    if(kids.length===0){
      setSv(true);
      await db("hub_subscriptions","POST",{body:{user_id:userId,club_id:club.id,colour:COLS[added.length%COLS.length]}});
      setAdded([...added,{...club,who:"You"}]);setQ("");setRes([]);setSv(false);
    } else { setAssign(club);setQ("");setRes([]) }
  }

  async function doAssign(club,depId,who){
    setSv(true);
    await db("hub_subscriptions","POST",{body:{user_id:userId,club_id:club.id,dependant_id:depId||null,colour:COLS[added.length%COLS.length]}});
    setAdded([...added,{...club,who}]);setAssign(null);setSv(false);
  }

  async function addNew(){
    if(!q.trim())return;setSv(true);
    const sl=q.trim().toLowerCase().replace(/[^a-z0-9]+/g,"-").replace(/^-+|-+$/g,"")+"-"+Math.random().toString(36).substring(2,6);
    const r=await db("clubs","POST",{body:{name:q.trim(),slug:sl,source:"external"}});
    if(r&&r[0]){
      if(kids.length===0){
        await db("hub_subscriptions","POST",{body:{user_id:userId,club_id:r[0].id,colour:COLS[added.length%COLS.length]}});
        setAdded([...added,{id:r[0].id,name:q.trim(),who:"You"}]);
      } else { setAssign({id:r[0].id,name:q.trim()}) }
    }
    setQ("");setRes([]);setSv(false);
  }

  async function finish(){
    await db("profiles","PATCH",{body:{onboarding_step:"done",onboarding_completed:true},filters:["id=eq."+userId]});

  }

          <p style={{fontSize:14,color:"var(--mt)",marginTop:6}}>Search for your club — we’ll find it</p>
        </div>
        {added.length>0&&<div style={{marginBottom:16,display:"flex",flexDirection:"column",gap:8}}>
          {added.map((c,i)=><div key={c.id+"-"+i} style={{display:"flex",alignItems:"center",gap:10,background:"var(--gxl)",borderRadius:14,padding:"10px 16px",border:"1px solid #c8e6c9"}}>
            <div style={{width:30,height:30,borderRadius:8,background:COLS[i%COLS.length],display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontSize:10,fontWeight:800}}>{initials(c.name)}</div>
            <div style={{flex:1}}><div style={{fontSize:14,fontWeight:600,color:"var(--g)"}}>{c.name}</div><div style={{fontSize:11,color:"var(--gl)"}}>{c.who}</div></div>
            <span style={{color:"var(--gl)"}}>✓</span>
          </div>)}
        </div>}
        <div style={{position:"relative"}}>
          <input value={q} onChange={e=>onType(e.target.value)} placeholder="Type club name..."/>
          {searching&&<span style={{position:"absolute",right:14,top:13,fontSize:12,color:"var(--mt)"}}>...</span>}
        </div>
        {res.length>0&&<div style={{marginTop:4,background:"var(--card)",border:"1px solid var(--bd)",borderRadius:14,overflow:"hidden",boxShadow:"0 8px 24px rgba(0,0,0,.08)"}}>
          {res.map(c=><button key={c.id} onClick={()=>pick(c)} style={{width:"100%",padding:"12px 16px",border:"none",borderBottom:"1px solid #f5f3ef",background:"none",cursor:"pointer",textAlign:"left",fontFamily:"var(--sn)",display:"flex",alignItems:"center",gap:10}}>
            <div style={{width:36,height:36,borderRadius:8,background:"var(--gxl)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,fontWeight:800,color:"var(--g)",flexShrink:0}}>{initials(c.name)}</div>
            <div><div style={{fontSize:14,fontWeight:600}}>{c.name}</div>{(c.address||c.location)&&<div style={{fontSize:11,color:"var(--mt)"}}>{c.address||c.location}</div>}</div>
            {c.rating&&<span style={{marginLeft:"auto",fontSize:11,color:"#e85d4a",fontWeight:700}}>★ {c.rating}</span>}

        {q.length>=2&&res.length===0&&!searching&&<button onClick={addNew} style={{width:"100%",marginTop:8,padding:12,borderRadius:12,border:"2px dashed var(--bd)",background:"none",cursor:"pointer",fontSize:13,fontWeight:600,color:"var(--mt)",fontFamily:"var(--sn)"}}>+ Add “{q}” as a new club</button>}

            <p style={{fontSize:13,color:"var(--mt)",marginBottom:20}}>Tap each family member who attends</p>
            <div style={{display:"flex",flexDirection:"column",gap:8}}>
              <button onClick={()=>doAssign(assign,null,"You")} className="btn bs" style={{display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>👤 Me</button>
              {kids.map(k=><button key={k.id} onClick={()=>doAssign(assign,k.id,k.first_name)} className="btn bs" style={{display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>👧 {k.first_name}</button>)}
            </div>
          </div>
        </div>}
        <button onClick={finish} className={"btn "+(added.length?"bp":"bs")} style={{marginTop:24}}>{added.length?"Go to my hub →":"Skip"}</button>
      </div>
    </div>
  );
}

function AddKidModal({userId,onClose,onSaved,editKid,profile}){
  const[memberType,setMemberType]=useState(editKid?"kid":"kid");
  const[name,setName]=useState(editKid?.first_name||"");
  const[dob,setDob]=useState(editKid?.date_of_birth||"");
  const[school,setSchool]=useState(editKid?.school_name||"");
  const[cls,setCls]=useState(editKid?.school_class||"");
  const[teacher,setTeacher]=useState(editKid?.teacher_name||"");
  const[showSchool,setShowSchool]=useState(!!(editKid?.school_name));
  const[adultEmail,setAdultEmail]=useState("");
  const[sv,setSv]=useState(false);
  const[done,setDone]=useState(false);

  async function save(){
    if(!name.trim())return;setSv(true);
    if(memberType==="adult"){
      let fid=profile?.family_id;
      if(!fid){
        const fam=await db("families","POST",{body:{created_by:userId}});
        if(fam&&fam[0]){fid=fam[0].id;await db("profiles","PATCH",{body:{family_id:fid},filters:["id=eq."+userId]})}
      }
      if(fid&&adultEmail.trim()){
        await db("family_invites","POST",{body:{family_id:fid,invited_by:userId,invited_email:adultEmail.trim(),invited_name:name.trim()}});
        try{await fetch(SB+"/functions/v1/send-invite",{method:"POST",headers:{"Content-Type":"application/json","Authorization":"Bearer "+_t},body:JSON.stringify({to_email:adultEmail.trim(),to_name:name.trim(),from_name:profile?.first_name||"Your partner",site_url:window.location.origin})})}catch(e){}
      }
      setSv(false);setDone(true);return;
    }
    const body={first_name:name.trim(),date_of_birth:dob||null,school_name:school.trim()||null,school_class:cls.trim()||null,teacher_name:teacher.trim()||null};
    if(editKid){await db("dependants","PATCH",{body,filters:["id=eq."+editKid.id]})}
    else{body.parent_user_id=userId;await db("dependants","POST",{body})}
    setSv(false);onSaved();
  }

  if(done)return <div className="mbg" onClick={e=>e.target===e.currentTarget&&onClose()}><div className="mbox" style={{textAlign:"center",padding:32}}>
    <div style={{fontSize:48,marginBottom:12}}>✅</div>
    <h3 style={{fontFamily:"var(--sr)",fontSize:18,fontWeight:700,color:"var(--g)"}}>Invite sent!</h3>
    <p style={{fontSize:14,color:"var(--mt)",margin:"8px 0 12px"}}>We've emailed {name} with an invite.</p>
    <div style={{background:"#f5f3ef",borderRadius:12,padding:12,marginBottom:16,display:"flex",alignItems:"center",gap:8}}>
      <span style={{flex:1,fontSize:13,fontWeight:600,color:"var(--tx)",wordBreak:"break-all"}}>oneclubview.com</span>
      <button onClick={()=>{navigator.clipboard?.writeText("https://oneclubview.com")}} style={{padding:"6px 12px",borderRadius:8,border:"none",background:"var(--g)",color:"#fff",fontSize:12,fontWeight:700,cursor:"pointer",fontFamily:"var(--sn)",whiteSpace:"nowrap"}}>Copy link</button>
    </div>
    <button onClick={onClose} className="btn bp">Done</button>
  </div></div>;

  return <div className="mbg" onClick={e=>e.target===e.currentTarget&&onClose()}><div className="mbox">
    <div style={{display:"flex",justifyContent:"space-between",marginBottom:20}}>
      <h3 style={{fontFamily:"var(--sr)",fontSize:18,fontWeight:700,color:"var(--g)"}}>{editKid?"Edit "+editKid.first_name:"Add family member"}</h3>
      <button onClick={onClose} style={{background:"none",border:"none",fontSize:20,cursor:"pointer",color:"var(--mt)"}}>✕</button>
    </div>
    {!editKid&&<div style={{display:"flex",gap:8,background:"#f5f3ef",borderRadius:12,padding:4,marginBottom:16}}>
      <button onClick={()=>setMemberType("kid")} style={{flex:1,padding:10,borderRadius:10,border:"none",background:memberType==="kid"?"var(--g)":"transparent",color:memberType==="kid"?"#fff":"var(--mt)",fontSize:13,fontWeight:700,cursor:"pointer",fontFamily:"var(--sn)"}}>👧 Child</button>
      <button onClick={()=>setMemberType("adult")} style={{flex:1,padding:10,borderRadius:10,border:"none",background:memberType==="adult"?"var(--g)":"transparent",color:memberType==="adult"?"#fff":"var(--mt)",fontSize:13,fontWeight:700,cursor:"pointer",fontFamily:"var(--sn)"}}>👤 Adult / Partner</button>
    </div>}
    <div style={{display:"flex",flexDirection:"column",gap:12}}>
      <div><span className="lbl">Name</span><input value={name} onChange={e=>setName(e.target.value)} placeholder="First name"/></div>
      {memberType==="adult"&&<>
        <div><span className="lbl">Their email</span><input type="email" value={adultEmail} onChange={e=>setAdultEmail(e.target.value)} placeholder="email@example.com"/></div>
        <p style={{fontSize:12,color:"var(--mt)",lineHeight:1.4}}>They'll get an invite email and can sign up to see the same family calendar.</p>
      </>}
      {memberType==="kid"&&<>
        <div><span className="lbl">Date of birth</span><input type="date" value={dob} onChange={e=>setDob(e.target.value)}/></div>
        {!showSchool?<button onClick={()=>setShowSchool(true)} style={{padding:10,borderRadius:12,border:"2px dashed var(--bd)",background:"none",cursor:"pointer",fontSize:13,fontWeight:600,color:"var(--mt)",fontFamily:"var(--sn)"}}>+ Add school info (optional)</button>
        :<div style={{background:"#f8f7f4",borderRadius:14,padding:14,border:"1px solid var(--bd)"}}>
          <span className="lbl" style={{marginBottom:8}}>School (helps match classmates at camps)</span>
          <div style={{display:"flex",flexDirection:"column",gap:8}}>
            <input value={school} onChange={e=>setSchool(e.target.value)} placeholder="School name, e.g. Scoil Bhride"/>
            <div style={{display:"flex",gap:8}}>
              <input value={cls} onChange={e=>setCls(e.target.value)} placeholder="Class, e.g. 2nd Class" style={{flex:1}}/>
              <input value={teacher} onChange={e=>setTeacher(e.target.value)} placeholder="Teacher (optional)" style={{flex:1}}/>
            </div>
          </div>
        </div>}
      </>}
      <button onClick={save} disabled={sv||!name.trim()||(memberType==="adult"&&!adultEmail.trim())} className="btn bp">
        {sv?"Saving...":(editKid?"Save changes":(memberType==="adult"?"Send invite":"Add child"))}
      </button>
    </div>
  </div></div>;

function EditClubModal({club,kids,profile,userId,onClose,onSaved,onDelete}){
  const[who,setWho]=useState([]);const[nickname,setNickname]=useState("");
  const[sv,setSv]=useState(false);
  const[clubUrl,setClubUrl]=useState("");
  const[clubFb,setClubFb]=useState("");
  const[clubPhone,setClubPhone]=useState("");
  const[clubEmail,setClubEmail]=useState("");
  const[clubEircode,setClubEircode]=useState("");
  const[clubNotes,setClubNotes]=useState("");
  const[termStart,setTermStart]=useState("");
  const[termEnd,setTermEnd]=useState("");
  const[allSubs,setAllSubs]=useState([]);
  const[showDetails,setShowDetails]=useState(false);
  const[loaded,setLoaded]=useState(false);

  useEffect(()=>{
    // Load club details and all subscriptions for this club
    (async()=>{
      const clubData=await db("clubs","GET",{filters:["id=eq."+club.club_id]});
      if(clubData&&clubData[0]){
        const cd=clubData[0];
        setClubUrl(cd.website_url||"");setClubFb(cd.facebook_url||"");
        setClubPhone(cd.contact_phone||"");setClubEmail(cd.contact_email||"");
        setClubEircode(cd.eircode||"");setClubNotes(cd.notes||"");
        setTermStart(cd.term_start||"");setTermEnd(cd.term_end||"");
      }
      const subs=await db("hub_subscriptions","GET",{filters:["user_id=eq."+userId,"club_id=eq."+club.club_id]});
      const ids=(subs||[]).map(s=>s.dependant_id||"self");
      if(subs&&subs[0]&&subs[0].nickname)setNickname(subs[0].nickname);
      setWho(ids);
      setAllSubs(subs||[]);
      setLoaded(true);
    })();
  },[]);

  async function save(){
    setSv(true);
    // Update club details
    await db("clubs","PATCH",{body:{website_url:clubUrl.trim()||null,facebook_url:clubFb.trim()||null,contact_phone:clubPhone.trim()||null,contact_email:clubEmail.trim()||null,eircode:clubEircode.trim()||null,notes:clubNotes.trim()||null,term_start:termStart||null,term_end:termEnd||null},filters:["id=eq."+club.club_id]});
    // Update nickname on all existing subs
    for(const s of allSubs){await db("hub_subscriptions","PATCH",{body:{nickname:nickname.trim()||null},filters:["id=eq."+s.id]})}
    // Sync subscriptions: remove old ones, add new ones
    const currentIds=allSubs.map(s=>s.dependant_id||"self");
    // Remove subs no longer selected
    for(const s of allSubs){
      const sid=s.dependant_id||"self";
      if(!who.includes(sid)){
        await db("hub_subscriptions","DELETE",{filters:["id=eq."+s.id]});
      }
    }
    // Add new subs
    for(const w of who){
      if(!currentIds.includes(w)){
        await db("hub_subscriptions","POST",{body:{user_id:userId,club_id:club.club_id,dependant_id:w==="self"?null:w,colour:club.colour||"#2d5a3f",nickname:nickname.trim()||null}});
      }
    }
    setSv(false);onSaved();
  }

  async function remove(){
    if(!confirm("Remove "+club.club_name+" from your family?"))return;
    setSv(true);
    for(const s of allSubs){
      await db("hub_subscriptions","DELETE",{filters:["id=eq."+s.id]});
    }
    setSv(false);onDelete();
  }

  function toggleMember(id){
    setWho(prev=>prev.includes(id)?prev.filter(x=>x!==id):[...prev,id]);
  }

  if(!loaded)return <div className="mbg"><div className="mbox" style={{textAlign:"center",padding:40}}><p>Loading...</p></div></div>;

  return <div className="mbg" onClick={e=>e.target===e.currentTarget&&onClose()}><div className="mbox">
    <div style={{display:"flex",justifyContent:"space-between",marginBottom:16}}>
      <h3 style={{fontFamily:"var(--sr)",fontSize:18,fontWeight:700,color:"var(--g)"}}>{club.club_name}</h3>
      <button onClick={onClose} style={{background:"none",border:"none",fontSize:20,cursor:"pointer",color:"var(--mt)"}}>✕</button>
    </div>
    {club.club_addr&&<p style={{fontSize:12,color:"var(--mt)",marginBottom:12}}>{club.club_addr}</p>}

    {/* Who attends - multi-select */}
    <div style={{marginBottom:12}}>
      <span className="lbl">Nickname (shows on schedule)</span>
      <input value={nickname} onChange={e=>setNickname(e.target.value)} placeholder={"e.g. Gym, Swimming, GAA"} style={{marginBottom:4}}/>
      <span style={{fontSize:11,color:"var(--mt)"}}>This is what you'll see on the weekly schedule instead of the full club name</span>
    </div>
    <div style={{marginBottom:16}}>
      <span className="lbl">Who goes to this club?</span>
      <div style={{display:"flex",flexWrap:"wrap",gap:8,marginTop:6}}>
        <button onClick={()=>toggleMember("self")} style={{padding:"8px 16px",borderRadius:10,border:who.includes("self")?"2px solid var(--g)":"2px solid var(--bd)",background:who.includes("self")?"var(--gxl)":"var(--card)",cursor:"pointer",fontSize:13,fontWeight:600,color:who.includes("self")?"var(--gl)":"var(--mt)",fontFamily:"var(--sn)"}}>👤 {profile?.first_name||"Me"}</button>
        {kids.map(k=><button key={k.id} onClick={()=>toggleMember(k.id)} style={{padding:"8px 16px",borderRadius:10,border:who.includes(k.id)?"2px solid var(--g)":"2px solid var(--bd)",background:who.includes(k.id)?"var(--gxl)":"var(--card)",cursor:"pointer",fontSize:13,fontWeight:600,color:who.includes(k.id)?"var(--gl)":"var(--mt)",fontFamily:"var(--sn)"}}>👧 {k.first_name}</button>)}
      </div>
    </div>

    {/* Club details toggle */}
    <button onClick={()=>setShowDetails(!showDetails)} style={{width:"100%",padding:12,borderRadius:12,border:"1px solid var(--bd)",background:"var(--card)",cursor:"pointer",fontSize:13,fontWeight:600,color:"var(--mt)",fontFamily:"var(--sn)",marginBottom:12,textAlign:"left",display:"flex",justifyContent:"space-between"}}>
      <span>Club details {clubUrl||clubPhone?"(added)":""}</span>
      <span>{showDetails?"▲":"▼"}</span>
    </button>

    {showDetails&&<div style={{display:"flex",flexDirection:"column",gap:10,marginBottom:16,background:"#f8f7f4",borderRadius:14,padding:14,border:"1px solid var(--bd)"}}>
      <div><span className="lbl">Website</span><input value={clubUrl} onChange={e=>setClubUrl(e.target.value)} placeholder="https://..."/></div>
      <div><span className="lbl">Facebook page</span><input value={clubFb} onChange={e=>setClubFb(e.target.value)} placeholder="https://facebook.com/..."/></div>
      <div style={{display:"flex",gap:8}}>
        <div style={{flex:1}}><span className="lbl">Phone</span><input value={clubPhone} onChange={e=>setClubPhone(e.target.value)} placeholder="085..."/></div>
        <div style={{flex:1}}><span className="lbl">Email</span><input value={clubEmail} onChange={e=>setClubEmail(e.target.value)} placeholder="info@club.ie"/></div>
      </div>
      <div><span className="lbl">Eircode</span><input value={clubEircode} onChange={e=>setClubEircode(e.target.value)} placeholder="D05 X1Y2" style={{maxWidth:140}}/></div>
      <div style={{display:"flex",gap:8}}>
        <div style={{flex:1}}><span className="lbl">Term starts</span><input type="date" value={termStart} onChange={e=>setTermStart(e.target.value)}/></div>
        <div style={{flex:1}}><span className="lbl">Term ends</span><input type="date" value={termEnd} onChange={e=>setTermEnd(e.target.value)}/></div>
      </div>
      <div><span className="lbl">Notes</span><textarea value={clubNotes} onChange={e=>setClubNotes(e.target.value)} placeholder="Coach name, WhatsApp group link, gear needed..." rows={3} style={{width:"100%",padding:10,borderRadius:10,border:"1px solid var(--bd)",fontSize:13,fontFamily:"var(--sn)",resize:"vertical"}}/></div>
    </div>}

    {/* Quick links if URLs set */}
    {(clubUrl||clubFb)&&!showDetails&&<div style={{display:"flex",gap:6,marginBottom:12}}>

function InviteAdultModal({userId,familyId,onClose,onSaved}){
  const[email,setEmail]=useState("");const[name,setName]=useState("");const[sv,setSv]=useState(false);const[done,setDone]=useState(false);

  async function send(){
    if(!email.trim())return;setSv(true);
    // Ensure family exists
    let fid=familyId;
    if(!fid){
      const fam=await db("families","POST",{body:{created_by:userId}});
      if(fam&&fam[0]){fid=fam[0].id;await db("profiles","PATCH",{body:{family_id:fid},filters:["id=eq."+userId]})}
    }
    if(fid){
      await db("family_invites","POST",{body:{family_id:fid,invited_by:userId,invited_email:email.trim(),invited_name:name.trim()||null}});
      // Send email via edge function
      try{
        const prof=await db("profiles","GET",{filters:["id=eq."+userId]});
        const myName=(prof&&prof[0]?.first_name)||"Your partner";
        await fetch(SB+"/functions/v1/send-invite",{
          method:"POST",
          headers:{"Content-Type":"application/json","Authorization":"Bearer "+_t},

        });

      setDone(true);

  if(done)return <div className="mbg" onClick={e=>e.target===e.currentTarget&&onClose()}><div className="mbox" style={{textAlign:"center",padding:32}}>

      <span style={{flex:1,fontSize:13,fontWeight:600,color:"var(--tx)",wordBreak:"break-all"}}>oneclubview.com</span>
      <button onClick={()=>{navigator.clipboard?.writeText("https://oneclubview.com");}} style={{padding:"6px 12px",borderRadius:8,border:"none",background:"var(--g)",color:"#fff",fontSize:12,fontWeight:700,cursor:"pointer",fontFamily:"var(--sn)",whiteSpace:"nowrap"}}>Copy link</button>
    </div>
    <p style={{fontSize:12,color:"var(--mt)",marginBottom:16}}>Once they create an account, they'll see your shared family calendar with all clubs, events, and camps.</p>
    <button onClick={onClose} className="btn bp">Done</button>
  </div></div>;

  return <div className="mbg" onClick={e=>e.target===e.currentTarget&&onClose()}><div className="mbox">
    <div style={{display:"flex",justifyContent:"space-between",marginBottom:20}}>
      <h3 style={{fontFamily:"var(--sr)",fontSize:18,fontWeight:700,color:"var(--g)"}}>Invite a family member</h3>
      <button onClick={onClose} style={{background:"none",border:"none",fontSize:20,cursor:"pointer",color:"var(--mt)"}}>✕</button>
    </div>
    <p style={{fontSize:13,color:"var(--mt)",marginBottom:16}}>Add your partner or another adult. They’ll get their own login and see the same family calendar.</p>
    <div style={{display:"flex",flexDirection:"column",gap:12}}>
      <div><span className="lbl">Their name</span><input value={name} onChange={e=>setName(e.target.value)} placeholder="First name"/></div>
      <div><span className="lbl">Their email</span><input type="email" value={email} onChange={e=>setEmail(e.target.value)} placeholder="email@example.com"/></div>
      <button onClick={send} disabled={sv||!email.trim()} className="btn bp">{sv?"Sending...":"Send invite"}</button>

function EditHolidayModal({holiday,userId,onClose,onSaved}){
  const[name,setName]=useState(holiday.name);
  const[start,setStart]=useState(holiday.start_date);
  const[end,setEnd]=useState(holiday.end_date);
  const[sv,setSv]=useState(false);

  async function save(){
    setSv(true);
    if(holiday.is_user_override){
      // Update existing user override
      await db("user_school_holidays","PATCH",{body:{name,start_date:start,end_date:end},filters:["id=eq."+holiday.id]});
    } else {
      // Create a user override from the default
      await db("user_school_holidays","POST",{body:{user_id:userId,base_holiday_id:holiday.id,name,start_date:start,end_date:end,holiday_type:holiday.holiday_type}});
    }
    setSv(false);onSaved();
  }

  async function reset(){
    if(!holiday.is_user_override)return;
    setSv(true);
    await db("user_school_holidays","DELETE",{filters:["id=eq."+holiday.id]});
    setSv(false);onSaved();
  }

  async function remove(){
    if(!confirm("Remove this holiday from your calendar?"))return;
    setSv(true);
    if(holiday.is_user_override){
      await db("user_school_holidays","DELETE",{filters:["id=eq."+holiday.id]});
    } else {
      // Create an override that marks it as hidden
      await db("user_school_holidays","POST",{body:{user_id:userId,base_holiday_id:holiday.id,name:holiday.name+"_hidden",start_date:holiday.start_date,end_date:holiday.start_date,holiday_type:"hidden"}});
    }
    setSv(false);onSaved();
  }

  return <div className="mbg" onClick={e=>e.target===e.currentTarget&&onClose()}><div className="mbox">
    <div style={{display:"flex",justifyContent:"space-between",marginBottom:20}}>
      <h3 style={{fontFamily:"var(--sr)",fontSize:18,fontWeight:700,color:"var(--g)"}}>Edit Holiday Dates</h3>
      <button onClick={onClose} style={{background:"none",border:"none",fontSize:20,cursor:"pointer",color:"var(--mt)"}}>✕</button>
    </div>
    <p style={{fontSize:13,color:"var(--mt)",marginBottom:16}}>Adjust to match your school’s actual dates</p>
    <div style={{display:"flex",flexDirection:"column",gap:12}}>
      <div><span className="lbl">Holiday name</span><input value={name} onChange={e=>setName(e.target.value)}/></div>
      <div style={{display:"flex",gap:8}}>
        <div style={{flex:1}}><span className="lbl">Starts</span><input type="date" value={start} onChange={e=>setStart(e.target.value)}/></div>
        <div style={{flex:1}}><span className="lbl">Ends</span><input type="date" value={end} onChange={e=>setEnd(e.target.value)}/></div>
      </div>
      <button onClick={save} disabled={sv} className="btn bp">{sv?"Saving...":"Save dates"}</button>
      {holiday.is_user_override&&<button onClick={reset} className="btn bs" style={{fontSize:13}}>Reset to default dates</button>}
    </div>
  </div></div>;
}

function CampCard({camp,user,kids,filter,campBookings,CT,fmtDate,onBookingChange}){
  const[classmateCount,setClassmateCount]=useState(0);
  const activeKid=filter!=="all"&&filter!=="self"?kids.find(k=>k.id===filter):null;
  const hasSchool=activeKid?.school_name&&activeKid?.school_class;
  const myBooking=campBookings.find(b=>b.camp_id===camp.id);
  const ct=CT[camp.camp_type]||CT.other;
  const coversWork=camp.daily_end_time&&camp.daily_end_time>="15:00";

  useEffect(()=>{
    if(hasSchool&&activeKid){
      rpc("camp_classmates_count",{p_camp_id:camp.id,p_dependant_id:activeKid.id}).then(n=>{
        if(n!=null)setClassmateCount(n);
      });
    } else {setClassmateCount(0)}
  },[camp.id,activeKid?.id,hasSchool,campBookings.length]);

  async function markCamp(status){
    await db("camp_bookings","POST",{body:{user_id:user.id,dependant_id:activeKid?.id||null,camp_id:camp.id,status}});
    onBookingChange();
  }
  async function removeCamp(){
    if(myBooking)await db("camp_bookings","DELETE",{filters:["id=eq."+myBooking.id]});
    onBookingChange();
  }

  return <div style={{background:"var(--card)",borderRadius:16,border:"1px solid var(--bd)",padding:16,marginBottom:10}}>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
      <div style={{flex:1}}>
        <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:4}}>
          <span style={{fontSize:16}}>{ct.i}</span>
          <span style={{fontSize:14,fontWeight:700}}>{camp.title}</span>
        </div>
        <div style={{fontSize:12,color:"var(--mt)"}}>{camp.location_name}</div>
        <div style={{fontSize:12,color:"var(--mt)",marginTop:2}}>
          {camp.start_date&&camp.end_date?fmtDate(new Date(camp.start_date+"T00:00"))+" – "+fmtDate(new Date(camp.end_date+"T00:00")):""}
          {camp.daily_start_time&&camp.daily_end_time?" · "+camp.daily_start_time?.slice(0,5)+"–"+camp.daily_end_time?.slice(0,5):""}
        </div>
        <div style={{display:"flex",gap:6,marginTop:8,flexWrap:"wrap"}}>
          <span style={{fontSize:11,fontWeight:700,padding:"3px 8px",borderRadius:6,background:"var(--accl)",color:"#c44030"}}>€{camp.cost_eur}</span>
          <span style={{fontSize:11,fontWeight:600,padding:"3px 8px",borderRadius:6,background:"#f0f0f0",color:"var(--mt)"}}>Ages {camp.age_min}–{camp.age_max}</span>
          {(()=>{const suited=kids.filter(k=>{const a=k.date_of_birth?Math.floor((new Date()-new Date(k.date_of_birth))/(365.25*86400000)):null;return a!==null&&a>=camp.age_min&&a<=camp.age_max});return suited.length>0?<span style={{fontSize:11,fontWeight:600,padding:"3px 8px",borderRadius:6,background:"#e8f0fe",color:"#1a56db"}}>👧 Suits {suited.map(k=>k.first_name).join(", ")}</span>:null})()}
          {coversWork&&<span style={{fontSize:11,fontWeight:600,padding:"3px 8px",borderRadius:6,background:"var(--gxl)",color:"var(--gl)"}}>✓ Covers work day</span>}
        </div>
      </div>
    </div>

    {/* Classmate notification */}
    {classmateCount>0&&<div style={{marginTop:10,padding:"8px 12px",borderRadius:10,background:"#eef6ff",border:"1px solid #c5ddf5",display:"flex",alignItems:"center",gap:8}}>
      <span style={{fontSize:14}}>🏫</span>
      <span style={{fontSize:12,fontWeight:600,color:"#1a5fa0"}}>{classmateCount} {classmateCount===1?"family":"families"} from {activeKid.school_class} at {activeKid.school_name} {classmateCount===1?"has":"have"} booked this camp</span>
    </div>}
    {hasSchool&&classmateCount===0&&<div style={{marginTop:8,fontSize:11,color:"var(--mt)",fontStyle:"italic"}}>
      🏫 We’ll notify you when classmates from {activeKid.school_class} book this camp
    </div>}

    {/* Interested / Booked buttons */}
    <div style={{display:"flex",gap:6,marginTop:10}}>
      {!myBooking?<>
        <button onClick={()=>markCamp("interested")} style={{flex:1,padding:8,borderRadius:10,border:"1px solid var(--bd)",background:"var(--card)",cursor:"pointer",fontSize:12,fontWeight:700,color:"var(--mt)",fontFamily:"var(--sn)"}}>❤️ Interested</button>
        <button onClick={()=>markCamp("booked")} style={{flex:1,padding:8,borderRadius:10,border:"1px solid var(--g)",background:"var(--card)",cursor:"pointer",fontSize:12,fontWeight:700,color:"var(--g)",fontFamily:"var(--sn)"}}>Mark booked</button>
      </>:
        <div style={{flex:1,padding:8,borderRadius:10,background:myBooking.status==="booked"?"var(--gxl)":"var(--accl)",textAlign:"center",fontSize:12,fontWeight:700,color:myBooking.status==="booked"?"var(--gl)":"#8a6d00"}}>
          {myBooking.status==="booked"?"✓ Booked":"❤️ Interested"}
          <button onClick={removeCamp} style={{marginLeft:8,background:"none",border:"none",fontSize:11,color:"var(--mt)",cursor:"pointer",textDecoration:"underline"}}>undo</button>
        </div>
      }
    </div>

    {camp.booking_url&&camp.booking_url!=="#"&&<a href={camp.booking_url} target="_blank" rel="noopener" style={{display:"block",marginTop:6,textAlign:"center",padding:10,borderRadius:10,background:"var(--g)",color:"#fff",fontSize:13,fontWeight:700,textDecoration:"none"}}>Book on their site →</a>}
  </div>;
}

function AdminDashboard({user,onBack}){
  const[stats,setStats]=useState(null);const[tickets,setTickets]=useState([]);const[loading,setLoading]=useState(true);
  const[users,setUsers]=useState([]);const[drilldown,setDrilldown]=useState(null);
  const[allSubs,setAllSubs]=useState([]);const[allKids,setAllKids]=useState([]);

  useEffect(()=>{
    (async()=>{
      const s=await rpc("admin_dashboard_stats");
      setStats(s);
      const t=await db("support_tickets","GET",{order:"created_at.desc"});
      setTickets(t||[]);
      const u=await db("profiles","GET",{order:"created_at.desc"});
      setUsers(u||[]);
      const subs=await db("hub_subscriptions","GET",{select:"id,user_id,club_id,dependant_id,clubs(name)"});
      setAllSubs(subs||[]);
      const kids=await db("dependants","GET",{});
      setAllKids(kids||[]);
      setLoading(false);
    })();
  },[]);

  if(loading)return <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"var(--bg)"}}><p>Loading dashboard...</p></div>;

  // Drilldown views
  if(drilldown){
    let title="";let content=null;

    if(drilldown==="users"){
      title="All Users ("+users.length+")";
      content=users.map(u=>{
        const kidCount=allKids.filter(k=>k.parent_user_id===u.id).length;
        const clubCount=new Set(allSubs.filter(s=>s.user_id===u.id).map(s=>s.club_id)).size;
        return <div key={u.id} style={{background:"#fff",borderRadius:14,border:"1px solid var(--bd)",padding:14,marginBottom:8}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div>
              <div style={{fontSize:14,fontWeight:700}}>{u.first_name||"—"} {u.last_name||""}</div>
              <div style={{fontSize:12,color:"var(--mt)"}}>{u.email}</div>
            </div>
            <span style={{fontSize:11,fontWeight:700,padding:"3px 8px",borderRadius:6,
              background:u.subscription_status==="active"?"var(--sage)":u.subscription_status==="churned"?"#fef2f2":"var(--goldl)",
              color:u.subscription_status==="active"?"var(--gl)":u.subscription_status==="churned"?"#dc2626":"#8a6d00"
            }}>{u.subscription_status||"trial"}</span>
          </div>
          <div style={{display:"flex",gap:12,marginTop:8,fontSize:12,color:"var(--mt)"}}>
            <span>Joined {new Date(u.created_at).toLocaleDateString("en-IE",{day:"numeric",month:"short",year:"numeric"})}</span>
            <span>{kidCount} kid{kidCount!==1?"s":""}</span>
            <span>{clubCount} club{clubCount!==1?"s":""}</span>
            {u.last_active_at&&<span>Active {new Date(u.last_active_at).toLocaleDateString("en-IE",{day:"numeric",month:"short"})}</span>}
          </div>
        </div>;
      });
    }

    if(drilldown==="families"){
      title="Families";
      const fams={};
      users.forEach(u=>{
        const fid=u.family_id||u.id;
        if(!fams[fid])fams[fid]={adults:[],kids:[],clubs:new Set()};
        fams[fid].adults.push(u);
      });
      allKids.forEach(k=>{
        const parent=users.find(u=>u.id===k.parent_user_id);
        const fid=parent?.family_id||k.parent_user_id;
        if(fams[fid])fams[fid].kids.push(k);
      });
      allSubs.forEach(s=>{
        const parent=users.find(u=>u.id===s.user_id);
        const fid=parent?.family_id||s.user_id;
        if(fams[fid])fams[fid].clubs.add(s.clubs?.name||s.club_id);
      });
      content=Object.entries(fams).map(([fid,fam])=>
        <div key={fid} style={{background:"#fff",borderRadius:14,border:"1px solid var(--bd)",padding:14,marginBottom:8}}>
          <div style={{fontSize:14,fontWeight:700}}>{fam.adults.map(a=>a.first_name||"?").join(" & ")}</div>
          <div style={{fontSize:12,color:"var(--mt)",marginTop:4}}>
            {fam.kids.length>0?"Kids: "+fam.kids.map(k=>k.first_name).join(", "):"No kids added"}
          </div>
          <div style={{fontSize:12,color:"var(--mt)",marginTop:2}}>
            {fam.clubs.size>0?"Clubs: "+[...fam.clubs].join(", "):"No clubs"}
          </div>
          <div style={{fontSize:11,color:"var(--mt)",marginTop:4}}>
            Status: {fam.adults[0]?.subscription_status||"trial"} · Joined {new Date(fam.adults[0]?.created_at).toLocaleDateString("en-IE",{day:"numeric",month:"short"})}
          </div>
        </div>
      );
    }

    if(drilldown==="tickets"){
      title="Support Tickets ("+tickets.length+")";
      content=tickets.map(t=><div key={t.id} style={{background:"#fff",borderRadius:14,border:"1px solid var(--bd)",padding:14,marginBottom:8}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <span style={{fontSize:14,fontWeight:700}}>{t.subject}</span>
          <span style={{fontSize:11,fontWeight:700,padding:"3px 8px",borderRadius:6,
            background:t.status==="open"?"#fef2f2":t.status==="resolved"?"var(--sage)":"var(--goldl)",
            color:t.status==="open"?"#dc2626":t.status==="resolved"?"var(--gl)":"#8a6d00"
          }}>{t.status}</span>
        </div>
        <div style={{fontSize:12,color:"var(--mt)",marginTop:4}}>{t.user_email} · {new Date(t.created_at).toLocaleDateString("en-IE",{day:"numeric",month:"short",hour:"2-digit",minute:"2-digit"})}</div>
        <div style={{fontSize:13,color:"var(--tx)",marginTop:8,lineHeight:1.5,background:"#f8f7f4",padding:12,borderRadius:10}}>{t.message}</div>
      </div>);
    }

    if(drilldown==="revenue"){
      title="Revenue Breakdown";
      const active=users.filter(u=>u.subscription_status==="active");
      const trial=users.filter(u=>u.subscription_status==="trial"||!u.subscription_status);
      const churned=users.filter(u=>u.subscription_status==="churned");
      content=<div>
        <div style={{background:"var(--sage)",borderRadius:14,padding:16,marginBottom:12}}>
          <div style={{fontSize:28,fontWeight:800,color:"var(--g)",fontFamily:"var(--sr)"}}>€{(active.length*7.99).toFixed(2)}</div>
          <div style={{fontSize:13,color:"var(--gl)",fontWeight:600}}>Monthly Recurring Revenue</div>
          <div style={{fontSize:12,color:"var(--mt)",marginTop:4}}>{active.length} active subscriber{active.length!==1?"s":""} × €7.99</div>
        </div>
        <h4 style={{fontSize:14,fontWeight:700,color:"var(--g)",margin:"16px 0 8px"}}>Active Subscribers ({active.length})</h4>
        {active.map(u=><div key={u.id} style={{background:"#fff",borderRadius:10,border:"1px solid var(--bd)",padding:10,marginBottom:4,fontSize:13,display:"flex",justifyContent:"space-between"}}>
          <span>{u.first_name} ({u.email})</span><span style={{fontWeight:700,color:"var(--gl)"}}>€7.99/mo</span>
        </div>)}
        <h4 style={{fontSize:14,fontWeight:700,color:"#f0a500",margin:"16px 0 8px"}}>On Trial ({trial.length})</h4>
        {trial.map(u=><div key={u.id} style={{background:"#fff",borderRadius:10,border:"1px solid var(--bd)",padding:10,marginBottom:4,fontSize:13}}>
          {u.first_name} ({u.email}) · Started {new Date(u.created_at).toLocaleDateString("en-IE",{day:"numeric",month:"short"})}
        </div>)}
        <h4 style={{fontSize:14,fontWeight:700,color:"#dc2626",margin:"16px 0 8px"}}>Churned ({churned.length})</h4>
        {churned.length===0?<p style={{fontSize:13,color:"var(--mt)"}}>None yet</p>
        :churned.map(u=><div key={u.id} style={{background:"#fef2f2",borderRadius:10,border:"1px solid #fecaca",padding:10,marginBottom:4,fontSize:13}}>
          {u.first_name} ({u.email}) · Churned {u.churned_at?new Date(u.churned_at).toLocaleDateString("en-IE",{day:"numeric",month:"short"}):"—"}
        </div>)}
      </div>;
    }

    if(drilldown==="clubs"){
      title="All Clubs Tracked";
      const clubMap={};
      allSubs.forEach(s=>{
        const name=s.clubs?.name||"Unknown";
        if(!clubMap[s.club_id])clubMap[s.club_id]={name,families:new Set()};
        clubMap[s.club_id].families.add(s.user_id);
      });
      const sorted=Object.values(clubMap).sort((a,b)=>b.families.size-a.families.size);
      content=sorted.map((cl,i)=><div key={i} style={{background:"#fff",borderRadius:10,border:"1px solid var(--bd)",padding:12,marginBottom:6,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <span style={{fontSize:13,fontWeight:600}}>{cl.name}</span>
        <span style={{fontSize:12,fontWeight:700,color:"var(--gl)",background:"var(--sage)",padding:"3px 10px",borderRadius:8}}>{cl.families.size} {cl.families.size===1?"family":"families"}</span>
      </div>);
    }

    return <div style={{minHeight:"100vh",background:"var(--bg)"}}>
      <div style={{background:"var(--g)",padding:"20px 16px",display:"flex",alignItems:"center",gap:12}}>
        <button onClick={()=>setDrilldown(null)} style={{background:"none",border:"none",color:"#fff",fontSize:20,cursor:"pointer"}}>←</button>
        <h1 style={{fontFamily:"var(--sr)",fontSize:18,fontWeight:700,color:"#fff"}}>{title}</h1>
      </div>
      <div style={{maxWidth:600,margin:"0 auto",padding:16}}>{content}</div>
    </div>;
  }

  // Main dashboard
  const S=({label,value,color,sub,tap})=><div onClick={tap?()=>setDrilldown(tap):undefined} style={{background:"#fff",borderRadius:14,padding:16,border:"1px solid var(--bd)",cursor:tap?"pointer":"default",position:"relative"}}>
    <div style={{fontSize:24,fontWeight:800,color:color||"var(--g)",fontFamily:"var(--sr)"}}>{value}</div>
    <div style={{fontSize:12,fontWeight:600,color:"var(--mt)",marginTop:2}}>{label}</div>
    {sub&&<div style={{fontSize:11,color:"var(--mt)",marginTop:2}}>{sub}</div>}
    {tap&&<span style={{position:"absolute",top:8,right:12,fontSize:11,color:"var(--mt)"}}>→</span>}
  </div>;

  return <div style={{minHeight:"100vh",background:"var(--bg)"}}>
    <div style={{background:"var(--g)",padding:"20px 16px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
      <h1 style={{fontFamily:"var(--sr)",fontSize:20,fontWeight:700,color:"#fff"}}>Admin Dashboard</h1>
      <button onClick={onBack} style={{background:"rgba(255,255,255,.15)",border:"none",color:"#fff",fontSize:12,fontWeight:700,padding:"8px 14px",borderRadius:8,cursor:"pointer",fontFamily:"var(--sn)"}}>Logout</button>
    </div>
    <div style={{maxWidth:600,margin:"0 auto",padding:16}}>

      <h2 style={{fontFamily:"var(--sr)",fontSize:18,fontWeight:700,color:"var(--g)",marginBottom:12}}>Key Metrics</h2>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:24}}>
        <S label="Total Families" value={stats?.total_families||0} color="var(--g)" tap="families"/>
        <S label="Total Users" value={stats?.total_users||0} tap="users"/>
        <S label="Active (7d)" value={stats?.active_users_7d||0} color="#2d7cb5" tap="users"/>
        <S label="Active (30d)" value={stats?.active_users_30d||0} tap="users"/>
      </div>

      <h2 style={{fontFamily:"var(--sr)",fontSize:18,fontWeight:700,color:"var(--g)",marginBottom:12}}>Revenue</h2>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10,marginBottom:24}}>
        <S label="MRR" value={"€"+(stats?.mrr||0)} color="#2d7cb5" tap="revenue"/>
        <S label="Subscribers" value={stats?.active_subscribers||0} color="var(--gl)" tap="revenue"/>
        <S label="Trial" value={stats?.trial_users||0} color="#f0a500" tap="revenue"/>
      </div>

      <h2 style={{fontFamily:"var(--sr)",fontSize:18,fontWeight:700,color:"var(--g)",marginBottom:12}}>Churn</h2>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:24}}>
        <S label="Churned" value={stats?.churned_users||0} color="#dc2626" tap="revenue"/>
        <S label="Avg days to churn" value={stats?.avg_days_to_churn||"—"}/>
      </div>

      <h2 style={{fontFamily:"var(--sr)",fontSize:18,fontWeight:700,color:"var(--g)",marginBottom:12}}>Growth</h2>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:24}}>
        <S label="Signups (7d)" value={stats?.signups_last_7d||0} color="var(--gl)" tap="users"/>
        <S label="Signups (30d)" value={stats?.signups_last_30d||0} tap="users"/>
      </div>

      <h2 style={{fontFamily:"var(--sr)",fontSize:18,fontWeight:700,color:"var(--g)",marginBottom:12}}>Product</h2>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10,marginBottom:24}}>
        <S label="Avg family size" value={stats?.avg_family_size||"—"}/>
        <S label="Avg clubs/family" value={stats?.avg_clubs_per_family||"—"}/>
        <S label="Total kids" value={stats?.total_kids||0}/>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:24}}>
        <S label="Clubs tracked" value={stats?.total_clubs_tracked||0} tap="clubs"/>
        <S label="Camps listed" value={stats?.total_camps_listed||0}/>
      </div>

      <h2 style={{fontFamily:"var(--sr)",fontSize:18,fontWeight:700,color:"var(--g)",marginBottom:12}}>Support ({stats?.open_tickets||0} open)</h2>
      <div style={{display:"grid",gridTemplateColumns:"1fr",gap:10,marginBottom:24}}>
        <S label="Open tickets" value={stats?.open_tickets||0} color={stats?.open_tickets>0?"#dc2626":"var(--gl)"} tap="tickets"/>
      </div>

    </div>
  </div>;
}

function PasteScheduleModal({userId,clubs,kids,profile,onClose,onSaved}){
  const[text,setText]=useState("");const[parsing,setParsing]=useState(false);const[result,setResult]=useState(null);const[err,setErr]=useState(null);const[applying,setApplying]=useState(false);

  async function parse(){
    if(!text.trim())return;setParsing(true);setErr(null);
    try{
      const res=await fetch(SB+"/functions/v1/parse-schedule",{
        method:"POST",
        headers:{"Content-Type":"application/json","Authorization":"Bearer "+_t},
        body:JSON.stringify({text:text.trim(),kids:kids.map(k=>({name:k.first_name,id:k.id})),clubs:clubs.map(c=>({name:c.club_name||c.clubs?.name,id:c.club_id,nickname:c.nickname})),parent_name:profile?.first_name||"Parent",user_id:userId})
      });
      const data=await res.json();
      if(data.events?.length>0||data.fee||data.action==="cancellation"){setResult(data)}
      else{setErr("Couldn't find any schedule info. Try pasting a message with days, times, or fee amounts.")}
    }catch(e){setErr("Failed to parse. Try again.")}
    setParsing(false);
  }

  async function apply(){
    setApplying(true);
    if(result.events){
      for(const ev of result.events){
        if(ev.cancelled){
          // Add to excluded_dates for recurring events on that day
          // For now, create a note about the cancellation
          continue;
        }
        if(ev.recurring&&ev.day_of_week!=null){
          await db("recurring_events","POST",{body:{user_id:userId,club_id:ev.club_id||null,dependant_id:ev.dependant_id||null,day_of_week:ev.day_of_week,start_time:ev.start_time||null,duration_minutes:ev.duration_minutes||60,title:ev.title||null,excluded_dates:[],driver:null}});
        }else if(ev.date){
          await db("manual_events","POST",{body:{user_id:userId,club_id:ev.club_id||null,dependant_id:ev.dependant_id||null,event_date:ev.date,start_time:ev.start_time||null,duration_minutes:ev.duration_minutes||60,title:ev.title||null,driver:null}});
        }
      }
    }
    if(result.fee){
      await db("payment_reminders","POST",{body:{user_id:userId,club_id:result.fee.club_id||null,dependant_id:result.fee.dependant_id||null,description:result.fee.description||"Fee",amount:result.fee.amount,due_date:result.fee.due_date,paid:false}});
    }
    if(result.term&&result.term.club_id){
      await db("clubs","PATCH",{body:{term_start:result.term.start_date,term_end:result.term.end_date},filters:["id=eq."+result.term.club_id]});
    }
    // Notify other adults in the family
    if(result.notifications?.length>0&&profile?.family_id){
      try{
        const famMembers=await db("profiles","GET",{filters:["family_id=eq."+profile.family_id,"id=neq."+userId]});
        for(const fm of (famMembers||[])){
          if(fm.email){
            await fetch(SB+"/functions/v1/send-invite",{
              method:"POST",headers:{"Content-Type":"application/json","Authorization":"Bearer "+_t},
              body:JSON.stringify({to_email:fm.email,to_name:fm.first_name,from_name:profile?.first_name,email_type:"notification",site_url:"https://oneclubview.com",notification_text:result.notifications.join(". ")})
            });
          }
        }
      }catch(e){}
    }
    setApplying(false);onSaved();
  }

  const actionLabels={schedule_update:"Schedule update",cancellation:"Cancellation",fee_due:"Fee notice",term_dates:"Term dates",general:"Message"};
  const actionIcons={schedule_update:"📅",cancellation:"🚫",fee_due:"💳",term_dates:"📆",general:"📋"};

  return <div className="mbg" onClick={e=>e.target===e.currentTarget&&onClose()}><div className="mbox">
    <div style={{display:"flex",justifyContent:"space-between",marginBottom:16}}>
      <h3 style={{fontFamily:"var(--sr)",fontSize:18,fontWeight:700,color:"var(--g)"}}>Paste a message</h3>
      <button onClick={onClose} style={{background:"none",border:"none",fontSize:20,cursor:"pointer",color:"var(--mt)"}}>✕</button>
    </div>

    {!result?<>
      <p style={{fontSize:13,color:"var(--mt)",marginBottom:4,lineHeight:1.5}}>Paste a WhatsApp, email, or text from a coach or club. We'll figure out what it means.</p>
      <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:12}}>
        {["📅 Schedule","🚫 Cancellation","💳 Fee notice","📆 Term dates"].map(t=><span key={t} style={{fontSize:11,fontWeight:600,color:"var(--mt)",background:"#f0eeeb",padding:"3px 8px",borderRadius:6}}>{t}</span>)}
      </div>
      <textarea value={text} onChange={e=>setText(e.target.value)} placeholder={"Paste the message here...\n\nExamples:\n• Hi parents, training Tues 5-6pm and Thurs 6-7pm\n• No class this Saturday due to pitch works\n• Fees for next term are €85, due by April 1st\n• Term 3 runs April 7 to June 20"} rows={7} style={{width:"100%",padding:12,borderRadius:12,border:"1.5px solid var(--bd)",fontSize:13,fontFamily:"var(--sn)",resize:"vertical",marginBottom:12}}/>
      {err&&<div style={{padding:12,borderRadius:12,background:"#fef2f2",color:"#dc2626",fontSize:13,marginBottom:12}}>{err}</div>}
      <button onClick={parse} disabled={parsing||!text.trim()} className="btn bp">{parsing?"Reading message...":"Read & extract"}</button>
    </>:<>
      {/* Result display */}
      <div style={{background:"var(--gxl)",borderRadius:14,padding:14,marginBottom:14}}>
        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}>
          <span style={{fontSize:20}}>{actionIcons[result.action]||"📋"}</span>
          <span style={{fontSize:14,fontWeight:700,color:"var(--g)"}}>{actionLabels[result.action]||"Update"}</span>
        </div>
        {result.summary&&<p style={{fontSize:13,color:"var(--gl)",lineHeight:1.5}}>{result.summary}</p>}
      </div>

      {/* Events found */}
      {result.events?.length>0&&<div style={{marginBottom:14}}>
        <span style={{fontSize:12,fontWeight:700,color:"var(--mt)",textTransform:"uppercase",letterSpacing:.5}}>Events ({result.events.length})</span>
        {result.events.map((ev,i)=><div key={i} style={{display:"flex",alignItems:"center",gap:10,background:"var(--card)",borderRadius:14,border:"1px solid var(--bd)",padding:"10px 14px",marginTop:6,boxShadow:"var(--shadow)"}}>
          <div style={{width:4,height:28,borderRadius:2,background:ev.cancelled?"#dc2626":"var(--acc)",flexShrink:0}}/>
          <div style={{flex:1}}>
            <div style={{fontSize:13,fontWeight:700,textDecoration:ev.cancelled?"line-through":"none"}}>{ev.title||"Event"}</div>
            <div style={{fontSize:12,color:"var(--mt)"}}>{ev.day_of_week!=null?["Sun","Mon","Tue","Wed","Thu","Fri","Sat"][ev.day_of_week]:ev.date||""} {ev.start_time||""} {ev.duration_minutes?"("+ev.duration_minutes+"min)":""}</div>
          </div>
          <span style={{fontSize:10,fontWeight:700,padding:"3px 8px",borderRadius:6,background:ev.cancelled?"#fef2f2":"var(--gxl)",color:ev.cancelled?"#dc2626":"var(--gl)"}}>{ev.cancelled?"cancelled":ev.recurring?"weekly":"once"}</span>
        </div>)}
      </div>}

      {/* Fee found */}
      {result.fee&&<div style={{background:"var(--accl)",borderRadius:14,padding:14,marginBottom:14}}>
        <span style={{fontSize:12,fontWeight:700,color:"var(--acc)",textTransform:"uppercase",letterSpacing:.5}}>Fee detected</span>
        <div style={{fontSize:16,fontWeight:800,color:"var(--g)",marginTop:4,fontFamily:"var(--sr)"}}>€{result.fee.amount}</div>
        <div style={{fontSize:12,color:"var(--mt)"}}>{result.fee.description}{result.fee.due_date?" · Due "+result.fee.due_date:""}</div>
      </div>}

      {/* Term found */}
      {result.term&&<div style={{background:"var(--gxl)",borderRadius:14,padding:14,marginBottom:14}}>
        <span style={{fontSize:12,fontWeight:700,color:"var(--gl)",textTransform:"uppercase",letterSpacing:.5}}>Term dates</span>
        <div style={{fontSize:13,fontWeight:600,color:"var(--g)",marginTop:4}}>{result.term.start_date} to {result.term.end_date}</div>
      </div>}

      {/* Notifications */}
      {result.notifications?.length>0&&<div style={{background:"#fff7ed",borderRadius:12,padding:12,marginBottom:14,border:"1px solid #fed7aa"}}>
        <span style={{fontSize:11,fontWeight:700,color:"#c2410c"}}>Will notify other adults:</span>
        {result.notifications.map((n,i)=><div key={i} style={{fontSize:12,color:"#9a3412",marginTop:4}}>{n}</div>)}
      </div>}

      <div style={{display:"flex",gap:8}}>
        <button onClick={()=>setResult(null)} className="btn bs" style={{flex:1}}>Edit</button>
        <button onClick={apply} disabled={applying} className="btn bp" style={{flex:2}}>{applying?"Applying...":"Apply changes"}</button>
      </div>
    </>}
  </div></div>;
}


function App(){
  const[screen,setScreen]=useState("loading");const[user,setUser]=useState(null);const[profile,setProfile]=useState(null);const[kids,setKids]=useState([]);

  useEffect(()=>{
    const t=localStorage.getItem("ocv_token");
    if(t){_t=t;au("user").then(async u=>{
      const p=await db("profiles","GET",{filters:["id=eq."+u.id]});
      const pr=p&&p[0]?p[0]:null;
      setUser(u);setProfile(pr);
      if(pr&&pr.onboarding_completed)setScreen("hub");
      else setScreen("onboard_kids");
    }).catch(()=>{localStorage.removeItem("ocv_token");setScreen("landing")})}
    else setScreen("landing");
  },[]);

  async function onAuth(u){
    if(_t)localStorage.setItem("ocv_token",_t);
    setUser(u);
    const p=await db("profiles","GET",{filters:["id=eq."+u.id]});
    const pr=p&&p[0]?p[0]:null;
    setProfile(pr);
    if(pr&&pr.onboarding_completed)setScreen("hub");
    else setScreen("onboard_kids");
  }

  async function afterKids(){
    const k=await db("dependants","GET",{filters:["parent_user_id=eq."+user.id]});
    setKids(k||[]);
    setScreen("onboard_clubs");
  }

  function logout(){localStorage.removeItem("ocv_token");_t=null;setUser(null);setProfile(null);setScreen("landing")}

  if(screen==="loading")return <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"var(--warm)"}}><Logo/></div>;
  if(screen==="landing")return <Landing onGo={()=>setScreen("auth_signup")} onLogin={()=>setScreen("auth_login")}/>;
  if(screen==="auth_signup")return <Auth onAuth={onAuth} mode="signup"/>;
  if(screen==="auth_login")return <Auth onAuth={onAuth} mode="login"/>;
  if(screen==="onboard_kids")return <OnboardKids userId={user.id} onDone={afterKids}/>;
  if(screen==="onboard_clubs")return <OnboardClubs userId={user.id} kids={kids} onDone={()=>setScreen("hub")}/>;
  if(screen==="hub"&&profile?.role==="admin")return <AdminDashboard user={user} onBack={logout}/>;
  if(screen==="hub")return <Hub user={user} profile={profile} onRefresh={(s)=>{if(s==="clubs")setScreen("onboard_clubs")}} onLogout={logout}/>;
  return null;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);

</script>
</body>
